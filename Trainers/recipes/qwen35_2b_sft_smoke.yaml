# Local Docker SFT smoke-test template.
#
# This file is intentionally config-driven: change model.name, dataset.local_file
# or training/lora values to run a different local SFT job without changing code.
name: qwen35-2b-sft-smoke
target: local
method: sft
provider: local_docker

job:
  image: unsloth/unsloth:latest
  # Use "always" when you want to refresh latest before a run.
  # Use "missing" for repeatability after you have pulled a known-good image.
  pull_policy: missing
  # On Windows + Docker Desktop, GPU bind mounts can fail with access denied.
  # "auto" chooses copy on Windows and bind elsewhere; set explicitly if needed.
  transfer: auto
  keep_container: false

setup:
  # Qwen3.5 needs transformers >=5.2.0. The current official Unsloth image
  # still ships transformers 4.57.1, so pin a compatible stack here.
  pip:
    - transformers==5.5.0
    - trl==0.22.2
    - git+https://github.com/unslothai/unsloth_zoo.git
    - git+https://github.com/unslothai/unsloth.git

run:
  method: sft
  trainer: Trainers/sft/train_sft.py
  dry_run: false
  dashboard: false
  quiet: true

model:
  name: Qwen/Qwen3.5-2B
  max_seq_length: 2048
  load_in_4bit: false

dataset:
  local_file: Datasets/nonthinking_tools_sft_04.22.26.jsonl

training:
  batch_size: 2
  gradient_accumulation: 8
  learning_rate: 1.0e-4
  num_epochs: 1
  max_steps: 10
  save_steps: 10
  save_total_limit: 2

lora:
  r: 64
  alpha: 128
  dropout: 0.0
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

artifacts:
  output_root: toolset-training-artifacts/runs/local_docker/sft/{name}
  run_timestamp: "{timestamp}"
