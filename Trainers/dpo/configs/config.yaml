model:
  model_name: unsloth/Qwen3-4B-bnb-4bit
  max_seq_length: 2048
  dtype: null
  load_in_4bit: true
lora:
  r: 32
  lora_alpha: 64
  lora_dropout: 0.05
  bias: none
  target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj
  use_gradient_checkpointing: unsloth
  random_state: 3407
  use_rslora: false
  use_dora: false
training:
  output_dir: ./dpo_output
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 4
  beta: 0.1
  loss_type: sigmoid
  learning_rate: 5e-6
  max_grad_norm: 0.5
  lr_scheduler_type: cosine
  use_two_stage_lr: false
  lr_reduction_step: 50
  lr_reduction_factor: 0.5
  max_length: 2048
  max_prompt_length: 1024
  gradient_checkpointing: true
  optim: adamw_8bit
  fp16: false
  bf16: true
  num_train_epochs: 1
  warmup_ratio: 0.15
  logging_steps: 5
  save_steps: 25
  save_total_limit: 3
  dataloader_num_workers: 0
  dataloader_pin_memory: true
  group_by_length: false
  eval_strategy: 'no'
  eval_steps: 100
dataset:
  dataset_name: null
  dataset_file: null
  local_file: null
  num_proc: 1
  test_size: 0.1
  chat_template: chatml
wandb:
  enabled: false
  project: dpo-finetuning
  run_name: null
  entity: null
seed: 42
