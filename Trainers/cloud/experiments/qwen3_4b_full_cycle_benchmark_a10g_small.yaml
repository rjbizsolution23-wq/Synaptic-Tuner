experiment:
  name: qwen3-4b-full-cycle-benchmark-a10g-small
  provider: hf_jobs
  method: sft
  objective: benchmark_cost_speed_on_a10g_small
  dataset:
    source: professorsynapse/claudesidian-synthetic-dataset
    file: nonthinking_tools_sft_03.14.26_with_toolmanager_loop_no_gettools_privacy_v1.3.jsonl
  training:
    model_name: Qwen/Qwen3-4B
    gpu: a10g-small
    image_profile: stable
    learning_rate: 1.0e-4
    num_epochs: 2
    load_in_4bit: true
    lora_target_modules:
      - q_proj
      - k_proj
      - v_proj
      - o_proj
      - gate_proj
      - up_proj
      - down_proj
  evaluation:
    enabled: true
    preset: full
    runtime: vllm
    image_profile: fast_vllm
    gpu: a10g-small
  loss:
    enabled: true
    gpu: a10g-small
    max_seq_length: 2048
    completion_only: true
  features:
    enabled: true
    formats:
      - jsonl
      - csv
