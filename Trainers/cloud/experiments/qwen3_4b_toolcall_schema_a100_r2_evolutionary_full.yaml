experiment:
  name: qwen3-4b-toolcall-schema-a100-r2-evolutionary-full
  provider: hf_jobs
  method: sft
  objective: evaluate_evolutionary_sft_against_toolcall_schema_baseline
  dataset:
    source: professorsynapse/claudesidian-synthetic-dataset
    file: toolcall_sft_v1_3_r2_20260322.jsonl
  training:
    model_name: Qwen/Qwen3-4B
    gpu: a100-large
    image_profile: stable
    batch_size: 24
    gradient_accumulation: 2
    learning_rate: 1.0e-4
    num_epochs: 2
    load_in_4bit: true
    lora_target_modules:
      - q_proj
      - k_proj
      - v_proj
      - o_proj
      - gate_proj
      - up_proj
      - down_proj
    evolutionary:
      enabled: true
      candidates: 4
      eval_batch_size: 2
      validation_config: configs/fitness/tool_calling.yaml
      strategy:
        type: gradient_noise
        params:
          noise_scale: 0.03
          max_grad_norm: 1.0
          scale_factors:
            - 0.5
            - 1.0
            - 1.5
            - 2.0
      selection:
        method: best
        min_improvement: 0.01
      eval_frequency: 10
      warmup_steps: 10
      cache_baseline: true
      logging:
        candidates: true
        selected: true
  evaluation:
    enabled: true
    preset: full
    runtime: unsloth
    image_profile: stable
    gpu: a100-large
  loss:
    enabled: true
    gpu: a100-large
    max_seq_length: 2048
    completion_only: true
  features:
    enabled: true
    formats:
      - jsonl
      - csv
