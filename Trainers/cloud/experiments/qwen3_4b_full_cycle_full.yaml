experiment:
  name: qwen3-4b-full-cycle-full
  provider: hf_jobs
  method: sft
  objective: train_eval_loss_full_cycle
  dataset:
    source: professorsynapse/claudesidian-synthetic-dataset
    file: nonthinking_tools_sft_03.14.26_with_toolmanager_loop_no_gettools_privacy_v1.3.jsonl
  training:
    model_name: Qwen/Qwen3-4B
    gpu: a10g-small
    image_profile: stable
    batch_size: 4
    gradient_accumulation: 8
    num_epochs: 1
    load_in_4bit: true
    lora_target_modules:
      - q_proj
      - k_proj
      - v_proj
      - o_proj
      - gate_proj
      - up_proj
      - down_proj
  evaluation:
    enabled: true
    preset: full
  loss:
    enabled: true
    max_seq_length: 2048
    completion_only: true
  features:
    enabled: true
    formats:
      - jsonl
      - csv
