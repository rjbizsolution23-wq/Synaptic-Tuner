# ============================================================================
# GRPO / GSPO Training Configuration for RTX 3090
# Uses TRL's GRPOTrainer. Set training.use_gspo=true for GSPO mode.
# ============================================================================

# Model Configuration
model:
  model_name: "unsloth/mistral-7b-instruct-v0.3-bnb-4bit"
  max_seq_length: 2048
  dtype: null
  load_in_4bit: true
  # Optional override; if null, inferred from model name.
  chat_template: null

# LoRA Adapter Configuration
lora:
  r: 32
  lora_alpha: 64
  lora_dropout: 0.05
  bias: "none"
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"
  use_gradient_checkpointing: "unsloth"
  random_state: 3407
  use_rslora: false
  use_dora: false

# Training Configuration (maps to TRL GRPOConfig where applicable)
training:
  output_dir: "./grpo_output_rtx3090"

  # Performance
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 4

  # Generation
  num_generations: 4
  max_prompt_length: 1024
  max_completion_length: 512
  temperature: 1.0

  # Learning
  learning_rate: 5e-6
  weight_decay: 0.0
  warmup_ratio: 0.1
  lr_scheduler_type: "linear"
  num_train_epochs: 1
  # If > 0, overrides epoch-based training.
  max_steps: -1

  # Precision
  fp16: false
  bf16: true

  # Optimizer
  optim: "adamw_8bit"

  # Logging / checkpointing
  logging_steps: 5
  save_steps: 50
  save_total_limit: 3

  # Reporting
  report_to: "none" # or "wandb"

  # GSPO toggle (sequence-level importance sampling)
  use_gspo: false

  # Optional escape hatch for advanced TRL args (passed to GRPOConfig if supported)
  extra_args: {}

# Dataset Configuration
dataset:
  dataset_name: "professorsynapse/claudesidian-behaviors-merged"
  dataset_file: "behavior_gspo_v1.3.jsonl"
  # Prefer local file for RTX training runs; path is relative to Trainers/rtx3090_grpo/
  local_file: "../../Datasets/archived datasets/behavior_gspo_v1.3.jsonl"
  num_proc: 1
  prompt_column: "prompt"

# Rewards Configuration
# - Built-ins live in src/rewards.py (registry).
# - Custom rewards can be loaded from a module import path OR a file path.
rewards:
  # Built-in reward components (config-driven selection)
  items:
    - name: "tool_selection"
      weight: 1.0
      params:
        ground_truth_field: "ground_truth_tool"
        partial_credit: 0.3
    - name: "json_structure"
      weight: 1.0
      params:
        reward_value: 0.3
    - name: "context_completeness"
      weight: 1.0
      params:
        reward_value: 0.5
        required_fields:
          - "sessionId"
          - "workspaceId"
          - "sessionDescription"
          - "sessionMemory"
          - "toolContext"
          - "primaryGoal"
          - "subgoal"
    - name: "format"
      weight: 1.0
      params:
        reward_value: 0.2

  # Custom reward functions (optional)
  custom:
    enabled: false
    module: null     # e.g. "my_project.rewards"
    file: null       # e.g. "./my_rewards.py" (relative to Trainers/rtx3090_grpo/)
    functions: []    # list of {name, weight, params}

# Weights & Biases (optional)
wandb:
  enabled: false
  project: null
  run_name: null
  entity: null

seed: 42
