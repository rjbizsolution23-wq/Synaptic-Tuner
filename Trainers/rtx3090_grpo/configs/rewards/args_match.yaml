# Args Match Reward
# Validates predicted useTools args match ground truth from dataset
#
# Model outputs useTools with: {"context": {...}, "calls": [...]}
# Ground truth has same structure - direct comparison possible

name: args_match
description: Validates useTools arguments match ground truth from dataset

inherit: _schema.yaml

scope: arguments

# Ground truth comes from dataset as JSON string
ground_truth:
  field: ground_truth_args_json
  parse: json  # Parse JSON string before comparing

# What to compare - explicit field mappings
# Since model output and ground truth have SAME structure (useTools format),
# we compare matching paths directly.
comparison:
  mappings:
    # Context: sessionId
    - pred_path: "context.sessionId"
      gt_path: "context.sessionId"
      weight: 0.1
      strategy: equals

    # Context: workspaceId
    - pred_path: "context.workspaceId"
      gt_path: "context.workspaceId"
      weight: 0.1
      strategy: equals

    # Context: memory (fuzzy match - contains key info)
    - pred_path: "context.memory"
      gt_path: "context.memory"
      weight: 0.1
      strategy: contains

    # Context: goal
    - pred_path: "context.goal"
      gt_path: "context.goal"
      weight: 0.1
      strategy: contains

    # Calls: agent name
    - pred_path: "calls.0.agent"
      gt_path: "calls.0.agent"
      weight: 0.15
      strategy: equals

    # Calls: tool name
    - pred_path: "calls.0.tool"
      gt_path: "calls.0.tool"
      weight: 0.15
      strategy: equals

    # Calls: params (key overlap)
    - pred_path: "calls.0.params"
      gt_path: "calls.0.params"
      weight: 0.3
      strategy: key_overlap

# Scoring
scoring:
  strategy: weighted
