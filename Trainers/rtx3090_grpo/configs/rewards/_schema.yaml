# Shared Schema Reference for GRPO Rewards
# All reward rubrics inherit from this

# Path to tool schema (source of truth for structure)
tool_schema_path: ../../../Evaluator/config/tool_schema.yaml

# Model output format: useTools wrapper
# The model outputs a SINGLE tool call named "useTools" with structured arguments:
#
#   function.name: "useTools"
#   function.arguments: {
#     "context": {
#       "workspaceId": "...",
#       "sessionId": "...",
#       "memory": "...",
#       "goal": "..."
#     },
#     "calls": [
#       {
#         "agent": "vaultManager",
#         "tool": "openNote",
#         "params": {"path": "..."}
#       }
#     ]
#   }
#
# Ground truth format (from dataset ground_truth_args_json) uses the SAME structure.
# This means we can compare parsed_args directly against ground truth.

# Parsing is handled by shared/validation/parsing/tool_call_parser.py
# which auto-detects format (Qwen <tool_call>, Mistral [TOOL_CALLS], etc.)
parsing:
  # Arguments may be JSON string (escaped) or dict
  arguments_format: json_string_or_dict

  # Auto-detect model format (qwen, mistral, openai)
  auto_detect: true

  # Expected tool name
  expected_tool_name: useTools
