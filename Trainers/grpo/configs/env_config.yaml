# ============================================================================
# Cloud-first environment-backed GRPO configuration
# Uses the Unsloth Docker image as the base CUDA/PyTorch runtime, but expects
# a dedicated isolated virtualenv for newer TRL/OpenEnv dependencies.
# ============================================================================

model:
  # Use a merged/published SFT model on Hugging Face for env-GRPO.
  model_name: "professorsynapse/Nexus-Quark-L2.5.28"
  max_seq_length: 8192
  chat_template: null

dataset:
  dataset_name: "professorsynapse/nexus-synthetic-data"
  dataset_file: "environment_rollouts/canonical/vault_shared_seed_dynamic_roles_aggregate_20260316.jsonl"
  local_file: null
  num_proc: 1

training:
  output_dir: "./env_grpo_output"
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 1
  num_generations: 4
  max_prompt_length: 4096
  max_completion_length: 220
  temperature: 0.6
  learning_rate: 5e-6
  weight_decay: 0.0
  warmup_ratio: 0.05
  lr_scheduler_type: "cosine"
  num_train_epochs: 1
  max_steps: -1
  beta: 0.04
  fp16: false
  bf16: true
  optim: "adamw_8bit"
  logging_steps: 1
  save_steps: 25
  save_total_limit: 2
  report_to: "none"
  use_vllm: false
  vllm_mode: "colocate"
  extra_args:
    top_p: 0.9
    repetition_penalty: 1.1

lora:
  enabled: true
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  bias: "none"
  task_type: "CAUSAL_LM"
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

env_training:
  backend: "trl_rollout_func"
  require_environment_passed: true
  require_environment_config: true
  required_stage_reviews:
    - "environment_generation"
    - "final"
  debug_rollouts_path: "{run_dir}/logs/rollouts.jsonl"
  allow_transformers_rollout_func: true
  max_turns: 6
  max_tool_steps: 8
  prompt_augmentation:
    system_append: |-
      For multi-step workspace requests, tend toward completing the requested sequence with tool-only turns before answering. When a tool result gives enough information for the next requested step, continue with that next useful tool action instead of asking whether to proceed. Ask for clarification only when the next action is ambiguous, broad, destructive, or not already requested by the user. After the requested tool work is complete, stop calling tools and respond with concise text summarizing the result.
    insert_if_missing: true

  # Token-faithful (POLAR-style) multi-turn rollout serialization.
  # When true, the rollout preserves the full interleaved token sequence and
  # emits a per-token env_mask (model tokens=1, external context tokens=0) so
  # GRPO trains on exactly the tokens the model sampled while still conditioning
  # on the real tool-result / user-feedback context. Single-turn episodes are
  # byte-identical either way. Requires trl>=0.28.0 (env_mask support); the
  # rollout builder auto-falls back to the legacy flattened path otherwise.
  token_faithful: true
  # "mask" = faithful interleaved sequence + env_mask. "drop" = legacy flattened
  # behavior (assistant turns concatenated, context tokens dropped). Use "drop"
  # only for A/B comparison.
  context_token_policy: mask

  runtime:
    # Keep using the shared Unsloth image for cloud jobs, but isolate modern
    # env-GRPO deps in a venv so we don't destabilize existing trainers.
    cloud_base_image: "unsloth/unsloth:2026.1.2-pt2.9.0-cu12.8-update@sha256:5266c57be21059bfb407d80dc2f448868a5c2e2dbe7b2aa27780f48b48cbec39"
    repo_root_in_container: "/workspace/repo"
    isolated_venv_dir: "/workspace/.venvs/grpo-openenv"
    local_venv_dir: ".venvs/grpo-openenv"
    project_pip_deps:
      - "pyyaml"
      - "python-dotenv"
      - "rich"
      - "datasets"
    python_packages:
      - "huggingface_hub<1.0"
      - "trl>=0.28.0"  # env_mask loss-mask support for token-faithful rollouts
      - "transformers>=4.56.0"
      - "accelerate>=1.6.0"
      - "peft>=0.15.0"
      - "git+https://github.com/meta-pytorch/OpenEnv.git"

rewards:
  success_reward: 1.5
  failure_penalty: -0.5
  step_penalty: 0.02
  max_tool_steps_penalty: 0.25
  text_before_completion_penalty: 0.75
  require_final_text_satisfied: true
  final_text_failure_penalty: 0.75
  no_tool_call_penalty: 0.35
  tool_call_parse_reward: 0.15
  expected_tool_reward: 0.18
  expected_tool_order_reward: 0.08
  final_text_satisfied_reward: 0.2
  max_progress_reward: 0.7
  tool_text_mix_penalty: 0.35
  placeholder_path_penalty: 0.25
  invalid_wrapper_arg_penalty: 0.35
  tool_status_rewards:
    ok: 0.04
    error: -0.15
    blocked: -0.15
  environment_issue_penalties:
    error: 0.05
    warning: 0.01
  wrapper_name: "useTools"
  wrapper_cli_field: "tool"
  placeholder_patterns:
    - "<result_file_path>"
    - "<path>"
    - "result_file_path"
