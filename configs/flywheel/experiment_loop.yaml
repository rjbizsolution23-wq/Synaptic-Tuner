# Autonomous Experiment Loop configuration
# See shared/flywheel/experiment_config.py for field documentation

experiment_loop:
  max_experiments: 20
  max_steps_per_experiment: 200
  trainer_type: "sft"
  eval_backend: "local"
  search_strategy: "llm_surrogate"
  surrogate_retrain_every: 5
  surrogate_phase_threshold: 10

  search_space:
    learning_rate: [5e-5, 1e-4, 2e-4, 5e-4]
    r: [8, 16, 32, 64]
    lora_alpha: [16, 32, 64, 128]
    num_train_epochs: [1, 2]
    warmup_ratio: [0.02, 0.05, 0.1]
    weight_decay: [0.0, 0.01, 0.05]
    evolutionary.enabled: [true, false]
    evolutionary.noise_scale: [0.01, 0.03, 0.05]
