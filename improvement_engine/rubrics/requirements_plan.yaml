name: Requirements vs Plan
description: Ensures requirements and plan are distinct (prerequisites vs execution
  steps)
scope: thinking
pass_threshold: 0.8
judge_prompt: "## Requirements vs Plan Distinction Check\n\nVerify requirements and\
  \ plan are properly separated.\n\n**REQUIREMENTS = Prerequisites (what must be TRUE):**\n\
  - Use CHECK, VERIFY, CONFIRM, EXISTS language\n- Ask \"What must be true before\
  \ proceeding?\"\n- Check state BEFORE acting\n- Focus on: file existence, current\
  \ state, no conflicts\n- NEVER mention permissions (always assumed available)\n\
  - Examples:\n  - \"config.yaml exists\"\n  - \"no uncommitted changes\"\n  - \"\
  target path doesn't already exist\"\n\n**PLAN = Execution steps (what to DO):**\n\
  - Use EXECUTE, READ, WRITE, UPDATE, CREATE language\n- State \"Here's what I'll\
  \ do\"\n- Describe actions to take\n- Examples:\n  - \"Read current config\"\n \
  \ - \"Update version field\"\n  - \"Write changes to file\"\n\n**PROBLEMS:**\n-\
  \ Requirements that are actions: \"Update the file\" in requirements\n- Plan items\
  \ that are checks: \"Verify file exists\" in plan\n- Duplicates between requirements\
  \ and plan\n- Requirements mentioning permissions: \"have write access\"\n\n**Examples:**\n\
  \nBAD requirements: [\"Batch content edits\", \"Modifying existing content\"]\n\
  BAD plan: [\"Batch content edits\", \"Modifying existing content\"]\n(These are\
  \ identical and neither is properly categorized)\n\nGOOD requirements: [\"file.md\
  \ exists\", \"no pending changes\"]\nGOOD plan: [\"Read file.md\", \"Update content\"\
  , \"Write back\"]\n\n\n**SCORING:**\n- **1.0** = Perfect distinction, requirements\
  \ are prerequisites, plan is execution\n- **0.7-0.9** = Good distinction, minor\
  \ overlap\n- **0.4-0.6** = Significant overlap or confusion\n- **0.0-0.3** = Requirements\
  \ and plan are duplicates or completely swapped\n\n**OUTPUT:**\nReturn JSON with\
  \ single field: `requirementsplan_score` (0.0-1.0)"
output_schema:
  type: object
  properties:
    requirementsplan_score:
      type: number
      minimum: 0.0
      maximum: 1.0
      description: Score for Requirements vs Plan
  required:
  - requirementsplan_score
  additionalProperties: false
