name: System Prompt Format
description: Validates system prompt has all required sections with realistic content
scope: system_prompt
pass_threshold: 0.9

judge_prompt: |
  # CONTEXT
  You are evaluating a system prompt for an Obsidian vault management assistant. The system prompt provides context about the vault structure, available workspaces, and agents.

  # MISSION
  Score based on structural completeness and internal consistency between vault_structure and workspaceStructure.

  # INSTRUCTIONS
  1. Verify all 5 required XML sections:
     - `<session_context>` with sessionId and workspaceId
     - `<vault_structure>` with root-level folders and files
     - `<available_workspaces>` with 1-2 workspace definitions
     - `<available_agents>` with 2-3 agent definitions (YAML)
     - `<selected_workspace>` with JSON (context, workspaceStructure, recentFiles, keyFiles, workflows, preferences, sessions)

  2. Check hierarchy consistency:
     - vault_structure shows ROOT level only (top-level folders and root files)
     - workspaceStructure shows paths INSIDE the workspace's rootFolder
     - Target file appears in correct location based on workspace
     - **CRITICAL**: If workspace rootFolder is not "/", that folder MUST appear in vault_structure

  3. Verify workspace selection:
     - Root workspace: id="default", rootFolder="/"
     - Folder workspace: rootFolder matches where target file lives
     - **Folder workspace rootFolder MUST exist in vault_structure** (e.g., if rootFolder="Vehicles/", then "Vehicles/" must be listed in vault_structure)

  4. Check workflows are USER patterns (NOT task-specific):
     - VALID: "Weekly Review", "Content Publishing", "Morning Routine", "Research Process"
     - INVALID: "DeleteFileWorkflow", "FileCleanupProcess", "MoveToArchiveWorkflow"
     - Workflows should represent user's productivity habits, not mirror the current request

  # GUIDELINES
  - Score 1.0: All sections present, hierarchy consistent, realistic workflows
  - Score 0.7-0.9: All sections present, minor inconsistencies
  - Score 0.4-0.6: Missing 1-2 sections, hierarchy issues, OR task-specific workflows
  - Score 0.0-0.3: Missing 3+ sections

  # FORMAT
  Return JSON: `{"systempromptformat_score": 0.0-1.0}`

improver_prompt: |
  # CONTEXT
  You are improving a system prompt for an Obsidian vault management assistant.

  **Current System Prompt:**
  ```
  {current_content}
  ```

  **User Request:** {user_request}
  **Assistant Response:** {assistant_response}

  # MISSION
  Generate an improved system prompt with all 5 required sections and consistent hierarchy.

  # INSTRUCTIONS

  ## 1. Determine workspace based on file location
  - File at vault ROOT (e.g., "Tech Specs Old.md"): Use default workspace (id="default", rootFolder="/")
  - File inside folder (e.g., "Content/Doc.md"): Use workspace with matching rootFolder

  ## 2. Build <session_context>
  ```
  <session_context>
  IMPORTANT: When using tools, include these values in your tool call parameters:

  - sessionId: "[preserve from original]"
  - workspaceId: "[default or preserve from original]"

  Include these in the "context" parameter of your tool calls.
  </session_context>
  ```

  ## 3. Build <vault_structure> (ROOT level only)
  ```
  <vault_structure>
  Folders:
   - Content/
   - Projects/
   - Archive/

  Files:
   - README.md
   - [only files at vault root]
  </vault_structure>
  ```
  Show top-level folders. Files inside folders go in workspaceStructure instead.

  ## 4. Build <available_workspaces>
  ```
  <available_workspaces>
  - [Name] (id: "[id]")
    Description: [Purpose]
    Root folder: [/ or specific folder]
  </available_workspaces>
  ```
  Root workspace uses id: "default"

  ## 5. Build <available_agents> (YAML)
  ```
  <available_agents>
  - name: [AgentName]
    description: [Specialization]

  - name: [AgentName]
    description: [Specialization]
  </available_agents>
  ```
  Include 2-3 agents relevant to the task.

  ## 6. Build <selected_workspace>
  ```
  <selected_workspace name="[Name]" id="[id]">
  This workspace is currently selected.

  {{
    "context": {{
      "id": "[id]",
      "name": "[Name]",
      "description": "[Purpose]",
      "rootFolder": "[/ or Content/]"
    }},
    "workspaceStructure": [
      {{
        "path": "",
        "type": "folder",
        "children": ["file.md", "subfolder/"]
      }}
    ],
    "recentFiles": [],
    "keyFiles": ["[target file]"],
    "workflows": [
      {{
        "name": "[Contextual workflow for this workspace]",
        "steps": ["[Step 1]", "[Step 2]", "[Step 3]"]
      }}
    ],
    "preferences": "[Format and organization preferences]",
    "sessions": []
  }}
  </selected_workspace>
  ```

  # GUIDELINES
  - vault_structure and workspaceStructure complement each other (no overlap)
  - Use path: "" for root of workspace (files directly in rootFolder)
  - Include target file in keyFiles
  - **CRITICAL**: If workspace rootFolder is NOT "/", that folder MUST appear in vault_structure
    - Example: rootFolder="Vehicles/" → vault_structure must include "Vehicles/"
    - Example: rootFolder="Projects/AI Research/" → vault_structure must include "Projects/"

  ## WORKFLOWS - CRITICAL
  Workflows are the USER'S personal productivity patterns - NOT related to the current task.
  Infer appropriate workflows from the WORKSPACE CONTEXT (folder names, file types, vault purpose).

  **How to derive workflows:**
  - Content/Writing workspace → "Content Creation" - ["Brainstorm ideas", "Create outline", "Draft content", "Edit and polish"]
  - Projects workspace → "Project Kickoff" - ["Define scope", "Create task list", "Set milestones"]
  - Job Search vault → "Application Process" - ["Research company", "Tailor resume", "Draft cover letter"]
  - Research workspace → "Literature Review" - ["Collect sources", "Extract key points", "Synthesize findings"]
  - Meeting Notes folder → "Meeting Capture" - ["Create from template", "Record decisions", "Assign action items"]

  **WRONG examples** (task-specific - DO NOT USE):
  - "DeleteFileWorkflow" - mirrors what assistant will do
  - "FileCleanupProcess" - describes the current task
  - "MoveToArchiveWorkflow" - just restates the request
  - Any workflow that describes what the assistant is about to do

  # FORMAT
  Output ONLY the improved system prompt. No JSON wrapper, no markdown blocks.

output_schema:
  type: object
  properties:
    systempromptformat_score:
      type: number
      minimum: 0.0
      maximum: 1.0
      description: Score for System Prompt Format
  required:
    - systempromptformat_score
  additionalProperties: false

schema_validation:
  types: [xml, json, yaml, regex]
  xml:
    required_tags:
      - '<session_context>'
      - '<vault_structure>'
      - '<available_workspaces>'
      - '<available_agents>'
      - '<selected_workspace'
  json:
    sections:
      - tag: 'selected_workspace'
        extract_pattern: '\{[\s\S]*\}'
        required_fields:
          - 'context'
          - 'workspaceStructure'
          - 'recentFiles'
          - 'sessions'
          - name: 'workflows'
            type: 'array'
            min_items: 1
          - name: 'keyFiles'
            type: 'array'
            min_items: 1
          - name: 'preferences'
            type: 'string'
            min_length: 1
        # Extract values for cross-reference validation
        extract:
          - path: 'context.rootFolder'
            as: 'workspace_root'
            skip_if: '/'
  yaml:
    sections:
      - tag: 'available_agents'
        min_items: 2
        item_fields: ['name', 'description']
  # Cross-reference: workspace rootFolder must exist in vault_structure
  regex:
    patterns:
      - pattern: '{workspace_root}'
        in_tag: 'vault_structure'
        description: 'Workspace rootFolder must exist in vault_structure'
