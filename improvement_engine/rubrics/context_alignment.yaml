name: Context Alignment
description: Ensures goal and memory align with what the user actually requested
scope: response
pass_threshold: 0.9
judge_prompt: "## Context Alignment Check\n\nVerify the thinking block addresses the\
  \ user's ACTUAL request.\n\n**MISALIGNMENT (problem):**\n- Goal describes a different\
  \ task than user requested\n- Memory references unrelated files, operations, or\
  \ context\n- Requirements checking for wrong file types or locations\n- Plan steps\
  \ that don't achieve user's stated goal\n- Thinking about file X when user asked\
  \ about file Y\n\n**ALIGNED (correct):**\n- Goal directly addresses what user asked\
  \ for\n- Memory provides relevant context for THIS request\n- Requirements verify\
  \ prerequisites for the actual operation\n- Plan steps would accomplish the user's\
  \ stated goal\n\n**Examples:**\n\nUser: \"Add 'New entry' to log.md\"\nBAD goal:\
  \ \"Append 'Reviewed on 2025-12-07' to notes/meeting_notes.txt\"\nBAD memory: \"\
  User wants to add timestamped review to meeting notes\"\nGOOD goal: \"Append 'New\
  \ entry' to log.md\"\nGOOD memory: \"User requested adding new entry to log file\"\
  \n\nUser: \"Read config.yaml\"\nBAD: Thinking discusses database queries or different\
  \ files\nGOOD: Thinking focuses on reading config.yaml\n\n\n**SCORING:**\n- **1.0**\
  \ = Perfect alignment, goal and memory match user request exactly\n- **0.7-0.9**\
  \ = Good alignment, minor interpretation differences\n- **0.4-0.6** = Partial misalignment,\
  \ some context mismatch\n- **0.0-0.3** = Major misalignment, addressing wrong request\n\
  \n**OUTPUT:**\nReturn JSON with:\n- `context_score`: 0.0-1.0 alignment score\n-\
  \ `goal_matches_request`: boolean\n- `memory_matches_context`: boolean  \n- `plan_achieves_goal`:\
  \ boolean\n- `misaligned_elements`: list of mismatched parts\n- `context_feedback`:\
  \ brief explanation"
output_schema:
  type: object
  properties:
    alignment_score:
      type: number
      minimum: 0.0
      maximum: 1.0
    goal_matches_request:
      type: boolean
    memory_is_relevant:
      type: boolean
    plan_achieves_goal:
      type: boolean
    misaligned_elements:
      type: array
      items:
        type: string
    alignment_feedback:
      type: string
  required:
  - alignment_score
  - goal_matches_request
  - memory_is_relevant
  - plan_achieves_goal
  - misaligned_elements
  - alignment_feedback
  additionalProperties: false
