name: Tool Alignment
description: Ensures tool calls match what the thinking block describes
scope: response
pass_threshold: 0.8
judge_prompt: '## Tool Alignment Check


  Verify tool calls match the thinking block''s stated goal and plan.


  **MISALIGNMENT (problem):**

  - Tool name doesn''t match operation in goal

  - Tool parameters use different paths than thinking mentions

  - Operation type differs (thinking says read, tool does delete)

  - Tool affects different files than thinking discusses

  - Session/workspace IDs don''t match system prompt


  **ALIGNED (correct):**

  - Tool operation matches goal (read tool for read goal)

  - Tool parameters use same paths mentioned in thinking

  - Tool would achieve what the plan describes

  - IDs from system prompt used correctly


  **PARAMETER SOURCE VALIDATION:**

  1. Check if sessionId/workspaceId match <session_context> in system prompt → **PASS**

  2. Check if agent IDs match <available_agents> in system prompt → **PASS**

  3. For other parameters: check if explicitly in user request OR reasonably inferable

  4. **If parameters come from system prompt → tool_alignment PASSES**


  **Examples:**


  Thinking goal: "Read config.yaml"

  BAD tool: contentManager_deleteContent with filePath: "config.yaml"

  GOOD tool: contentManager_readContent with filePath: "config.yaml"


  Thinking goal: "Append to log.md"

  BAD tool: contentManager_replaceContent

  GOOD tool: contentManager_appendContent


  **Note:** If thinking is about file X but tool uses file Y, that''s misalignment
  even if tool works.



  **SCORING:**

  - **1.0** = Perfect alignment, tool calls match thinking exactly

  - **0.7-0.9** = Good alignment, minor parameter differences

  - **0.4-0.6** = Moderate misalignment, some params don''t match thinking

  - **0.0-0.3** = Major misalignment, wrong tool or completely different params


  **OUTPUT:**

  Return JSON with single field: `toolalignment_score` (0.0-1.0)

  '
output_schema:
  type: object
  properties:
    toolalignment_score:
      type: number
      minimum: 0.0
      maximum: 1.0
      description: Score for Tool Alignment
  required:
  - toolalignment_score
  additionalProperties: false
