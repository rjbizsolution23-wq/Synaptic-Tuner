name: Factuality
description: Ensures all details are grounded in system prompt or user request
scope: [thinking, response]
pass_threshold: 0.8

judge_prompt: |
  # CONTEXT
  You are evaluating whether content contains only factual information from the system prompt and user request. The thinking block's memory field is particularly prone to inventing dates, history, and motivations.

  **Content to Evaluate:**
  ```
  {current_content}
  ```

  **System Prompt (ground truth):**
  ```
  {system_prompt}
  ```

  **User Request:**
  ```
  {user_request}
  ```

  # MISSION
  Score based on whether all details can be traced to the inputs. High-quality training data contains only verifiable information.

  # INSTRUCTIONS
  1. Check the "memory" field carefully for invented details:
     - Dates like "Oct 12", "2025-12-07" (only valid if in inputs)
     - History like "user has been working on", "was requested on"
     - Motivations like "after reviewing", "to restructure"

  2. Check for valid information sources:
     - Exact text from system prompt or user request
     - Paraphrases of input information
     - Tool and agent names from system prompt
     - Logical inferences (e.g., "delete is irreversible")
     - General domain knowledge (e.g., "markdown files use .md")

  3. Score based on grounding:
     - 1.0: All details traceable to inputs or reasonable inference
     - 0.7-0.9: Minor details without source
     - 0.4-0.6: Several invented details
     - 0.0-0.3: Major fabrications

  # GUIDELINES
  - Memory should describe user's intent from their request
  - Dates are almost always fabricated unless explicitly stated
  - "User wants to X" is valid; "User has been doing X since..." is fabrication

  # FORMAT
  Return JSON: `{"factuality_score": 0.0-1.0}`

improver_prompt: |
  # CONTEXT
  You are improving content to ensure all details are grounded in the system prompt or user request.

  **Current Content:**
  ```
  {current_content}
  ```

  **System Prompt (ground truth):**
  ```
  {system_prompt}
  ```

  **User Request:**
  ```
  {user_request}
  ```

  # MISSION
  Generate improved content where every detail can be traced to the inputs.

  # INSTRUCTIONS FOR THINKING BLOCKS (JSON with goal, memory, etc.)
  If the content is a JSON thinking block:
  1. **Fix the memory field**:
     - Replace invented history with simple intent statement
     - Remove dates unless they appear in inputs
     - Example: "User wants to remove obsolete documentation"

  2. **Fix file paths**:
     - Only use paths that exist in vault_structure or workspaceStructure
     - If a path doesn't exist, use a generic description instead

  3. **Output the fixed JSON**

  # INSTRUCTIONS FOR ASSISTANT RESPONSES (plain text)
  If the content is a plain text response:
  1. **Keep the response natural and conversational**
  2. **Don't reference files/dates not in the system prompt**
  3. **If the response discusses a file that doesn't exist in vault_structure, rewrite to be generic**
  4. **DO NOT output YAML or structured data - output natural language text**
  5. **The response should directly address the user's request**

  # GUIDELINES
  - Simple statements are better than invented context
  - Trust the system prompt for file locations
  - For responses: write natural language, NOT structured data

  # FORMAT
  Output ONLY the improved content.
  - For thinking: output valid JSON
  - For responses: output natural language text (NOT YAML, NOT JSON)

output_schema:
  type: object
  properties:
    factuality_score:
      type: number
      description: Score for Factuality
  required:
  - factuality_score
  additionalProperties: false

# Unified validations format
validations:
  # Cross-scope validation: Check file paths from thinking/response against system_prompt
  - cross_scope:
      from: thinking
      to: system_prompt
      extract:
        fields: [goal, memory, requirements, plan]
        pattern: '(?:[A-Za-z0-9_-]+/)*[A-Za-z0-9_-]+\.(?:md|txt|json|yaml|yml)'
      skip_if:
        - pattern: '(?:create|new|generate|add)\s+.*{value}'
        - pattern: '{value}.*(?:will be created|does not exist yet)'
      validate_in: [vault_structure, selected_workspace]
    error: "HALLUCINATED PATH: '{value}' not found in vault_structure or workspaceStructure"
