llm:
  # Cloud defaults (used as CLI defaults; API keys live in root .env)
  provider: openrouter
  model: openai/gpt-5-mini  # Verified working model
  temperature: 0.3
  max_tokens: 2048

batch:
  # Default batch size for processing (can override with --batch-size flag)
  default_size: 10
  max_iterations: 3  # Max judge+improve loops per example
