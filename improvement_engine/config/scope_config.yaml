# Scope Configuration
# Defines all scope-specific patterns, markers, and processing rules
# This eliminates hardcoding from the codebase

scopes:
  # System prompt scope
  system_prompt:
    description: "System message that sets context for the assistant"
    conversation_role: "system"
    extraction:
      method: "role_based"  # Extract by conversation role
      role: "system"
    markers: {}

  # Thinking block scope
  thinking:
    description: "Structured reasoning block in assistant response"
    conversation_role: "assistant"
    extraction:
      method: "pattern"  # Extract using regex pattern
      pattern: "<thinking>(.*?)</thinking>"
      flags: ["DOTALL"]
    markers:
      start: "<thinking>"
      end: "</thinking>"
    format:
      primary: "json"  # Preferred format
      fallback: "yaml"  # Alternative format to try parsing

  # Tool calls scope
  # NOTE: This is for parsing TEXT representations of tool calls
  # that appear in assistant response content (e.g., when LLM writes
  # tool calls as text before they're converted to structured format).
  #
  # The structured tool_calls field in conversations uses the standard
  # OpenAI format and doesn't need this parsing.
  #
  # Different LLMs may output tool calls in different text formats,
  # so these markers/patterns are configurable.
  tool_calls:
    description: "Structured tool invocations in assistant response"
    conversation_role: "assistant"
    extraction:
      method: "pattern"
      patterns:
        - name_pattern: "(tool_name|tool_call):\\s*(.+)"
          args_pattern: "arguments:\\s*\\n(.+?)(?=\\n\\S|\\Z)"
    markers:
      block_start: "[TOOL_CALL]"
      block_start_alt: "[TOOL_CALLS]"  # Alternative marker
      name_prefix: "tool_name:"
      name_prefix_alt: "tool_call:"
      args_prefix: "arguments:"

  # Response scope (text without thinking/tools)
  response:
    description: "Plain text response from assistant"
    conversation_role: "assistant"
    extraction:
      method: "exclusion"  # Extract by excluding other scopes
      exclude:
        - thinking
        - tool_calls

# Processing order for improvements
# Scopes are processed in this order when multiple scopes fail
scope_processing_order:
  - system_prompt
  - user
  - thinking
  - response

# LLM configuration for improvement engine
llm:
  # Temperature for improvement calls (lower = more conservative)
  improvement_temperature: 0.3

  # Temperature for judge calls (0 = deterministic)
  judge_temperature: 0.0

  # Max tokens for improvement generation
  improvement_max_tokens: 2000

  # Max tokens for judge evaluation
  judge_max_tokens: 1000

# Judge prompt configuration
judge:
  # Field name for combined feedback in judge output
  feedback_field: "overall_feedback"

  # Score field naming pattern (rubric_key + this suffix)
  score_field_suffix: "_score"

  # Prompt structure
  prompt_structure:
    header: "You are evaluating an AI assistant's response against multiple quality criteria."
    section_separator: "="
    section_width: 60
    sections:
      - name: "EVALUATION CRITERIA"
        content_source: "rubric_prompts"
      - name: "SCHEMA VALIDATION RESULTS"
        content_source: "validation_results"
        optional: true
      - name: "EXAMPLE TO EVALUATE"
        content_source: "example_content"
      - name: "YOUR EVALUATION"
        content_source: "evaluation_instructions"

# Schema validation
validation:
  # Schema field name suffix in judge scores
  schema_score_suffix: "_schema"

  # Icons for validation results
  icons:
    passed: "✅"
    failed: "❌"

# Output formatting
output:
  # Whether to use markdown code fences in prompts
  use_code_fences: true

  # Code fence language tags
  code_fence_languages:
    json: "json"
    yaml: "yaml"
    text: ""
