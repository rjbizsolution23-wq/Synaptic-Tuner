# System Prompts for LLM-based Improvement

improvement_prompt: |
  You are an expert at improving thinking blocks for AI training data.

  **YOUR TASK:** Analyze the provided thinking block and IMPROVE IT by fixing all quality issues.

  ## STEP 1: Identify Issues

  Check for these common problems:
  - ❌ Vague goal without specifics (files, versions, exact action)
  - ❌ Generic memory without WHY/WHEN/numbers
  - ❌ Requirements that are actions instead of safety checks
  - ❌ Requirements and Plan are duplicates
  - ❌ Wrong risk/complexity assessment
  - ❌ Confidence not calibrated to risk

  ## STEP 2: Apply These Improvements

  1. **GOAL** - Make ultra-specific:
     - MUST include file paths, version numbers, or entity names
     - MUST state exact action with details
     - Example Fix:
       ❌ "Update version and changelog"
       ✅ "Update package.json version from 2.0.0 to 2.1.0 and prepend v2.1.0 release notes to CHANGELOG.md"

  2. **MEMORY** - Add rich context (min 50 chars):
     - MUST include WHY (motivation/rationale)
     - MUST include WHEN (timeline/sequence)
     - MUST include numbers/metrics/dates
     - Example Fix:
       ❌ "Actively refining content and structure"
       ✅ "User completed v2.1.0 feature development on Nov 18. Last release was v2.0.0 on Nov 10 (3 weeks ago). Now preparing Nov 20 deployment with 5 new features and 3 bug fixes documented."

  3. **REQUIREMENTS** - What needs to be true before proceeding (MUST be distinct from plan):
     - Plain language list of prerequisites focusing on data/state, not permissions
     - Focus on: file/folder existence, current state, no conflicts, having needed info
     - NEVER INCLUDE: Any permission/access checks - these are ALWAYS available in this environment
     - DON'T mention: "write permission", "read permission", "access rights", "user has permission", "can access", "is writable", "is readable"
     - Requirements ask: "Do I have everything I need to perform this action?"
     - Example Fix:
       ❌ ["Batch content edits", "Modifying existing content"]
       ❌ ["Have write permissions", "User has permission", "File is writable", "Can access file"]
       ✅ ["package.json exists with version field", "current version is 2.0.0", "no uncommitted changes", "target path doesn't already exist"]

  4. **PLAN** - Step-by-step what will happen (MUST be distinct from requirements):
     - Plain language list of steps that will be executed
     - Can include tool calls, verification steps, or other actions
     - Plan states: "Here's what I'll do"
     - Example Fix:
       ❌ ["Batch content edits", "Modifying existing content"]
       ✅ ["Check current version in package.json", "Update version to 2.1.0", "Add changelog entry for new release", "Verify changes saved correctly"]

  5. **ASSESSMENT.risky** - Set TRUE if modifying/deleting data:
     - TRUE: replace, delete, update, overwrite, move, batch operations
     - FALSE: read, list, search, get, query
     - Example Fix:
       ❌ risky: false (for batchContent with replace operations)
       ✅ risky: true (replace IS modifying data!)

  6. **CONFIDENCE** - Calibrate to risk:
     - 0.3-0.5: High risk (delete, replace, batch modifications)
     - 0.6-0.8: Medium risk (create, append, single updates)
     - 0.85-0.95: Low risk (read, search, list)
     - Example Fix:
       ❌ 0.96 (for risky replace operation)
       ✅ 0.65 (medium-high risk for batch replace)

  ## STEP 3: Return Improved Version

  You MUST return a MODIFIED thinking block with ALL issues fixed.
  Do NOT return the original unchanged.

  ## Example Transformation

  BEFORE (poor quality):
  ```json
  {
    "goal": "Update files",
    "memory": "Working on updates",
    "requirements": ["Edit content", "Update data"],
    "assessment": {"complex": false, "risky": false},
    "confidence": 0.95,
    "plan": ["Edit content", "Update data"]
  }
  ```

  AFTER (high quality):
  ```json
  {
    "goal": "Update config.yaml timeout from 30s to 60s in production environment",
    "memory": "User reported 3 timeout errors on Nov 15 during peak traffic (500 req/s). Last config change was Oct 20 when migrated to new servers. Increasing timeout to handle current load patterns.",
    "requirements": [
      "config.yaml exists in production directory",
      "current timeout value is 30s",
      "no other processes are actively editing config.yaml",
      "backup directory is available for storing backup"
    ],
    "assessment": {"complex": false, "risky": true},
    "confidence": 0.7,
    "plan": [
      "Check current timeout value in config.yaml",
      "Create backup of existing config.yaml",
      "Update timeout field to 60s",
      "Verify the change was saved correctly"
    ]
  }
  ```

  NOW IMPROVE THE PROVIDED THINKING BLOCK.

# Hallucination Detection Prompt
# Validates that thinking blocks only reference information from system/user prompts
hallucination_detection_prompt: |
  You are an expert at detecting hallucinations in AI reasoning.

  **YOUR TASK:** Determine if the thinking block contains HALLUCINATED information (made-up details not present in the input).

  ## What Counts as Hallucination?

  ❌ **HALLUCINATION** - Information NOT in system prompt or user request:
  - File paths, folder names, or file contents not mentioned
  - Version numbers, dates, or metrics not provided
  - User actions, motivations, or history not stated
  - Tool results or operation outcomes not given
  - Specific numbers (line counts, file sizes) not mentioned
  - Details about "previous sessions" or "earlier work" not referenced
  - Assumptions about workspace structure not shown

  ✅ **ALLOWED** - Information directly from inputs or reasonable inferences:
  - Exact text from system prompt or user request
  - Tool names and parameters from the conversation
  - Logical inferences (e.g., "delete is risky" - this is always true)
  - General domain knowledge (e.g., "recursive delete removes contents")
  - Direct quotes or paraphrases from the inputs

  ## Examples

  ### Example 1: HALLUCINATION

  **System Prompt:**
  ```
  sessionId: "session_123"
  workspaceId: "ws_456"
  ```

  **User Request:**
  ```
  Delete the old project files
  ```

  **Thinking Block:**
  ```json
  {
    "goal": "Delete Projects/Archive/Q1-2023/ folder",
    "memory": "User completed Q1 projects 3 months ago. Archive contains 47 files. Last accessed on Oct 15.",
    "requirements": ["Projects/Archive/Q1-2023/ exists", "No active processes using these files"]
  }
  ```

  **Verdict:** HALLUCINATED
  - ❌ "Projects/Archive/Q1-2023/" - specific path not mentioned
  - ❌ "completed Q1 projects 3 months ago" - timeline not provided
  - ❌ "47 files" - count not given
  - ❌ "Last accessed on Oct 15" - date not mentioned

  ### Example 2: ALLOWED

  **System Prompt:**
  ```
  sessionId: "session_123"
  workspaceId: "ws_456"
  ```

  **User Request:**
  ```
  I give you permission to delete Projects/Archive/Q1-2023/
  ```

  **Thinking Block:**
  ```json
  {
    "goal": "Delete the folder Projects/Archive/Q1-2023/ as authorized by user",
    "memory": "User explicitly authorized deletion of Projects/Archive/Q1-2023/",
    "requirements": ["Projects/Archive/Q1-2023/ exists", "User confirmed deletion"],
    "assessment": {"risky": true, "complex": false},
    "confidence": 0.9
  }
  ```

  **Verdict:** ALLOWED
  - ✅ "Projects/Archive/Q1-2023/" - directly from user request
  - ✅ "authorized by user" - user said "I give you permission"
  - ✅ "risky: true" - logical inference (delete is risky)
  - ✅ "confidence: 0.9" - reasonable for authorized operation

  ### Example 3: HALLUCINATION

  **System Prompt:**
  ```
  sessionId: "session_789"
  workspaceId: "ws_101"
  ```

  **User Request:**
  ```
  Create a new note for today's meeting
  ```

  **Thinking Block:**
  ```json
  {
    "goal": "Create Meeting-2024-12-09.md in Notes/Daily/ with template",
    "memory": "User has daily standup meetings at 10am. Last meeting note was created yesterday. Uses standard meeting template with attendees, agenda, and action items sections.",
    "requirements": ["Notes/Daily/ folder exists", "Meeting template available"]
  }
  ```

  **Verdict:** HALLUCINATED
  - ❌ "Meeting-2024-12-09.md" - specific filename not requested
  - ❌ "in Notes/Daily/" - location not specified
  - ❌ "10am standups" - schedule not mentioned
  - ❌ "Last meeting note was yesterday" - history not provided
  - ❌ "standard meeting template" - template not mentioned

  ## Your Task

  Analyze the provided thinking block against the system prompt and user request.

  Output JSON:
  ```json
  {
    "has_hallucination": true/false,
    "hallucinated_details": ["specific detail 1", "specific detail 2", ...],
    "confidence": 0.0-1.0,
    "explanation": "Brief explanation of verdict"
  }
  ```

  **CRITICAL:**
  - Be STRICT - any detail not in inputs = hallucination
  - Check goal, memory, requirements, and plan fields
  - Specific paths, numbers, dates MUST be in inputs
  - "User did X in the past" without evidence = hallucination

# Thinking Generation Prompt (No Hallucination)
# For generating NEW thinking blocks that don't hallucinate
thinking_generation_prompt: |
  You are an expert at generating high-quality thinking blocks for AI training data.

  **YOUR TASK:** Generate a thinking block based ONLY on the provided system prompt and user request.

  ## CRITICAL RULES - NO HALLUCINATION

  🚫 **NEVER MAKE UP:**
  - File paths, folder names, or locations not mentioned
  - Version numbers, dates, or metrics not provided
  - User history, past actions, or motivations not stated
  - Specific numbers (file counts, line numbers, sizes)
  - Details about previous sessions or earlier work
  - Assumptions about workspace structure not shown
  - Tool results or outcomes not yet executed

  ✅ **ONLY USE:**
  - Exact information from system prompt
  - Exact information from user request
  - Tool names and schemas (you know these)
  - Logical inferences about operations (e.g., "delete is risky")
  - General domain knowledge (e.g., "recursive operations affect contents")

  ## Thinking Block Structure

  Generate a JSON thinking block with:

  1. **goal** - What to accomplish (use ONLY paths/names from user request)
  2. **memory** - Context from inputs (NO made-up history or details)
  3. **requirements** - Prerequisites (use ONLY info from inputs)
  4. **assessment** - Risk/complexity (logical inference allowed)
  5. **confidence** - 0.0-1.0 (based on clarity and risk)
  6. **plan** - Steps to execute (use tool names, not invented paths)

  ## Examples

  ### Example 1: Correct (No Hallucination)

  **Inputs:**
  - System: sessionId, workspaceId
  - User: "Delete the archive folder"

  **Generated Thinking:**
  ```json
  {
    "goal": "Delete the archive folder as requested by user",
    "memory": "User requested deletion of archive folder",
    "requirements": [
      "Archive folder exists in workspace",
      "User confirmed deletion intent"
    ],
    "assessment": {"risky": true, "complex": false},
    "confidence": 0.6,
    "plan": [
      "Identify archive folder location",
      "Execute deleteFolder tool",
      "Confirm deletion completed"
    ]
  }
  ```

  ✅ No hallucination - stays general, no invented paths

  ### Example 2: Correct (Specific Path Given)

  **Inputs:**
  - System: sessionId, workspaceId
  - User: "I authorize you to delete Projects/Archive/Old/"

  **Generated Thinking:**
  ```json
  {
    "goal": "Delete Projects/Archive/Old/ folder as authorized by user",
    "memory": "User explicitly authorized deletion of Projects/Archive/Old/",
    "requirements": [
      "Projects/Archive/Old/ exists",
      "User provided explicit authorization"
    ],
    "assessment": {"risky": true, "complex": false},
    "confidence": 0.9,
    "plan": [
      "Execute vaultManager_deleteFolder on Projects/Archive/Old/",
      "Confirm deletion successful"
    ]
  }
  ```

  ✅ Uses exact path from user request, no added details

  ### Example 3: WRONG (Hallucination)

  **Inputs:**
  - System: sessionId, workspaceId
  - User: "Create a meeting note"

  **Generated Thinking (BAD):**
  ```json
  {
    "goal": "Create Meeting-2024-12-09.md in Notes/Daily/",
    "memory": "User has daily standup at 10am. Last note was yesterday.",
    "requirements": ["Notes/Daily/ exists", "Template file available"]
  }
  ```

  ❌ Hallucinated: specific filename, location, schedule, history

  **Generated Thinking (GOOD):**
  ```json
  {
    "goal": "Create a new note for meeting as requested",
    "memory": "User requested creation of meeting note",
    "requirements": ["User specifies note name/location", "Workspace is accessible"],
    "confidence": 0.5
  }
  ```

  ✅ Stays vague when details not provided

  ## Your Task

  Given system prompt and user request, generate a thinking block that:
  - Uses ONLY information from inputs
  - Stays general when specifics not provided
  - Makes logical inferences about risk/operations
  - Does NOT invent paths, numbers, dates, or history

  Output the thinking block as valid JSON.
