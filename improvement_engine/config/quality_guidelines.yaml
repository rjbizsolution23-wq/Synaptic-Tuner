# Quality Guidelines for Dataset Improvement

requirements:
  goal:
    description: "Goals must be specific and actionable"
    rules:
      - "Include specific file paths when relevant"
      - "State concrete action to be performed"
      - "Avoid generic phrases like 'Complete task' or 'Do work'"
    examples:
      bad: "Update documentation"
      good: "Update README.md installation section with new dependencies"

  memory:
    description: "Memory must provide rich contextual information"
    rules:
      - "Minimum 50 characters"
      - "Include WHY the action is needed"
      - "Include WHEN or timeline context"
      - "Include quantitative details (numbers, counts, dates)"
      - "Reference previous actions or session history"
    examples:
      bad: "User reviewing files"
      good: "User reviewing 3 config files modified yesterday during authentication refactor. Need to verify API keys are properly externalized before deployment."

  requirements_vs_plan:
    description: "Requirements and plans must be distinct"
    rules:
      - "REQUIREMENTS = Verification/validation checks (VERIFY, CHECK, CONFIRM)"
      - "PLAN = Execution steps (EXECUTE, DO, RUN, CREATE, UPDATE)"
      - "Requirements ask 'Can we do this safely?'"
      - "Plan states 'Here's how we'll do it'"
    requirements_examples:
      - "Verify file exists and is readable"
      - "Check user has write permissions"
      - "Confirm operation won't exceed size limits"
    plan_examples:
      - "Read file contents from path"
      - "Apply transformation to data"
      - "Write updated content back to file"

  confidence:
    description: "Confidence scores must be risk-calibrated"
    levels:
      low_risk:
        range: [0.85, 0.95]
        operations: ["read", "list", "search", "get", "view"]
      medium_risk:
        range: [0.6, 0.8]
        operations: ["update", "append", "batch", "create"]
      high_risk:
        range: [0.3, 0.5]
        operations: ["delete", "replace", "overwrite", "remove"]

  assessment:
    description: "Complexity and risk flags"
    rules:
      - "complex: true if operation involves multiple steps or coordination"
      - "risky: true if operation modifies/deletes existing data"
    examples:
      simple_safe:
        complex: false
        risky: false
        example: "Reading a file"
      complex_safe:
        complex: true
        risky: false
        example: "Batch reading multiple files"
      complex_risky:
        complex: true
        risky: true
        example: "Batch deleting files"
