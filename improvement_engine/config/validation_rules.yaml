# Validation Rules for Improved Examples

thinking_block_schema:
  required_fields:
    - goal
    - memory
    - requirements
    - assessment
    - confidence
    - plan

  field_types:
    goal: string
    memory: string
    requirements: array
    assessment: object
    confidence: number
    plan: array

  constraints:
    goal:
      min_length: 10
      max_length: 200

    memory:
      min_length: 50
      max_length: 1000

    requirements:
      min_items: 1
      max_items: 10
      item_type: string

    assessment:
      required_keys:
        - complex
        - risky
      types:
        complex: boolean
        risky: boolean

    confidence:
      min: 0.0
      max: 1.0
      type: float

    plan:
      min_items: 1
      max_items: 10
      item_type: string

example_structure:
  required_fields:
    - conversations
    - label

  conversations:
    min_items: 2
    item_structure:
      required:
        - role
        - content
      roles:
        - system
        - user
        - assistant
