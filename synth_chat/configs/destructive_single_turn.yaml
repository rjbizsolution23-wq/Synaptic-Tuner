# Single-Turn Destructive Action with User Permission
# User explicitly gives permission in their request, model executes with HIGH RISK + HIGH CONFIDENCE

destructive_tools:
  vaultManager:
    deleteFolder:
      tool_name: "vaultManager_deleteFolder"
      schema_key: "vaultManager_deleteFolder"
      risk_level: "HIGH"
      scenarios:
        - type: "old_projects"
          examples:
            - "Projects/Archive/Q1-2023/"
            - "Projects/Old/Legacy-CRM/"
            - "Archive/2022-Projects/"

        - type: "temp_folders"
          examples:
            - "Temp/Drafts/"
            - "Working/Scratch/"
            - "Temp/Test-Notes/"

        - type: "obsolete"
          examples:
            - "Archive/Deprecated/"
            - "Old-Notes/2021/"
            - "Projects/Cancelled/Phoenix/"

    deleteNote:
      tool_name: "vaultManager_deleteNote"
      schema_key: "vaultManager_deleteNote"
      risk_level: "HIGH"
      scenarios:
        - type: "duplicates"
          examples:
            - "Notes/Meeting-Notes-copy.md"
            - "Projects/Plan (1).md"
            - "Daily/2024-01-15-duplicate.md"

        - type: "old_drafts"
          examples:
            - "Drafts/Old-Ideas.md"
            - "Temp/Scratchpad-old.md"
            - "Archive/Notes-2022.md"

        - type: "test_files"
          examples:
            - "Temp/test.md"
            - "Sandbox/testing-123.md"
            - "Dev/sample-note.md"

  contentManager:
    deleteContent:
      tool_name: "contentManager_deleteContent"
      schema_key: "contentManager_deleteContent"
      risk_level: "MEDIUM"
      scenarios:
        - type: "sections"
          examples:
            - content: "## Old Ideas\n\nThese ideas are outdated..."
              description: "outdated ideas section"

            - content: "## Deprecated\n\nNo longer relevant..."
              description: "deprecated section"

        - type: "todos"
          examples:
            - content: "- [x] Complete project review\n- [x] Send emails"
              description: "completed todos"

            - content: "- [x] Old task 1\n- [x] Old task 2"
              description: "old completed tasks"

  agentManager:
    deleteAgent:
      tool_name: "agentManager_deleteAgent"
      schema_key: "agentManager_deleteAgent"
      risk_level: "MEDIUM"
      scenarios:
        - type: "experimental"
          examples:
            - id: "agt_exp_summary_v1"
              name: "Experimental Summarizer"

            - id: "agt_test_analytics"
              name: "Test Analytics Agent"

        - type: "unused"
          examples:
            - id: "agt_old_reporter"
              name: "Old Weekly Reporter"

            - id: "agt_deprecated_tracker"
              name: "Deprecated Task Tracker"

# User Permission Variations
# User explicitly confirms they want the destructive action
permission_patterns:
  explicit_permission:
    weight: 0.4
    templates:
      - "I give you permission to delete {target}"
      - "You have my permission to delete {target}"
      - "I authorize you to delete {target}"
      - "It's okay to delete {target}"
      - "I'm sure, delete {target}"

  confirmation_first:
    weight: 0.3
    templates:
      - "Yes, delete {target}"
      - "Confirmed, delete {target}"
      - "Go ahead and delete {target}"
      - "Please delete {target}, I confirm"
      - "Delete {target}, I'm certain"

  specific_instruction:
    weight: 0.3
    templates:
      - "Delete {target} for me"
      - "Remove {target} please"
      - "Get rid of {target}"
      - "Delete {target}"
      - "I need {target} deleted"

# Thinking Block Template
# Shows HIGH RISK + HIGH CONFIDENCE pattern
thinking_template: |
  <thinking>
  Understanding the Request:
  - User requests deletion of: {target_description}
  - Target: {specific_target}
  - Operation: {operation_type}

  Risk Assessment:
  - Risk Level: {risk_level}
  - Impact: {impact_description}
  - Irreversibility: This action cannot be undone
  {additional_risks}

  Requirements Check:
  ✓ Specific target identified: {specific_target}
  ✓ User explicitly authorized deletion: "{user_permission_phrase}"
  ✓ Target exists in workspace: {target_location}
  ✓ Tool available: {tool_name}
  {additional_requirements}

  Confidence Assessment:
  - Confidence Level: {confidence_level}/10 (HIGH)
  - User provided explicit permission
  - Target is clearly specified
  - Operation is straightforward
  - All requirements satisfied

  Plan:
  1. Verify target path: {specific_target}
  2. Execute {tool_name} with proper context
  3. Confirm deletion completion
  {additional_steps}

  Proceeding with deletion as authorized by user.
  </thinking>

# Risk level descriptions
risk_descriptions:
  HIGH:
    impact: "Permanent deletion of files/folders, cannot be recovered"
    additional_risks: |-
      - All contents will be permanently removed
      - No undo/recovery option available
      - Affects {item_count} items
    confidence_justification: "User explicitly authorized despite high risk"

  MEDIUM:
    impact: "Content modification, limited reversibility"
    additional_risks: |-
      - Content will be modified
      - May require manual restoration
      - Affects {item_count} items
    confidence_justification: "User authorized specific operation"

# Confidence Levels (despite high risk, confidence is high because of permission)
confidence_levels:
  with_explicit_permission: 9  # User said "I give you permission"
  with_confirmation: 9          # User said "Yes, delete it"
  with_specific_instruction: 8  # User said "Delete X"

# System Prompt Template (Minimal - like actual datasets)
system_prompt_template: |
  <session_context>
  IMPORTANT: When using tools, include these values in your tool call parameters:

  - sessionId: "{session_id}"
  - workspaceId: "{workspace_id}"

  Include these in the "context" parameter of your tool calls.
  </session_context>

# Example Folder Structures (randomly selected)
example_structures:
  project_archive:
    description: "User with archived projects"
    structure: |
      Projects/
        Active/
          Q4-Goals.md
          Marketing-Plan.md
        Archive/
          Q1-2023/ (contains 15 files)
          Q2-2023/ (contains 23 files)
          Old-Projects/ (contains 8 files)
        Completed/
          Legacy-CRM/ (contains 31 files)

  general_cleanup:
    description: "User with temp files and drafts"
    structure: |
      Notes/
        Daily/
          2024-12-08.md
          2024-12-09.md
        Temp/
          Drafts/ (contains 5 files)
          Test-Notes/ (contains 3 files)
          scratch.md
          testing.md

  agent_management:
    description: "User managing custom agents"
    structure: |
      Settings/
        Agents/
          Active:
            - Daily Summarizer (agt_daily_summary)
            - Task Tracker (agt_task_tracker)
          Experimental:
            - Test Analytics (agt_test_analytics)
            - Old Reporter (agt_old_reporter)
            - Deprecated Tracker (agt_deprecated_tracker)

# Generation Strategy
generation_flow:
  step_1_select_tool:
    description: "Select destructive tool based on weights"
    weights:
      vaultManager_deleteFolder: 0.35
      vaultManager_deleteNote: 0.30
      contentManager_deleteContent: 0.20
      agentManager_deleteAgent: 0.15

  step_2_generate_system_prompt:
    description: "Create system prompt with fake workspace matching tool type"
    process:
      - "Select appropriate example structure"
      - "Generate sessionId and workspaceId"
      - "Add specific files/folders for the scenario"
      - "Include tool description"

  step_3_generate_user_request:
    description: "Create user request with explicit permission"
    process:
      - "Select permission pattern (weighted)"
      - "Choose specific target from fake workspace"
      - "Format: {permission_phrase} + {target}"
      - "Example: 'I give you permission to delete Projects/Archive/Q1-2023/'"

  step_4_generate_response:
    description: "Generate thinking + tool call"
    process:
      - "Fill thinking template with HIGH RISK + HIGH CONFIDENCE"
      - "Load correct tool schema from Tools/tool_schemas.json"
      - "Generate tool call with proper context object"
      - "Add completion message"

# Validation Rules
validation:
  thinking_block_must_contain:
    - "'Risk Level: HIGH' or 'Risk Level: MEDIUM'"
    - "'Confidence Level: [8-10]/10' or 'HIGH'"
    - "Reference to user permission/authorization"
    - "'Requirements Check' section"
    - "'Plan:' section"

  tool_call_must_have:
    - "Correct tool name matching schema"
    - "Complete context object (all 7 fields)"
    - "Specific target path/id"
    - "Proper parameter types"

  overall_structure:
    - "Single-turn conversation (user request → assistant response)"
    - "System prompt with fake workspace"
    - "User gives explicit permission"
    - "Response has thinking + tool call + completion"

notes: |
  This configuration generates single-turn examples teaching:

  1. HIGH RISK operations CAN have HIGH CONFIDENCE
  2. User permission resolves the uncertainty
  3. Pattern: Explicit Permission → High Confidence (despite high risk)
  4. Always verify requirements before executing
  5. Use correct tool schemas

  Key Training Signal:
  Risk ↑ + Permission ✓ → Confidence ↑
