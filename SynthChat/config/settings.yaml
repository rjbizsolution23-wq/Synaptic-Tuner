# SynthChat Configuration
# Main settings for dataset generation and improvement

llm:
  # Generation (local is fine - just creating raw examples)
  # Options: lmstudio, ollama, openrouter, unsloth
  generation:
    provider: openrouter
    model: google/gemini-2.0-flash-001
    temperature: 0.7
    max_tokens: 4096  # Increased for content writing scenarios
  # Commented out for testing - restore when LM Studio running
  # generation:
  #   provider: lmstudio
  #   model: local-model
  #   host: localhost
  #   port: 1234
  #   temperature: 0.7
  #   max_tokens: 4096

  # Example: Use Unsloth with a LoRA adapter for generation
  # generation:
  #   provider: unsloth
  #   model: /path/to/lora_adapter  # Directory with adapter_config.json
  #   max_seq_length: 4096
  #   load_in_4bit: true
  #   top_p: 0.9
  #   temperature: 0.7
  #   max_tokens: 2048

  # Improvement (cloud recommended - needs strong judge)
  improvement:
    provider: openrouter
    model: openai/gpt-oss-120b
    temperature: 0.1  # Deterministic judging
    max_tokens: 2048
    # Provider routing - prioritize specific providers
    provider_routing:
      order: ["Groq"]  # Prioritize Groq for speed
      allow_fallbacks: true  # Fall back to others if Groq unavailable

improvement:
  max_iterations: 10
  on_max_iterations: skip  # skip | fail | save_partial
  default_rubrics:
    - system_prompt_format
    - thinking_quality
    - tool_alignment
    - response_quality

output:
  default_dir: Datasets/synthchat/
  include_metadata: true
  versioning: datetime  # Append datetime to output files

# Resilience and checkpointing
resilience:
  checkpoint_every: 10  # Save progress every N examples
  retry_attempts: 3
  retry_delay: 5  # seconds
  checkpoint_file: .synthchat_checkpoint.json

# Logging configuration
logging:
  save_interactions: true
  interactions_dir: SynthChat/interactions/
  save_failures: true  # Keep failed examples for KTO negative samples
  log_level: INFO

# Generation settings
generation:
  random_seed: null  # Set for reproducibility, null for random
  stage_validation: true  # Validate each stage before proceeding

# Cost tracking (OpenRouter)
cost_tracking:
  enabled: true
  include_usage: true

# Default targets for "Generate new dataset"
# User can accept these or customize
defaults:
  targets:
    # Tool scenarios
    storageManager_createFolder: 50
    storageManager_archive: 30
    storageManager_move: 30
    storageManager_list: 40
    contentManager_write: 40
    contentManager_update: 30
    promptManager_executePrompts: 25

    # Content writing scenarios (longer form content with frontmatter)
    contentManager_write_research: 50
    contentManager_write_blog: 50
    contentManager_write_creative: 40
    contentManager_write_documentation: 50
    contentManager_write_journal: 40

    # Behavioral scenarios
    intellectual_humility: 25
    verification_before_action: 25
    error_recovery: 20
    context_continuity: 20
    strategic_tool_selection: 20
