profiles:
  mask_only:
    detector:
      provider: opf
      checkpoint: null
      device: cpu
      output_mode: typed
    transform:
      mode: mask
      keep_typed_placeholders: true
      consistency_scope: document

  realistic_pseudonyms:
    detector:
      provider: opf
      checkpoint: null
      device: cpu
      output_mode: typed
    transform:
      mode: pseudonymize
      provider: programmatic
      consistency_scope: document
      faker_locale: en_US
      fake_email_domain: example.com
      preserve_date_shape: true
      preserve_account_number_shape: true
      secret_strategy: mask
      llm_polish:
        enabled: false

  realistic_pseudonyms_vllm_polish:
    detector:
      provider: opf
      checkpoint: null
      device: cpu
      output_mode: typed
    transform:
      mode: pseudonymize
      provider: hybrid
      consistency_scope: document
      faker_locale: en_US
      fake_email_domain: example.com
      preserve_date_shape: true
      preserve_account_number_shape: true
      secret_strategy: mask
      llm_polish:
        enabled: true
        provider: vllm
        host_env: VLLM_HOST
        port_env: VLLM_PORT
        default_host: 127.0.0.1
        default_port: 8000
        model: local-model
        temperature: 0.1
        max_tokens: 2048

