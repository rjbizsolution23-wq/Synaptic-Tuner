name: Thinking Quality
description: Evaluates goal clarity, memory context, requirements/plan distinction, and confidence calibration
scope: thinking
pass_threshold: 0.8

judge_prompt: |
  # CONTEXT
  You are evaluating the quality of a thinking block for AI training data. The thinking block captures the assistant's reasoning before responding, structured as JSON with goal, memory, requirements, plan, assessment, and confidence fields.

  **Thinking Block:**
  ```json
  {current_content}
  ```

  **System Prompt (for validation):**
  ```
  {system_prompt}
  ```

  # MISSION
  Score the thinking block on four criteria: goal clarity, memory context, requirements/plan distinction, and confidence calibration. High-quality thinking blocks enable accurate, contextual responses.

  # INSTRUCTIONS
  Evaluate each criterion on a 0.0-1.0 scale:

  1. **Goal Clarity** - Is the goal specific and actionable?
     - 1.0: Ultra-specific with file paths, exact actions (e.g., "Delete Tech Specs Old.md from vault root")
     - 0.5: Moderately specific but missing details
     - 0.0: Vague or generic (e.g., "Help with files")
     - **0.0 if goal references file paths that DON'T exist in vault_structure/workspaceStructure**

  2. **Memory Context** - Does memory explain the user's intent?
     - 1.0: Clear statement of what user wants to accomplish
     - 0.5: Partially explains intent
     - 0.0: Empty, generic, or contains hallucinated dates/history
     - **0.0 if memory references file paths that DON'T exist in vault_structure/workspaceStructure**

  3. **Requirements/Plan Distinction** - Are these properly categorized?
     - Requirements: Prerequisites that must be true (dynamic state checks)
     - Plan: Actions to execute
     - 1.0: Clear distinction, no overlap with system prompt knowledge
     - 0.5: Some confusion between categories
     - 0.0: Duplicated, swapped, or includes redundant checks
     - **0.0 if requirements/plan reference file paths that DON'T exist**

  4. **Confidence Calibration** - Does confidence match operation risk?
     - Risky operations (delete, move, overwrite): confidence 0.3-0.5
     - Moderate operations: confidence 0.6-0.8
     - Safe/simple operations: confidence 0.85-0.95
     - 1.0: Well-calibrated to risk level
     - 0.0: High confidence for risky operations

  # CRITICAL: PATH VALIDATION (MANDATORY)
  **You MUST check EVERY file path in the thinking block against the system prompt:**
  - vault_structure shows root-level files/folders
  - workspaceStructure (inside selected_workspace) shows workspace files

  **If ANY path doesn't exist, you MUST:**
  1. Give that criterion 0.0 score
  2. LIST the hallucinated path in improvement_feedback
  3. Suggest a replacement from the actual vault_structure

  Example: If thinking says "update Ops/Runbooks/Drift.md" but vault_structure has Content/, Projects/, Archive/:
  - goal_clarity: 0.0 (path doesn't exist)
  - improvement_feedback: "HALLUCINATED PATH: 'Ops/Runbooks/Drift.md' does not exist. vault_structure contains: Content/, Projects/, Archive/. Replace with a path that exists OR make the goal generic."

  # GUIDELINES
  - Requirements should only check things NOT visible in the system prompt
  - If system prompt shows the file exists, "verify file exists" is redundant
  - Memory should state user intent without fabricated dates or history
  - Plan should be direct actions, not verification steps for known state

  # FORMAT
  Return JSON:
  ```json
  {
    "score": 0.0-1.0,
    "goal_clarity": 0.0-1.0,
    "memory_context": 0.0-1.0,
    "requirements_plan_distinction": 0.0-1.0,
    "confidence_calibration": 0.0-1.0,
    "improvement_feedback": "List any HALLUCINATED PATHS here with suggested replacements, then other feedback..."
  }
  ```
  Overall score is the average of the 4 criteria.

improver_prompt: |
  # CONTEXT
  You are improving a thinking block based on feedback and system prompt context.

  **Current Thinking Block:**
  ```json
  {current_content}
  ```

  **System Prompt (contains vault structure and known files):**
  ```
  {system_prompt}
  ```

  **Improvement Feedback:**
  ```
  {feedback}
  ```

  # MISSION
  Generate an improved thinking block that is specific, factual, and context-aware. The thinking block should leverage information from the system prompt and avoid redundant verification.

  # CRITICAL: FILE PATH VALIDATION
  **EVERY file path mentioned in goal, memory, requirements, or plan MUST exist in the system prompt.**

  Before writing any path, check:
  1. Look at `<vault_structure>` for root-level files/folders
  2. Look at `workspaceStructure` in `<selected_workspace>` for workspace files
  3. If the path doesn't exist in either, DO NOT use it

  **If the current thinking references a non-existent path:**
  - Replace it with a file that DOES exist in vault_structure/workspaceStructure
  - Or make the goal generic (e.g., "help user with their workflow" instead of "update Ops/Runbooks/Drift.md")
  - NEVER invent or hallucinate file paths

  # INSTRUCTIONS
  1. **GOAL** - Make specific using ONLY paths from vault_structure/workspaceStructure:
     - Use exact file paths visible in vault_structure or workspaceStructure
     - State the action clearly
     - Example: "Delete Tech Specs Old.md from vault root"
     - If user request is vague, use a generic goal that doesn't assume specific files

  2. **MEMORY** - State user's intent based on their request:
     - Describe what the user wants to accomplish
     - Keep it factual based on the request
     - Example: "User wants to remove obsolete documentation to reduce clutter"

  3. **REQUIREMENTS** - Only list dynamic state checks:
     - Skip checks for things visible in system prompt (file existence, location)
     - Focus on runtime state: file not locked, no active references
     - Example: ["no other files link to this document"]

  4. **PLAN** - Direct actions using ONLY known files:
     - If file location is known from system prompt, go straight to action
     - For risky operations, include confirmation step
     - Example: ["Ask user for confirmation", "Delete Tech Specs Old.md"]

  5. **ASSESSMENT** - Accurate risk and complexity:
     - risky: true for delete, move, overwrite operations
     - complex: true for multi-step or multi-file operations

  6. **CONFIDENCE** - Calibrate to risk level:
     - 0.3-0.5 for risky operations
     - 0.6-0.8 for moderate operations
     - 0.85-0.95 for safe/simple operations

  # GUIDELINES
  - Use information visible in system prompt rather than re-verifying it
  - Keep memory factual without invented dates or history
  - Requirements complement system prompt knowledge, not duplicate it
  - Plan reflects the actual steps needed given what's already known
  - **NEVER reference file paths that don't exist in vault_structure or workspaceStructure**

  # FORMAT
  Output ONLY the improved thinking block as valid JSON. No explanations, no markdown wrapper.

output_schema:
  type: object
  properties:
    score:
      type: number
      min: 0.0
      max: 1.0
    goal_clarity:
      type: number
      min: 0.0
      max: 1.0
    memory_context:
      type: number
      min: 0.0
      max: 1.0
    requirements_plan_distinction:
      type: number
      min: 0.0
      max: 1.0
    confidence_calibration:
      type: number
      min: 0.0
      max: 1.0
    improvement_feedback:
      type: string
  required:
  - score
  - goal_clarity
  - memory_context
  - requirements_plan_distinction
  - confidence_calibration
  - improvement_feedback
  additionalProperties: false

validations:
  - field: goal
    type: string
    min: 10
    error: "Goal must be at least {min} characters. Be specific with file paths and actions."

  - field: memory
    type: string
    error: "Memory must describe user intent without fabricated dates or history."

  - field: requirements
    type: array
    min: 1
    error: "Add at least {min} requirement(s). Examples: 'file not locked', 'no active references'"

  - field: plan
    type: array
    min: 1
    error: "Add at least {min} step(s) to the plan."

  - field: assessment
    type: object
    error: "Assessment must be an object."

  - field: assessment.risky
    type: boolean
    error: "assessment.risky must be a boolean (true for delete/move/overwrite)."

  - field: assessment.complex
    type: boolean
    error: "assessment.complex must be a boolean (true for multi-step operations)."

  - field: confidence
    type: number
    min: 0.0
    max: 1.0
    error: "Confidence must be {min}-{max}. Use 0.3-0.5 for risky, 0.6-0.8 moderate, 0.85-0.95 safe."

# NOTE: Cross-scope path validation moved to factuality.yaml
# This rubric focuses on structure (validations) and quality criteria
