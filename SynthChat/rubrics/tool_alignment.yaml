name: Tool Alignment
description: Ensures CLI-first tool calls match the thinking block's goal and plan
scope: response
pass_threshold: 0.8
judge_prompt: |
  ## Tool Alignment Check

  Verify that the assistant response matches the thinking block.

  For CLI-first tool responses:
  - tool calls should use `function.name = "useTools"`
  - wrapper IDs (`workspaceId`, `sessionId`) must match the system prompt
  - the `tool` command string must match the operation described in the goal/plan
  - the command should reference the same paths, entities, or targets discussed in thinking

  Misalignment examples:
  - thinking says read, command performs replace
  - thinking mentions file X, command targets file Y
  - nested `context/calls` or direct-tool format instead of CLI-first `useTools`

  Confidence / risk check:
  - if `confidence < 0.5`, the response should clarify instead of calling tools
  - if `assessment.risky: true`, the response should seek confirmation before destructive commands

  Runtime / environment check:
  - if the provided environment result shows execution or schema failures, treat those as real alignment failures
  - recommendations should explicitly call out the runtime/tool errors that need to be corrected

  Return JSON with single field: `toolalignment_score` (0.0-1.0)
improver_prompt: |
  Fix the assistant response so it aligns with the thinking block and uses the CLI-first wrapper.

  **Current Response Text:**
  ```
  {current_content}
  ```

  **Current Tool Calls:**
  ```json
  {original_tool_calls}
  ```

  **Thinking Block:**
  ```
  {thinking_content}
  ```

  **Environment Result:**
  ```json
  {environment_result_json}
  ```

  **Environment Issues:**
  ```
  {environment_issue_summary}
  ```

  **Feedback:**
  ```
  {feedback}
  ```

  Rules:
  - If the thinking block is risky or low-confidence, replace tool calls with a clarification/confirmation response.
  - If environment errors are present, fix the response so those runtime/schema issues would no longer occur.
  - Otherwise preserve the tool-calling path, but emit a single `useTools` call with top-level `workspaceId`, `sessionId`, `memory`, `goal`, `tool`, and optional `constraints` / `strategy`.
  - Do NOT use nested `context` + `calls`.
  - Do NOT emit direct tool names as the function name.

  Output ONLY the improved assistant response.
output_schema:
  type: object
  properties:
    toolalignment_score:
      type: number
      min: 0.0
      max: 1.0
      description: Score for Tool Alignment
  required:
  - toolalignment_score
  additionalProperties: false
validation:
  tool_calls:
    enabled: true
