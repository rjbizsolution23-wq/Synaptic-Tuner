name: memoryManager Tools
description: Validates CLI-first memoryManager tool calls wrapped in useTools
scope: response
pass_threshold: 0.8
judge_prompt: |
  # CONTEXT
  You are evaluating CLI-first tool calls for the memoryManager agent.

  **Tool Calls to Evaluate:**
  ```json
  {original_tool_calls}
  ```

  # REQUIRED FORMAT
  Tool calls must use `function.name = "useTools"` and a top-level arguments payload with:
  `workspaceId`, `sessionId`, `memory`, `goal`, `tool`, and optional `constraints` / `strategy`.

  Do NOT use nested `context` + `calls`.

  ## Valid memory commands
  - `memory load-workspace ...`
  - `memory list-workspaces ...`
  - `memory create-workspace ...`
  - `memory update-workspace ...`
  - `memory archive-workspace ...`
  - `memory list-states ...`
  - `memory create-state ...`
  - `memory load-state ...`
  - `memory run-workflow ...`

  ## Scoring
  - **1.0** = Correct wrapper and correct memory command, or valid clarification if the requested target is unknown
  - **0.7-0.9** = Correct wrapper with minor command/arg issues
  - **0.4-0.6** = Wrong wrapper shape or missing required command args
  - **0.0-0.3** = Nested `context/calls`, direct-tool format, or wrong command family

  Return JSON: `{"memorymanagertools_score": 0.0-1.0}`
improver_prompt: |
  Convert the current response into a CLI-first `useTools` assistant message.

  **Current Tool Calls:**
  ```json
  {original_tool_calls}
  ```

  **System Prompt:**
  ```
  {system_prompt}
  ```

  **User Request:**
  ```
  {user_request}
  ```

  **Feedback:**
  ```
  {feedback}
  ```

  Output either:
  1. a tool-only assistant message with `content: null` and one `useTools` call, or
  2. a clarification question with no tool calls if the request lacks a required workspace/state target.

  Example tool call:
  ```json
  {{
    "content": null,
    "tool_calls": [
      {{
        "id": "call_<random_9chars>",
        "type": "function",
        "function": {{
          "name": "useTools",
          "arguments": "{{\"workspaceId\":\"default\",\"sessionId\":\"session_123\",\"memory\":\"User is saving project context.\",\"goal\":\"Create a reusable state snapshot.\",\"tool\":\"memory create-state \\\"Project State\\\" \\\"User is tracking migration progress.\\\" \\\"Capture current migration state\\\" --active-files \\\"docs/plan.md,tools/migrate.py\\\" --next-steps \\\"Review diff,rerun smoke test\\\"\",\"strategy\":\"serial\"}}"
        }}
      }}
    ]
  }}
  ```

  Do NOT use nested `context` + `calls`.
  Do NOT emit `memoryManager_*` as the function name.
output_schema:
  type: object
  properties:
    memorymanagertools_score:
      type: number
      min: 0.0
      max: 1.0
  required:
  - memorymanagertools_score
  additionalProperties: false
output_format:
  type: assistant_message
validations:
- tools:
    useTools:
      _required:
      - workspaceId
      - sessionId
      - memory
      - goal
      - tool
      _additionalProperties: false
      workspaceId: string
      sessionId: string
      memory: string
      goal: string
      tool: string
      constraints: string
      strategy: string
  error: 'useTools validation failed: {details}'
