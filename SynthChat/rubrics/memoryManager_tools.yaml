name: memoryManager Tools
description: Validates memoryManager tool calls use OpenAI format with useTools schema
scope: response
pass_threshold: 0.8
judge_prompt: "# CONTEXT\nYou are evaluating tool calls for the memoryManager agent. Tool calls must use OpenAI format with the useTools schema.\n\n**Tool Calls to Evaluate:**\n```json\n{original_tool_calls}\n```\n\n**System Prompt:**\n```\n{system_prompt}\n```\n\n**User Request:**\n```\n{user_request}\n```\n\n# REQUIRED FORMAT\n\nTool calls MUST use OpenAI tool_calls format with name \"useTools\":\n```json\n{{\n  \"tool_calls\": [\n    {{\n      \"id\": \"unique_id\",\n      \"type\": \"function\",\n      \"function\": {{\n        \"name\": \"useTools\",\n        \"arguments\": \"{{\\\"workspaceId\\\": \\\"default\\\", \\\"sessionId\\\": \\\"session_123\\\", \\\"memory\\\": \\\"Need to inspect and reorganize notes.\\\", \\\"goal\\\": \\\"Move a note and then read it back.\\\", \\\"constraints\\\": \\\"Do not touch unrelated files.\\\", \\\"tool\\\": \\\"storage move \\\\\\\"notes/today.md\\\\\\\" \\\\\\\"archive/today.md\\\\\\\", content read \\\\\\\"archive/today.md\\\\\\\"\\\", \\\"strategy\\\
  \": \\\"serial\\\"}}\"\n      }}\n    }}\n  ]\n}}\n```\n\nThe `arguments` JSON string must contain:\n```json\n{{\n  \"context\": {{\n    \"workspaceId\": \"string (from session_context or 'default')\",\n    \"sessionId\": \"string (from session_context)\",\n    \"memory\": \"string (1-3 sentences)\",\n    \"goal\": \"string (1-3 sentences)\"\n  }},\n  \"calls\": [\n    {{\n      \"agent\": \"memoryManager\",\n      \"tool\": \"toolName\",\n      \"params\": {{ ... tool-specific params ... }}\n    }}\n  ]\n}}\n```\n\n## Valid Tools and Params:\n\n### Workspace Tools\n| tool | required params | optional params |\n|------|-----------------|-----------------|\n| loadWorkspace | id | limit |\n| listWorkspaces | - | includeArchived, sortBy, order, limit |\n| createWorkspace | name, description, rootFolder, purpose, workflows | keyFiles, preferences, dedicatedAgentId, relatedFolders, relatedFiles |\n| updateWorkspace | workspaceId | name, description, rootFolder, purpose, workflows, keyFiles,\
  \ preferences |\n| archiveWorkspace | name | restore |\n\n### State Tools\n| tool | required params | optional params |\n|------|-----------------|-----------------|\n| listStates | - | includeArchived, tags, page, pageSize, order |\n| createState | name, conversationContext, activeTask, activeFiles, nextSteps | tags |\n| loadState | name | - |\n\n# EVALUATION CRITERIA\n\n## Option A: Tool Call Response\n1. **Function Name**: Must be exactly \"useTools\"\n2. **Arguments Structure**: Must have top-level wrapper fields at root, including `workspaceId`, `sessionId`, `memory`, `goal`, and `tool`\n3. **Top-Level Fields**: Must include `workspaceId`, `sessionId`, `memory`, `goal`, and `tool`; `constraints` and `strategy` are optional\n4. **Tool Command String**: `tool` must be a CLI command string that resolves to the correct concrete tool(s)\n5. **Command Resolution**: The CLI command string must resolve to the correct manager/tool for the task\n6. **Tool Value**: Must be valid tool name\n\
  7. **Params**: Must include all required params for the tool\n\n## Option B: Clarification Response (VALID ALTERNATIVE)\nIf the user's request lacks critical info needed for a tool call, the assistant MAY ask for clarification. Valid when:\n- State/workspace ID is unknown and cannot be inferred\n- Required parameters are unspecified\n- The operation is ambiguous\n\nA clarification response has:\n- `content`: A polite question asking for the missing info\n- `tool_calls`: null or empty array\n\n# SCORING\n- **1.0** = Correct tool call format OR valid clarification request when info is missing\n- **0.7-0.9** = Minor param issues\n- **0.4-0.6** = Wrong structure OR missing required params\n- **0.0-0.3** = Wrong function name OR completely wrong format\n\n# OUTPUT\nReturn JSON: `{{\"memorymanagertools_score\": 0.0-1.0}}`\n"
improver_prompt: "# CONTEXT\nYou are converting tool calls to the correct OpenAI assistant message format.\n\n**Current Tool Calls:**\n```json\n{original_tool_calls}\n```\n\n**System Prompt:**\n```\n{system_prompt}\n```\n\n**User Request:**\n```\n{user_request}\n```\n\n**Feedback:**\n```\n{feedback}\n```\n\n# DECISION: TOOL CALL OR CLARIFICATION?\n\nFirst, determine if you have enough information to make a tool call:\n- Do you know the state/workspace ID? (Check system prompt or user request)\n- Do you have required parameters for the operation?\n- Is the operation clear?\n\n**If YES to all**: Make a tool call (Option A below)\n**If NO to any**: Ask for clarification (Option B below)\n\n# OPTION A: TOOL CALL RESPONSE\n\nOutput a complete assistant message with `content: null` and `tool_calls` array:\n\n```json\n{{\n  \"content\": null,\n  \"tool_calls\": [\n    {{\n      \"id\": \"call_<random_9chars>\",\n      \"type\": \"function\",\n      \"function\": {{\n        \"name\": \"useTools\"\
  ,\n        \"arguments\": \"<JSON string with context and calls>\"\n      }}\n    }}\n  ]\n}}\n```\n\n**CRITICAL**: `content` MUST be `null` (not a string, not empty string).\n\n## Valid Tools\n\n### Workspace Tools\n| tool | required params | optional params |\n|------|-----------------|-----------------|\n| loadWorkspace | id | limit |\n| listWorkspaces | - | includeArchived, sortBy, order, limit |\n| createWorkspace | name, description, rootFolder, purpose, workflows | keyFiles, preferences, dedicatedAgentId, relatedFolders, relatedFiles |\n| updateWorkspace | workspaceId | name, description, rootFolder, purpose, workflows, keyFiles, preferences |\n| archiveWorkspace | name | restore |\n\n### State Tools\n| tool | required params | optional params |\n|------|-----------------|-----------------|\n| listStates | - | includeArchived, tags, page, pageSize, order |\n| createState | name, conversationContext, activeTask, activeFiles, nextSteps | tags |\n| loadState | name | - |\n\n# INSTRUCTIONS\n\
  \n1. **Extract IDs from system prompt's <session_context>**\n2. **Set content to null** (tool-only response)\n3. **Set function.name to \"useTools\"**\n4. **Build top-level wrapper arguments with `workspaceId`, `sessionId`, `memory`, `goal`, `tool`, and optional `constraints`/`strategy`**\n\n# EXAMPLE (Tool Call)\n\n```json\n{{\n  \"content\": null,\n  \"tool_calls\": [\n    {{\n      \"id\": \"call_w8x9y0z1a\",\n      \"type\": \"function\",\n      \"function\": {{\n        \"name\": \"useTools\",\n        \"arguments\": \"{{\\\"context\\\": {{\\\"workspaceId\\\": \\\"default\\\", \\\"sessionId\\\": \\\"session_123\\\", \\\"memory\\\": \\\"User starting new research project.\\\", \\\"goal\\\": \\\"Create a new state for research.\\\"}}, \\\"calls\\\": [{{\\\"agent\\\": \\\"memoryManager\\\", \\\"tool\\\": \\\"createState\\\", \\\"params\\\": {{\\\"name\\\": \\\"Research State\\\", \\\"conversationContext\\\": \\\"User is beginning research\\\", \\\"activeTask\\\": \\\"Research tasks\\\
  \", \\\"activeFiles\\\": [], \\\"nextSteps\\\": [\\\"Gather sources\\\"]}}}}]}}\"\n      }}\n    }}\n  ]\n}}\n```\n\n# OPTION B: CLARIFICATION RESPONSE\n\nIf you cannot determine the state/workspace or required params, ask for clarification:\n\n```json\n{{\n  \"content\": \"I'd be happy to help with that. Could you please specify which state you'd like me to load?\",\n  \"tool_calls\": null\n}}\n```\n\n# OUTPUT\nReturn ONLY the JSON object with content and tool_calls. No markdown, no explanation.\n"
output_schema:
  type: object
  properties:
    memorymanagertools_score:
      type: number
      min: 0.0
      max: 1.0
  required:
  - memorymanagertools_score
output_format:
  type: assistant_message
validations:
- tools:
    useTools:
      context:
        workspaceId: string
        sessionId: string
        memory: string
        goal: string
      calls:
        _item_schema:
          agent: string
          tool: string
          params: object
        _subtools:
          memoryManager:
            loadWorkspace:
              _required:
              - id
              id: string
              limit: number
            listWorkspaces:
              _required: []
              includeArchived: boolean
              sortBy: string
              order: string
              limit: number
            createWorkspace:
              _required:
              - name
              - description
              - rootFolder
              - purpose
              - workflows
              name: string
              description: string
              rootFolder: string
              purpose: string
              workflows: array
              keyFiles: array
              preferences: object
              dedicatedAgentId: string
              relatedFolders: array
              relatedFiles: array
            updateWorkspace:
              _required:
              - workspaceId
              workspaceId: string
              name: string
              description: string
              rootFolder: string
              purpose: string
              workflows: array
              keyFiles: array
              preferences: object
            archiveWorkspace:
              _required:
              - name
              name: string
              restore: boolean
            listStates:
              _required: []
              includeArchived: boolean
              tags: array
              page: number
              pageSize: number
              order: string
            createState:
              _required:
              - name
              - conversationContext
              - activeTask
              - activeFiles
              - nextSteps
              name: string
              conversationContext: string
              activeTask: string
              activeFiles: array
              nextSteps: array
              tags: array
            loadState:
              _required:
              - name
              name: string
  error: 'useTools validation failed: {details}'
