name: memoryManager Tools
description: Validates memoryManager tool calls use OpenAI format with useTools schema
scope: response
pass_threshold: 0.8

judge_prompt: |
  # CONTEXT
  You are evaluating tool calls for the memoryManager agent. Tool calls must use OpenAI format with the useTools schema.

  **Tool Calls to Evaluate:**
  ```json
  {original_tool_calls}
  ```

  **System Prompt:**
  ```
  {system_prompt}
  ```

  **User Request:**
  ```
  {user_request}
  ```

  # REQUIRED FORMAT

  Tool calls MUST use OpenAI tool_calls format with name "useTools":
  ```json
  {{
    "tool_calls": [
      {{
        "id": "unique_id",
        "type": "function",
        "function": {{
          "name": "useTools",
          "arguments": "{{\"context\": {{...}}, \"calls\": [{{...}}]}}"
        }}
      }}
    ]
  }}
  ```

  The `arguments` JSON string must contain:
  ```json
  {{
    "context": {{
      "workspaceId": "string (from session_context or 'default')",
      "sessionId": "string (from session_context)",
      "memory": "string (1-3 sentences)",
      "goal": "string (1-3 sentences)"
    }},
    "calls": [
      {{
        "agent": "memoryManager",
        "tool": "toolName",
        "params": {{ ... tool-specific params ... }}
      }}
    ]
  }}
  ```

  ## Valid Tools and Params:

  ### Workspace Tools
  | tool | required params | optional params |
  |------|-----------------|-----------------|
  | loadWorkspace | id | limit |
  | listWorkspaces | - | includeArchived, sortBy, order, limit |
  | createWorkspace | name, description, rootFolder, purpose, workflows | keyFiles, preferences, dedicatedAgentId, relatedFolders, relatedFiles |
  | updateWorkspace | workspaceId | name, description, rootFolder, purpose, workflows, keyFiles, preferences |
  | archiveWorkspace | name | restore |

  ### State Tools
  | tool | required params | optional params |
  |------|-----------------|-----------------|
  | listStates | - | includeArchived, tags, page, pageSize, order |
  | createState | name, conversationContext, activeTask, activeFiles, nextSteps | description, tags |
  | loadState | name | - |
  | archiveState | name | restore |

  # EVALUATION CRITERIA

  ## Option A: Tool Call Response
  1. **Function Name**: Must be exactly "useTools"
  2. **Arguments Structure**: Must have `context` and `calls` at root
  3. **Context Object**: Must have exactly 4 fields (workspaceId, sessionId, memory, goal)
  4. **Calls Array**: Each call must have `agent`, `tool`, `params`
  5. **Agent Value**: Must be exactly "memoryManager"
  6. **Tool Value**: Must be valid tool name
  7. **Params**: Must include all required params for the tool

  ## Option B: Clarification Response (VALID ALTERNATIVE)
  If the user's request lacks critical info needed for a tool call, the assistant MAY ask for clarification. Valid when:
  - State/workspace ID is unknown and cannot be inferred
  - Required parameters are unspecified
  - The operation is ambiguous

  A clarification response has:
  - `content`: A polite question asking for the missing info
  - `tool_calls`: null or empty array

  # SCORING
  - **1.0** = Correct tool call format OR valid clarification request when info is missing
  - **0.7-0.9** = Minor param issues
  - **0.4-0.6** = Wrong structure OR missing required params
  - **0.0-0.3** = Wrong function name OR completely wrong format

  # OUTPUT
  Return JSON: `{{"memorymanagertools_score": 0.0-1.0}}`

improver_prompt: |
  # CONTEXT
  You are converting tool calls to the correct OpenAI assistant message format.

  **Current Tool Calls:**
  ```json
  {original_tool_calls}
  ```

  **System Prompt:**
  ```
  {system_prompt}
  ```

  **User Request:**
  ```
  {user_request}
  ```

  **Feedback:**
  ```
  {feedback}
  ```

  # DECISION: TOOL CALL OR CLARIFICATION?

  First, determine if you have enough information to make a tool call:
  - Do you know the state/workspace ID? (Check system prompt or user request)
  - Do you have required parameters for the operation?
  - Is the operation clear?

  **If YES to all**: Make a tool call (Option A below)
  **If NO to any**: Ask for clarification (Option B below)

  # OPTION A: TOOL CALL RESPONSE

  Output a complete assistant message with `content: null` and `tool_calls` array:

  ```json
  {{
    "content": null,
    "tool_calls": [
      {{
        "id": "call_<random_9chars>",
        "type": "function",
        "function": {{
          "name": "useTools",
          "arguments": "<JSON string with context and calls>"
        }}
      }}
    ]
  }}
  ```

  **CRITICAL**: `content` MUST be `null` (not a string, not empty string).

  ## Valid Tools

  ### Workspace Tools
  | tool | required params | optional params |
  |------|-----------------|-----------------|
  | loadWorkspace | id | limit |
  | listWorkspaces | - | includeArchived, sortBy, order, limit |
  | createWorkspace | name, description, rootFolder, purpose, workflows | keyFiles, preferences, dedicatedAgentId, relatedFolders, relatedFiles |
  | updateWorkspace | workspaceId | name, description, rootFolder, purpose, workflows, keyFiles, preferences |
  | archiveWorkspace | name | restore |

  ### State Tools
  | tool | required params | optional params |
  |------|-----------------|-----------------|
  | listStates | - | includeArchived, tags, page, pageSize, order |
  | createState | name, conversationContext, activeTask, activeFiles, nextSteps | description, tags |
  | loadState | name | - |
  | archiveState | name | restore |

  # INSTRUCTIONS

  1. **Extract IDs from system prompt's <session_context>**
  2. **Set content to null** (tool-only response)
  3. **Set function.name to "useTools"**
  4. **Build arguments with context + calls array**

  # EXAMPLE (Tool Call)

  ```json
  {{
    "content": null,
    "tool_calls": [
      {{
        "id": "call_w8x9y0z1a",
        "type": "function",
        "function": {{
          "name": "useTools",
          "arguments": "{{\"context\": {{\"workspaceId\": \"default\", \"sessionId\": \"session_123\", \"memory\": \"User starting new research project.\", \"goal\": \"Create a new state for research.\"}}, \"calls\": [{{\"agent\": \"memoryManager\", \"tool\": \"createState\", \"params\": {{\"name\": \"Research State\", \"conversationContext\": \"User is beginning research\", \"activeTask\": \"Research tasks\", \"activeFiles\": [], \"nextSteps\": [\"Gather sources\"]}}}}]}}"
        }}
      }}
    ]
  }}
  ```

  # OPTION B: CLARIFICATION RESPONSE

  If you cannot determine the state/workspace or required params, ask for clarification:

  ```json
  {{
    "content": "I'd be happy to help with that. Could you please specify which state you'd like me to load?",
    "tool_calls": null
  }}
  ```

  # OUTPUT
  Return ONLY the JSON object with content and tool_calls. No markdown, no explanation.

output_schema:
  type: object
  properties:
    memorymanagertools_score:
      type: number
      min: 0.0
      max: 1.0
  required:
    - memorymanagertools_score

# Output format defines how improved content is applied to the example
output_format:
  type: assistant_message

# Validation using tools schema with subtool manifests
validations:
  - tools:
      useTools:
        context:
          workspaceId: string
          sessionId: string
          memory: string
          goal: string
        calls:
          _item_schema:
            agent: string
            tool: string
            params: object
          _subtools:
            memoryManager:
              # Workspace tools
              loadWorkspace:
                _required: [id]
                id: string
                limit: number
              listWorkspaces:
                _required: []
                includeArchived: boolean
                sortBy: string
                order: string
                limit: number
              createWorkspace:
                _required: [name, description, rootFolder, purpose, workflows]
                name: string
                description: string
                rootFolder: string
                purpose: string
                workflows: array
                keyFiles: array
                preferences: object
                dedicatedAgentId: string
                relatedFolders: array
                relatedFiles: array
              updateWorkspace:
                _required: [workspaceId]
                workspaceId: string
                name: string
                description: string
                rootFolder: string
                purpose: string
                workflows: array
                keyFiles: array
                preferences: object
              archiveWorkspace:
                _required: [name]
                name: string
                restore: boolean
              # State tools
              listStates:
                _required: []
                includeArchived: boolean
                tags: array
                page: number
                pageSize: number
                order: string
              createState:
                _required: [name, conversationContext, activeTask, activeFiles, nextSteps]
                name: string
                conversationContext: string
                activeTask: string
                activeFiles: array
                nextSteps: array
                description: string
                tags: array
              loadState:
                _required: [name]
                name: string
              archiveState:
                _required: [name]
                name: string
                restore: boolean
    error: "useTools validation failed: {details}"
