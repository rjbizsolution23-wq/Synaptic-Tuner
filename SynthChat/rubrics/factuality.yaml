name: Factuality
description: Ensures all details are grounded in system prompt or user request
scope: response
pass_threshold: 0.8

judge_prompt: |
  # CONTEXT
  You are evaluating whether content contains only factual information from the system prompt and user request. For non-thinking examples, focus on tool call arguments. For thinking examples, the memory field is particularly prone to inventing dates and history.

  **Tool Calls:**
  ```json
  {original_tool_calls}
  ```

  **Response Text:**
  ```
  {current_content}
  ```

  **Thinking Block (if present):**
  ```
  {thinking_content}
  ```

  **System Prompt (ground truth):**
  ```
  {system_prompt}
  ```

  **User Request:**
  ```
  {user_request}
  ```

  # MISSION
  Score based on whether all details can be traced to the inputs. High-quality training data contains only verifiable information.

  # INSTRUCTIONS

  ## For Tool Calls (non-thinking examples):
  1. Check tool call arguments for invented details:
     - File paths that don't exist in system prompt's vault_structure
     - Session/workspace IDs that don't match <session_context>
     - Content that user didn't specify
     - Dates/timestamps not in inputs

  2. Valid tool call information:
     - Paths from vault_structure or workspaceStructure
     - IDs from <session_context>
     - Content directly from or paraphrased from user request
     - Reasonable context descriptions based on task

  ## For Thinking Blocks (when present):
  1. Check the "memory" field carefully for invented details:
     - Dates like "Oct 12", "2025-12-07" (only valid if in inputs)
     - History like "user has been working on", "was requested on"
     - Motivations like "after reviewing", "to restructure"

  2. Check goal/plan for hallucinated paths

  ## For Response Text:
  1. Check for references to files not in vault_structure
  2. Check for dates/history not in inputs

  # SCORING
  - **1.0** = All details traceable to inputs or reasonable inference
  - **0.7-0.9** = Minor details without source (e.g., generic descriptions)
  - **0.4-0.6** = Several invented details or hallucinated paths
  - **0.0-0.3** = Major fabrications (wrong paths, invented history)

  # FORMAT
  Return JSON: `{"factuality_score": 0.0-1.0}`

improver_prompt: |
  # CONTEXT
  You are improving content to ensure all details are grounded in the system prompt or user request.

  **Current Tool Calls:**
  ```json
  {original_tool_calls}
  ```

  **Current Response Text:**
  ```
  {current_content}
  ```

  **Thinking Block (if present):**
  ```
  {thinking_content}
  ```

  **System Prompt (ground truth):**
  ```
  {system_prompt}
  ```

  **User Request:**
  ```
  {user_request}
  ```

  **Improvement Feedback:**
  ```
  {feedback}
  ```

  # MISSION
  Generate improved content where every detail can be traced to the inputs.

  # INSTRUCTIONS FOR TOOL CALLS (non-thinking examples)
  If improving tool calls:
  1. **Fix file paths in arguments**:
     - Only use paths from vault_structure or workspaceStructure
     - If path is hallucinated, find correct path from system prompt
     - If no matching path exists, make the operation generic

  2. **Fix session/workspace IDs**:
     - Extract correct IDs from <session_context> in system prompt
     - sessionId and workspaceId must match exactly

  3. **Fix context object fields** (EXACTLY 4 fields):
     - workspaceId: copy EXACTLY from <session_context>
     - sessionId: copy EXACTLY from <session_context>
     - memory: brief summary of conversation (1-3 sentences, factual only)
     - goal: current objective based on user request (1-3 sentences)

  4. **Output improved tool call in ```tool format**

  # INSTRUCTIONS FOR THINKING BLOCKS (when present)
  If the content has a JSON thinking block:
  1. **Fix the memory field**: Remove invented dates/history
  2. **Fix file paths**: Only use paths from vault_structure
  3. **Output fixed JSON**

  # INSTRUCTIONS FOR RESPONSE TEXT
  If improving response text:
  1. **Keep natural and conversational**
  2. **Don't reference files/dates not in system prompt**
  3. **Output natural language, NOT structured data**

  # OUTPUT FORMAT
  - For tool calls: output ```tool block with corrected arguments
  - For thinking: output valid JSON
  - For text responses: output natural language

output_schema:
  type: object
  properties:
    factuality_score:
      type: number
      min: 0.0
      max: 1.0
  required:
    - factuality_score

# Unified validations format
validations:
  # Cross-scope validation: Check file paths from thinking/response against system_prompt
  - cross_scope:
      from: thinking
      to: system_prompt
      extract:
        fields: [goal, memory, requirements, plan]
        pattern: '(?:[A-Za-z0-9_-]+/)*[A-Za-z0-9_-]+\.(?:md|txt|json|yaml|yml)'
      skip_if:
        - pattern: '(?:create|new|generate|add)\s+.*{value}'
        - pattern: '{value}.*(?:will be created|does not exist yet)'
      validate_in: [vault_structure, selected_workspace]
    error: "HALLUCINATED PATH: '{value}' not found in vault_structure or workspaceStructure"

  # Cross-scope validation: Check dates in thinking against system_prompt and user
  # Dates are almost always hallucinated unless explicitly provided in inputs
  - cross_scope:
      from: thinking
      to: [system_prompt, user]
      extract:
        fields: [memory, goal, requirements]
        # Match various date formats:
        # - ISO: 2025-12-07, 2024-01-15
        # - US: 12/07/2025, 1/15/24
        # - Written: Dec 7, December 7th, Oct 12
        # - Time references: 14:32 UTC, 2:30 PM
        pattern: '\b(?:20\d{2}[-/]\d{1,2}[-/]\d{1,2}|\d{1,2}[-/]\d{1,2}[-/](?:20)?\d{2}|(?:Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)[a-z]*\.?\s+\d{1,2}(?:st|nd|rd|th)?(?:,?\s*20\d{2})?|\d{1,2}:\d{2}\s*(?:UTC|AM|PM|am|pm))\b'
      validate_in_content: true
    error: "HALLUCINATED DATE: '{value}' not found in system_prompt or user request"

  # Cross-scope validation: Check dates in response against system_prompt and user
  - cross_scope:
      from: response
      to: [system_prompt, user]
      extract:
        pattern: '\b(?:20\d{2}[-/]\d{1,2}[-/]\d{1,2}|\d{1,2}[-/]\d{1,2}[-/](?:20)?\d{2}|(?:Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)[a-z]*\.?\s+\d{1,2}(?:st|nd|rd|th)?(?:,?\s*20\d{2})?|\d{1,2}:\d{2}\s*(?:UTC|AM|PM|am|pm))\b'
      validate_in_content: true
    error: "HALLUCINATED DATE: '{value}' not found in system_prompt or user request"

# Enable tool call validation
# NOTE: check_context_ids is for Claudesidian-MCP datasets that use sessionId/workspaceId
# Other users should leave this as false (default)
validation:
  tool_calls:
    enabled: true
    check_context_ids: false  # Set to true for Claudesidian-MCP datasets
