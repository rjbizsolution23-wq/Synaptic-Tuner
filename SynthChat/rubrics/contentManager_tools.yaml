name: contentManager Tools
description: Validates contentManager tool calls use OpenAI format with useTools schema
scope: response
pass_threshold: 0.8

judge_prompt: |
  # CONTEXT
  You are evaluating tool calls for the contentManager agent. Tool calls must use OpenAI format with the useTools schema.

  **Tool Calls to Evaluate:**
  ```json
  {original_tool_calls}
  ```

  **System Prompt:**
  ```
  {system_prompt}
  ```

  **User Request:**
  ```
  {user_request}
  ```

  # REQUIRED FORMAT

  Tool calls MUST use OpenAI tool_calls format with name "useTools":
  ```json
  {{
    "tool_calls": [
      {{
        "id": "unique_id",
        "type": "function",
        "function": {{
          "name": "useTools",
          "arguments": "{{\"context\": {{...}}, \"calls\": [{{...}}]}}"
        }}
      }}
    ]
  }}
  ```

  The `arguments` JSON string must contain:
  ```json
  {{
    "context": {{
      "workspaceId": "string (from session_context or 'default')",
      "sessionId": "string (from session_context)",
      "memory": "string (1-3 sentences)",
      "goal": "string (1-3 sentences)"
    }},
    "calls": [
      {{
        "agent": "contentManager",
        "tool": "toolName",
        "params": {{ ... tool-specific params ... }}
      }}
    ]
  }}
  ```

  ## Valid Tools and Params:

  | tool | required params | optional params |
  |------|-----------------|-----------------|
  | readContent | filePath | limit, offset, includeLineNumbers |
  | createContent | filePath, content | - |
  | appendContent | filePath, content | - |
  | prependContent | filePath, content | - |
  | deleteContent | filePath, content | similarityThreshold |
  | replaceContent | filePath, oldContent, newContent | similarityThreshold |
  | replaceByLine | filePath, startLine, endLine, newContent | - |
  | findReplaceContent | filePath, findText, replaceText | replaceAll, caseSensitive |

  ## DESTRUCTIVE TOOLS: deleteContent, replaceContent, replaceByLine, findReplaceContent

  # EVALUATION CRITERIA

  ## Option A: Tool Call Response
  If making a tool call:
  1. **Function Name**: Must be exactly "useTools"
  2. **Arguments Structure**: Must have `context` and `calls` at root
  3. **Context Object**: Must have exactly 4 fields (workspaceId, sessionId, memory, goal)
  4. **Calls Array**: Each call must have `agent`, `tool`, `params`
  5. **Agent Value**: Must be exactly "contentManager"
  6. **Tool Value**: Must be valid tool name
  7. **Params**: Must include all required params for the tool

  ## Option B: Clarification Response (VALID ALTERNATIVE)
  If the user's request lacks critical information needed for a tool call, the assistant MAY ask for clarification instead. This is VALID when:
  - The file path is unknown/unspecified and cannot be inferred from vault_structure
  - The content to modify is unspecified
  - The operation is ambiguous (e.g., "update the file" without saying what to update)

  A clarification response has:
  - `content`: A polite question asking for the missing info (file path, content, etc.)
  - `tool_calls`: null or empty array

  # SCORING
  - **1.0** = Correct tool call format OR valid clarification request when info is missing
  - **0.7-0.9** = Minor param issues in tool call
  - **0.4-0.6** = Wrong structure OR missing required params
  - **0.0-0.3** = Wrong function name OR completely wrong format OR unnecessary clarification (info was available)

  # OUTPUT
  Return JSON: `{{"contentmanagertools_score": 0.0-1.0}}`

improver_prompt: |
  # CONTEXT
  You are converting tool calls to the correct OpenAI assistant message format.

  **Current Tool Calls:**
  ```json
  {original_tool_calls}
  ```

  **System Prompt:**
  ```
  {system_prompt}
  ```

  **User Request:**
  ```
  {user_request}
  ```

  **Feedback:**
  ```
  {feedback}
  ```

  # DECISION: TOOL CALL OR CLARIFICATION?

  First, determine if you have enough information to make a tool call:
  - Do you know the file path? (Check vault_structure, selected_workspace, or user request)
  - Do you know what content to read/write/modify?
  - Is the operation clear?

  **If YES to all**: Make a tool call (Option A below)
  **If NO to any**: Ask for clarification (Option B below)

  # OPTION A: TOOL CALL RESPONSE

  Output a complete assistant message with `content: null` and `tool_calls` array:

  ```json
  {{
    "content": null,
    "tool_calls": [
      {{
        "id": "call_<random_9chars>",
        "type": "function",
        "function": {{
          "name": "useTools",
          "arguments": "<JSON string with context and calls>"
        }}
      }}
    ]
  }}
  ```

  **CRITICAL**: `content` MUST be `null` (not a string, not empty string).

  ## Valid Tools and Params:

  | tool | required params | optional params |
  |------|-----------------|-----------------|
  | readContent | filePath | limit, offset, includeLineNumbers |
  | createContent | filePath, content | - |
  | appendContent | filePath, content | - |
  | prependContent | filePath, content | - |
  | deleteContent | filePath, content | similarityThreshold |
  | replaceContent | filePath, oldContent, newContent | similarityThreshold |
  | replaceByLine | filePath, startLine, endLine, newContent | - |
  | findReplaceContent | filePath, findText, replaceText | replaceAll, caseSensitive |

  # INSTRUCTIONS

  1. **Extract IDs from system prompt's <session_context>**
  2. **Set content to null** (tool-only response)
  3. **Set function.name to "useTools"**
  4. **Build arguments with context + calls array**

  # EXAMPLE (Tool Call)

  ```json
  {{
    "content": null,
    "tool_calls": [
      {{
        "id": "call_r4s5t6u7v",
        "type": "function",
        "function": {{
          "name": "useTools",
          "arguments": "{{\"context\": {{\"workspaceId\": \"default\", \"sessionId\": \"session_123\", \"memory\": \"User wants to read their todo file.\", \"goal\": \"Read and display the todo.md contents.\"}}, \"calls\": [{{\"agent\": \"contentManager\", \"tool\": \"readContent\", \"params\": {{\"filePath\": \"notes/todo.md\"}}}}]}}"
        }}
      }}
    ]
  }}
  ```

  # OPTION B: CLARIFICATION RESPONSE

  If you cannot determine the file path or content from the system prompt or user request, ask for clarification:

  ```json
  {{
    "content": "I'd be happy to help with that. Could you please specify which file you'd like me to modify?",
    "tool_calls": null
  }}
  ```

  Ask specifically for:
  - File path (if unknown)
  - Content to add/modify (if unspecified)
  - Which specific changes to make (if ambiguous)

  # OUTPUT
  Return ONLY the JSON object with content and tool_calls. No markdown, no explanation.

output_schema:
  type: object
  properties:
    contentmanagertools_score:
      type: number
      min: 0.0
      max: 1.0
  required:
    - contentmanagertools_score

# Output format defines how improved content is applied to the example
output_format:
  type: assistant_message

# Validation using tools schema with subtool manifests
validations:
  - tools:
      useTools:
        context:
          workspaceId: string
          sessionId: string
          memory: string
          goal: string
        calls:
          _item_schema:
            agent: string
            tool: string
            params: object
          _subtools:
            contentManager:
              readContent:
                _required: [filePath]
                filePath: string
                limit: number
                offset: number
                includeLineNumbers: boolean
              createContent:
                _required: [filePath, content]
                filePath: string
                content: string
              appendContent:
                _required: [filePath, content]
                filePath: string
                content: string
              prependContent:
                _required: [filePath, content]
                filePath: string
                content: string
              deleteContent:
                _required: [filePath, content]
                filePath: string
                content: string
                similarityThreshold: number
              replaceContent:
                _required: [filePath, oldContent, newContent]
                filePath: string
                oldContent: string
                newContent: string
                similarityThreshold: number
              replaceByLine:
                _required: [filePath, startLine, endLine, newContent]
                filePath: string
                startLine: number
                endLine: number
                newContent: string
              findReplaceContent:
                _required: [filePath, findText, replaceText]
                filePath: string
                findText: string
                replaceText: string
                replaceAll: boolean
                caseSensitive: boolean
    error: "useTools validation failed: {details}"
