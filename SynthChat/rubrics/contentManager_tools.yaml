name: contentManager Tools
description: Validates CLI-first contentManager tool calls wrapped in useTools
scope: response
pass_threshold: 0.8
judge_prompt: |
  # CONTEXT
  You are evaluating CLI-first tool calls for the contentManager agent.

  **Tool Calls to Evaluate:**
  ```json
  {original_tool_calls}
  ```

  **System Prompt:**
  ```
  {system_prompt}
  ```

  **User Request:**
  ```
  {user_request}
  ```

  # REQUIRED FORMAT

  Tool calls MUST use OpenAI `tool_calls` format with `function.name = "useTools"`.
  The `function.arguments` JSON string must contain top-level wrapper fields:
  - `workspaceId`
  - `sessionId`
  - `memory`
  - `goal`
  - `tool`
  - optional `constraints`
  - optional `strategy`

  Do NOT use nested `context` + `calls` payloads.
  Do NOT emit direct tool names such as `contentManager_replace` as the function name.

  ## Valid content commands
  - `content read ...`
  - `content write ...`
  - `content insert ...`
  - `content replace ...`
  - `content set-property ...`

  ## Command requirements
  - `content read`: must include the path and starting line
  - `content write`: must include the path and full content
  - `content insert`: must include the path, inserted content, and starting line
  - `content replace`: must include `--old-content`, `--new-content`, `--start-line`, and `--end-line`
  - `content set-property`: must include the path, property, and value

  ## SCORING
  - **1.0** = Correct CLI-first wrapper and correct content command, or valid clarification when critical info is missing
  - **0.7-0.9** = Correct wrapper with minor command/arg issues
  - **0.4-0.6** = Wrong wrapper shape or missing required command args
  - **0.0-0.3** = Nested `context/calls`, direct-tool format, or wrong command family

  # OUTPUT
  Return JSON: `{"contentmanagertools_score": 0.0-1.0}`
improver_prompt: |
  # CONTEXT
  You are converting tool calls to the correct CLI-first OpenAI assistant message format.

  **Current Tool Calls:**
  ```json
  {original_tool_calls}
  ```

  **System Prompt:**
  ```
  {system_prompt}
  ```

  **User Request:**
  ```
  {user_request}
  ```

  **Feedback:**
  ```
  {feedback}
  ```

  # DECISION
  If the request has enough detail for a content command, emit a `useTools` call.
  Otherwise ask a clarification question with no tool calls.

  # TOOL CALL FORMAT
  Return a complete assistant message:
  ```json
  {{
    "content": null,
    "tool_calls": [
      {{
        "id": "call_<random_9chars>",
        "type": "function",
        "function": {{
          "name": "useTools",
          "arguments": "{{\"workspaceId\":\"default\",\"sessionId\":\"session_123\",\"memory\":\"User wants to update a note.\",\"goal\":\"Replace the stale sentence in notes/todo.md.\",\"tool\":\"content replace --path \\\"notes/todo.md\\\" --old-content \\\"Old text\\\" --new-content \\\"New text\\\" --start-line 4 --end-line 4\",\"constraints\":\"Only change line 4.\",\"strategy\":\"serial\"}}"
        }}
      }}
    ]
  }}
  ```

  ## Rules
  - Emit exactly one OpenAI tool call in `tool_calls`
  - Use a single CLI command string in `tool`
  - If more than one content operation is required, combine them into the single `tool` string with comma-separated commands
  - Use the real content commands (`content read`, `content write`, `content insert`, `content replace`, `content set-property`)
  - `content insert` must use `--start-line` (never `--line`)
  - For `content replace`, include both `--old-content` and `--new-content`
  - Do NOT emit nested `context` + `calls`
  - Do NOT emit `contentManager_*` as `function.name`

  # OUTPUT
  Return ONLY the JSON object with `content` and `tool_calls`.
output_schema:
  type: object
  properties:
    contentmanagertools_score:
      type: number
      min: 0.0
      max: 1.0
  required:
  - contentmanagertools_score
  additionalProperties: false
output_format:
  type: assistant_message
validations:
- tools:
    useTools:
      _required:
      - workspaceId
      - sessionId
      - memory
      - goal
      - tool
      _additionalProperties: false
      workspaceId: string
      sessionId: string
      memory: string
      goal: string
      tool: string
      constraints: string
      strategy: string
  error: 'useTools validation failed: {details}'
