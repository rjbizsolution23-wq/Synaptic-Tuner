name: contentManager Tools
description: Validates contentManager tool calls use OpenAI format with useTools schema
scope: response
pass_threshold: 0.8
judge_prompt: "# CONTEXT\nYou are evaluating tool calls for the contentManager agent. Tool calls must use OpenAI format with the useTools schema.\n\n**Tool Calls to Evaluate:**\n```json\n{original_tool_calls}\n```\n\n**System Prompt:**\n```\n{system_prompt}\n```\n\n**User Request:**\n```\n{user_request}\n```\n\n# REQUIRED FORMAT\n\nTool calls MUST use OpenAI tool_calls format with name \"useTools\":\n```json\n{{\n  \"tool_calls\": [\n    {{\n      \"id\": \"unique_id\",\n      \"type\": \"function\",\n      \"function\": {{\n        \"name\": \"useTools\",\n        \"arguments\": \"{{\\\"workspaceId\\\": \\\"default\\\", \\\"sessionId\\\": \\\"session_123\\\", \\\"memory\\\": \\\"Need to inspect and reorganize notes.\\\", \\\"goal\\\": \\\"Move a note and then read it back.\\\", \\\"constraints\\\": \\\"Do not touch unrelated files.\\\", \\\"tool\\\": \\\"storage move \\\\\\\"notes/today.md\\\\\\\" \\\\\\\"archive/today.md\\\\\\\", content read \\\\\\\"archive/today.md\\\\\\\"\\\", \\\"\
  strategy\\\": \\\"serial\\\"}}\"\n      }}\n    }}\n  ]\n}}\n```\n\nThe `arguments` JSON string must contain:\n```json\n{{\n  \"context\": {{\n    \"workspaceId\": \"string (from session_context or 'default')\",\n    \"sessionId\": \"string (from session_context)\",\n    \"memory\": \"string (1-3 sentences)\",\n    \"goal\": \"string (1-3 sentences)\"\n  }},\n  \"calls\": [\n    {{\n      \"agent\": \"contentManager\",\n      \"tool\": \"toolName\",\n      \"params\": {{ ... tool-specific params ... }}\n    }}\n  ]\n}}\n```\n\n## Valid Tools and Params:\n\n| tool | required params | optional params | notes |\n|------|-----------------|-----------------|-------|\n| read | path, startLine | endLine | Reads note content starting at a specific line |\n| write | path, content | overwrite | Creates a new file or overwrites when explicitly allowed |\n| insert | path, content, startLine | none | Adds new content without modifying existing content |\n| replace | path, oldContent, newContent, startLine,\
  \ endLine | none | Replaces existing content after verifying the current lines |\n| setProperty | path, property, value | mode | Updates frontmatter properties such as status or tags |\n\n## DESTRUCTIVE TOOLS: replace, setProperty, and write when overwrite=true\n\n# EVALUATION CRITERIA\n\n## Option A: Tool Call Response\nIf making a tool call:\n1. **Function Name**: Must be exactly \"useTools\"\n2. **Arguments Structure**: Must have top-level wrapper fields at root, including `workspaceId`, `sessionId`, `memory`, `goal`, and `tool`\n3. **Top-Level Fields**: Must include `workspaceId`, `sessionId`, `memory`, `goal`, and `tool`; `constraints` and `strategy` are optional\n4. **Tool Command String**: `tool` must be a CLI command string that resolves to the correct concrete tool(s)\n5. **Command Resolution**: The CLI command string must resolve to the correct manager/tool for the task\n6. **Tool Value**: Must be valid tool name\n7. **Params**: Must include all required params for the tool\n\
  \n## Option B: Clarification Response (VALID ALTERNATIVE)\nIf the user's request lacks critical information needed for a tool call, the assistant MAY ask for clarification instead. This is VALID when:\n- The file path is unknown/unspecified and cannot be inferred from vault_structure\n- The content to replace is unspecified\n- The operation is ambiguous (e.g., \"update the file\" without saying what to replace or insert)\n\nA clarification response has:\n- `content`: A polite question asking for the missing info (file path, content, etc.)\n- `tool_calls`: null or empty array\n\n# SCORING\n- **1.0** = Correct tool call format OR valid clarification request when info is missing\n- **0.7-0.9** = Minor param issues in tool call\n- **0.4-0.6** = Wrong structure OR missing required params\n- **0.0-0.3** = Wrong function name OR completely wrong format OR unnecessary clarification (info was available)\n\n# OUTPUT\nReturn JSON: `{{\"contentmanagertools_score\": 0.0-1.0}}`\n"
improver_prompt: "# CONTEXT\nYou are converting tool calls to the correct OpenAI assistant message format.\n\n**Current Tool Calls:**\n```json\n{original_tool_calls}\n```\n\n**System Prompt:**\n```\n{system_prompt}\n```\n\n**User Request:**\n```\n{user_request}\n```\n\n**Feedback:**\n```\n{feedback}\n```\n\n# DECISION: TOOL CALL OR CLARIFICATION?\n\nFirst, determine if you have enough information to make a tool call:\n- Do you know the file path? (Check vault_structure, selected_workspace, or user request)\n- Do you know what content to read/write/modify?\n- Is the operation clear?\n\n**If YES to all**: Make a tool call (Option A below)\n**If NO to any**: Ask for clarification (Option B below)\n\n# OPTION A: TOOL CALL RESPONSE\n\nOutput a complete assistant message with `content: null` and `tool_calls` array:\n\n```json\n{{\n  \"content\": null,\n  \"tool_calls\": [\n    {{\n      \"id\": \"call_<random_9chars>\",\n      \"type\": \"function\",\n      \"function\": {{\n        \"name\":\
  \ \"useTools\",\n        \"arguments\": \"<JSON string with context and calls>\"\n      }}\n    }}\n  ]\n}}\n```\n\n**CRITICAL**: `content` MUST be `null` (not a string, not empty string).\n\n## Valid Tools and Params:\n\n| tool | required params | optional params | notes |\n|------|-----------------|-----------------|-------|\n| read | path, startLine | endLine | Reads note content starting at a specific line |\n| write | path, content | overwrite | Creates a new file or overwrites when explicitly allowed |\n| insert | path, content, startLine | none | Adds new content without modifying existing content |\n| replace | path, oldContent, newContent, startLine, endLine | none | Replaces existing content after verifying the current lines |\n| setProperty | path, property, value | mode | Updates frontmatter properties |\n\n# INSTRUCTIONS\n\n1. **Extract IDs from system prompt's <session_context>**\n2. **Set content to null** (tool-only response)\n3. **Set function.name to \"useTools\"**\n\
  4. **Build top-level wrapper arguments with `workspaceId`, `sessionId`, `memory`, `goal`, `tool`, and optional `constraints`/`strategy`**\n\n# EXAMPLE (Tool Call)\n\n```json\n{{\n  \"content\": null,\n  \"tool_calls\": [\n    {{\n      \"id\": \"call_r4s5t6u7v\",\n      \"type\": \"function\",\n      \"function\": {{\n        \"name\": \"useTools\",\n        \"arguments\": \"{{\\\"context\\\": {{\\\"workspaceId\\\": \\\"default\\\", \\\"sessionId\\\": \\\"session_123\\\", \\\"memory\\\": \\\"User wants to read their todo file.\\\", \\\"goal\\\": \\\"Read and display the todo.md contents.\\\"}}, \\\"calls\\\": [{{\\\"agent\\\": \\\"contentManager\\\", \\\"tool\\\": \\\"read\\\", \\\"params\\\": {{\\\"path\\\": \\\"notes/todo.md\\\", \\\"startLine\\\": 1}}}}]}}\"\n      }}\n    }}\n  ]\n}}\n```\n\n# OPTION B: CLARIFICATION RESPONSE\n\nIf you cannot determine the file path or content from the system prompt or user request, ask for clarification:\n\n```json\n{{\n  \"content\": \"I'd be happy\
  \ to help with that. Could you please specify which file you'd like me to modify?\",\n  \"tool_calls\": null\n}}\n```\n\nAsk specifically for:\n- File path (if unknown)\n- Content to add/modify (if unspecified)\n- Which specific changes to make (if ambiguous)\n\n# OUTPUT\nReturn ONLY the JSON object with content and tool_calls. No markdown, no explanation.\n"
output_schema:
  type: object
  properties:
    contentmanagertools_score:
      type: number
      min: 0.0
      max: 1.0
  required:
  - contentmanagertools_score
output_format:
  type: assistant_message
validations:
- tools:
    useTools:
      context:
        workspaceId: string
        sessionId: string
        memory: string
        goal: string
      calls:
        _item_schema:
          agent: string
          tool: string
          params: object
        _subtools:
          contentManager:
            read:
              _required:
              - path
              - startLine
              path: string
              startLine: number
              endLine: number
            write:
              _required:
              - path
              - content
              path: string
              content: string
              overwrite: boolean
            insert:
              _required:
              - path
              - content
              - startLine
              path: string
              content: string
              startLine: number
            replace:
              _required:
              - path
              - oldContent
              - newContent
              - startLine
              - endLine
              path: string
              oldContent: string
              newContent: string
              startLine: number
              endLine: number
            setProperty:
              _required:
              - path
              - property
              - value
              path: string
              property: string
              value: string
              mode: string
  error: 'useTools validation failed: {details}'
