name: storageManager Tools
description: Validates storageManager tool calls use OpenAI format with useTools schema
scope: response
pass_threshold: 0.8
judge_prompt: "# CONTEXT\nYou are evaluating tool calls for the storageManager agent. Tool calls must use OpenAI format with the useTools schema.\n\n**Tool Calls to Evaluate:**\n```json\n{original_tool_calls}\n```\n\n**System Prompt:**\n```\n{system_prompt}\n```\n\n**User Request:**\n```\n{user_request}\n```\n\n# REQUIRED FORMAT\n\nTool calls MUST use OpenAI tool_calls format with name \"useTools\":\n```json\n{{\n  \"tool_calls\": [\n    {{\n      \"id\": \"unique_id\",\n      \"type\": \"function\",\n      \"function\": {{\n        \"name\": \"useTools\",\n        \"arguments\": \"{{\\\"workspaceId\\\": \\\"default\\\", \\\"sessionId\\\": \\\"session_123\\\", \\\"memory\\\": \\\"Need to inspect and reorganize notes.\\\", \\\"goal\\\": \\\"Move a note and then read it back.\\\", \\\"constraints\\\": \\\"Do not touch unrelated files.\\\", \\\"tool\\\": \\\"storage move \\\\\\\"notes/today.md\\\\\\\" \\\\\\\"archive/today.md\\\\\\\", content read \\\\\\\"archive/today.md\\\\\\\"\\\", \\\"\
  strategy\\\": \\\"serial\\\"}}\"\n      }}\n    }}\n  ]\n}}\n```\n\nThe `arguments` JSON string must contain:\n```json\n{{\n  \"context\": {{\n    \"workspaceId\": \"string (from session_context or 'default')\",\n    \"sessionId\": \"string (from session_context)\",\n    \"memory\": \"string (1-3 sentences)\",\n    \"goal\": \"string (1-3 sentences)\"\n  }},\n  \"calls\": [\n    {{\n      \"agent\": \"storageManager\",\n      \"tool\": \"toolName\",\n      \"params\": {{ ... tool-specific params ... }}\n    }}\n  ]\n}}\n```\n\n## Valid Tools and Params:\n\n| tool | required params | optional params |\n|------|-----------------|-----------------|\n| list | - | path, filter |\n| open | path | mode, focus |\n| createFolder | path | - |\n| move | path, newPath | overwrite |\n| archive | path | - |\n| copy | path, newPath | overwrite |\n\n## DESTRUCTIVE TOOLS: archive, move (overwrite)\n\n# EVALUATION CRITERIA\n\n1. **Function Name**: Must be exactly \"useTools\" (not \"storageManager_move\"\
  \ etc.)\n2. **Arguments Structure**: Must have top-level wrapper fields at root, including `workspaceId`, `sessionId`, `memory`, `goal`, and `tool`\n3. **Top-Level Fields**: Must include `workspaceId`, `sessionId`, `memory`, `goal`, and `tool`; `constraints` and `strategy` are optional\n4. **Tool Command String**: `tool` must be a CLI command string that resolves to the correct concrete tool(s)\n5. **Command Resolution**: The CLI command string must resolve to the correct manager/tool for the task\n6. **Tool Value**: Must be valid tool name (list, open, etc.)\n7. **Params**: Must include all required params for the tool\n\n# SCORING\n- **1.0** = Correct format, valid params, proper useTools structure\n- **0.7-0.9** = Minor param issues\n- **0.4-0.6** = Wrong structure OR missing required params\n- **0.0-0.3** = Wrong function name OR completely wrong format\n\n# OUTPUT\nReturn JSON: `{{\"storagemanagertools_score\": 0.0-1.0}}`\n"
improver_prompt: "# CONTEXT\nYou are converting tool calls to the correct OpenAI assistant message format.\n\n**Current Tool Calls:**\n```json\n{original_tool_calls}\n```\n\n**System Prompt:**\n```\n{system_prompt}\n```\n\n**User Request:**\n```\n{user_request}\n```\n\n**Feedback:**\n```\n{feedback}\n```\n\n# REQUIRED OUTPUT FORMAT\n\nOutput a complete assistant message with `content: null` and `tool_calls` array:\n\n```json\n{{\n  \"content\": null,\n  \"tool_calls\": [\n    {{\n      \"id\": \"call_<random_9chars>\",\n      \"type\": \"function\",\n      \"function\": {{\n        \"name\": \"useTools\",\n        \"arguments\": \"<JSON string with context and calls>\"\n      }}\n    }}\n  ]\n}}\n```\n\n**CRITICAL**: `content` MUST be `null` (not a string, not empty string).\n\nThe `arguments` value must be a JSON STRING containing:\n```json\n{{\n  \"context\": {{\n    \"workspaceId\": \"<from session_context or 'default'>\",\n    \"sessionId\": \"<from session_context>\",\n    \"memory\"\
  : \"<1-3 sentence summary>\",\n    \"goal\": \"<1-3 sentence objective>\"\n  }},\n  \"calls\": [\n    {{\n      \"agent\": \"storageManager\",\n      \"tool\": \"<toolName without prefix>\",\n      \"params\": {{ <tool-specific parameters> }}\n    }}\n  ]\n}}\n```\n\n## Valid Tools and Params:\n\n| tool | required params | optional params |\n|------|-----------------|-----------------|\n| list | - | path, filter |\n| open | path | mode, focus |\n| createFolder | path | - |\n| move | path, newPath | overwrite |\n| archive | path | - |\n| copy | path, newPath | overwrite |\n\n# INSTRUCTIONS\n\n1. **Extract IDs from system prompt's <session_context>**\n2. **Set content to null** (tool-only response)\n3. **Set function.name to \"useTools\"**\n4. **Build top-level wrapper arguments with `workspaceId`, `sessionId`, `memory`, `goal`, `tool`, and optional `constraints`/`strategy`**\n\n# EXAMPLE\n\n```json\n{{\n  \"content\": null,\n  \"tool_calls\": [\n    {{\n      \"id\": \"call_m7k2p9x4q\"\
  ,\n      \"type\": \"function\",\n      \"function\": {{\n        \"name\": \"useTools\",\n        \"arguments\": \"{{\\\"context\\\": {{\\\"workspaceId\\\": \\\"default\\\", \\\"sessionId\\\": \\\"session_123\\\", \\\"memory\\\": \\\"User reorganizing vault.\\\", \\\"goal\\\": \\\"Move LightRay to archive.\\\"}}, \\\"calls\\\": [{{\\\"agent\\\": \\\"storageManager\\\", \\\"tool\\\": \\\"move\\\", \\\"params\\\": {{\\\"path\\\": \\\"Studios/Boards/LightRay\\\", \\\"newPath\\\": \\\"Studios/Archive/LightRay\\\"}}}}]}}\"\n      }}\n    }}\n  ]\n}}\n```\n\n# OUTPUT\nReturn ONLY the JSON object with content and tool_calls. No markdown, no explanation.\n"
output_schema:
  type: object
  properties:
    storagemanagertools_score:
      type: number
      min: 0.0
      max: 1.0
  required:
  - storagemanagertools_score
output_format:
  type: assistant_message
validations:
- tools:
    useTools:
      context:
        workspaceId: string
        sessionId: string
        memory: string
        goal: string
      calls:
        _item_schema:
          agent: string
          tool: string
          params: object
        _subtools:
          storageManager:
            list:
              _required: []
              path: string
              filter: string
            open:
              _required:
              - path
              path: string
              mode: string
              focus: boolean
            createFolder:
              _required:
              - path
              path: string
            move:
              _required:
              - path
              - newPath
              path: string
              newPath: string
              overwrite: boolean
            archive:
              _required:
              - path
              path: string
            copy:
              _required:
              - path
              - newPath
              path: string
              newPath: string
              overwrite: boolean
  error: 'useTools validation failed: {details}'
