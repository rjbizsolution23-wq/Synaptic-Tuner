name: storageManager Tools
description: Validates CLI-first storageManager tool calls wrapped in useTools
scope: response
pass_threshold: 0.8
judge_prompt: |
  # CONTEXT
  You are evaluating CLI-first tool calls for the storageManager agent.

  **Tool Calls to Evaluate:**
  ```json
  {original_tool_calls}
  ```

  Tool calls must use `function.name = "useTools"` and a top-level arguments payload with:
  `workspaceId`, `sessionId`, `memory`, `goal`, `tool`, and optional `constraints` / `strategy`.

  Do NOT use nested `context` + `calls`.

  ## Valid storage commands
  - `storage list ...`
  - `storage open ...`
  - `storage create-folder ...`
  - `storage move ...`
  - `storage archive ...`
  - `storage copy ...`

  Return JSON: `{"storagemanagertools_score": 0.0-1.0}`
improver_prompt: |
  Convert the current response into a CLI-first `useTools` assistant message.

  **Current Tool Calls:**
  ```json
  {original_tool_calls}
  ```

  **Feedback:**
  ```
  {feedback}
  ```

  Example:
  ```json
  {
    "content": null,
    "tool_calls": [
      {
        "id": "call_<random_9chars>",
        "type": "function",
        "function": {
          "name": "useTools",
          "arguments": "{\"workspaceId\":\"default\",\"sessionId\":\"session_123\",\"memory\":\"User is reorganizing the vault.\",\"goal\":\"Move LightRay into the archive and open the note.\",\"tool\":\"storage move \\\"Studios/Boards/LightRay\\\" \\\"Studios/Archive/LightRay\\\", storage open \\\"Studios/Archive/LightRay/Hero.md\\\"\",\"constraints\":\"Do not touch unrelated files.\",\"strategy\":\"serial\"}"
        }
      }
    ]
  }
  ```

  Do NOT use nested `context` + `calls`.
  Do NOT emit `storageManager_*` as the function name.
output_schema:
  type: object
  properties:
    storagemanagertools_score:
      type: number
      min: 0.0
      max: 1.0
  required:
  - storagemanagertools_score
  additionalProperties: false
output_format:
  type: assistant_message
validations:
- tools:
    useTools:
      _required:
      - workspaceId
      - sessionId
      - memory
      - goal
      - tool
      _additionalProperties: false
      workspaceId: string
      sessionId: string
      memory: string
      goal: string
      tool: string
      constraints: string
      strategy: string
  error: 'useTools validation failed: {details}'
