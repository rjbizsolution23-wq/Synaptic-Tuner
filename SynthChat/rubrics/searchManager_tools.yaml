name: searchManager Tools
description: Validates CLI-first searchManager tool calls wrapped in useTools
scope: response
pass_threshold: 0.8
judge_prompt: |
  # CONTEXT
  You are evaluating CLI-first tool calls for the searchManager agent.

  **Tool Calls to Evaluate:**
  ```json
  {original_tool_calls}
  ```

  Tool calls must use `function.name = "useTools"` and a top-level arguments payload with:
  `workspaceId`, `sessionId`, `memory`, `goal`, `tool`, and optional `constraints` / `strategy`.

  Do NOT use nested `context` + `calls`.

  ## Valid search commands
  - `search search-content ...`
  - `search search-directory ...`
  - `search search-memory ...`

  The command string must resolve to the searchManager family and include the query plus any required extra args.

  Return JSON: `{"searchmanagertools_score": 0.0-1.0}`
improver_prompt: |
  Convert the current response into a CLI-first `useTools` assistant message.

  **Current Tool Calls:**
  ```json
  {original_tool_calls}
  ```

  **Feedback:**
  ```
  {feedback}
  ```

  Example:
  ```json
  {
    "content": null,
    "tool_calls": [
      {
        "id": "call_<random_9chars>",
        "type": "function",
        "function": {
          "name": "useTools",
          "arguments": "{\"workspaceId\":\"default\",\"sessionId\":\"session_123\",\"memory\":\"User is searching for rollout notes.\",\"goal\":\"Find rollout notes mentioning staged deploys.\",\"tool\":\"search search-content \\\"staged deploy\\\" --limit 5 --include-content\",\"strategy\":\"serial\"}"
        }
      }
    ]
  }
  ```

  Do NOT use nested `context` + `calls`.
  Do NOT emit `searchManager_*` as the function name.
output_schema:
  type: object
  properties:
    searchmanagertools_score:
      type: number
      min: 0.0
      max: 1.0
  required:
  - searchmanagertools_score
  additionalProperties: false
output_format:
  type: assistant_message
validations:
- tools:
    useTools:
      _required:
      - workspaceId
      - sessionId
      - memory
      - goal
      - tool
      _additionalProperties: false
      workspaceId: string
      sessionId: string
      memory: string
      goal: string
      tool: string
      constraints: string
      strategy: string
  error: 'useTools validation failed: {details}'
