name: Content Writing Quality
description: Validates contentManager write calls produce substantial Obsidian-friendly content in the CLI-first wrapper
scope: response
pass_threshold: 0.85
judge_prompt: |
  # CONTEXT
  You are evaluating a content-writing tool call.

  **Tool Calls to Evaluate:**
  ```json
  {original_tool_calls}
  ```

  The response should use the CLI-first `useTools` wrapper with a `tool` string that resolves to `content write ...`.
  Judge the written content for:
  - raw YAML frontmatter at the top
  - useful structure and headings
  - substantive content
  - Obsidian-friendly formatting such as wikilinks, callouts, tables, or lists when appropriate

  Return JSON: `{"content_writing_quality_score": 0.0-1.0}`
improver_prompt: |
  Improve the content-writing tool call while preserving the CLI-first `useTools` wrapper.

  **Current Tool Calls:**
  ```json
  {original_tool_calls}
  ```

  **Feedback:**
  ```
  {feedback}
  ```

  Rules:
  - Keep `function.name = "useTools"`
  - Keep wrapper fields at the top level (`workspaceId`, `sessionId`, `memory`, `goal`, `tool`)
  - The command in `tool` should be a `content write ...` command
  - Improve the written markdown so it includes frontmatter and richer Obsidian-friendly content
  - Do NOT use nested `context` + `calls`

  Return ONLY the JSON assistant message.
output_schema:
  type: object
  properties:
    content_writing_quality_score:
      type: number
      min: 0.0
      max: 1.0
  required:
  - content_writing_quality_score
  additionalProperties: false
output_format:
  type: assistant_message
validations:
- tools:
    useTools:
      _required:
      - workspaceId
      - sessionId
      - memory
      - goal
      - tool
      _additionalProperties: false
      workspaceId: string
      sessionId: string
      memory: string
      goal: string
      tool: string
      constraints: string
      strategy: string
  error: "useTools validation failed: {details}"
- cross_scope:
    from: response
    to: system_prompt
    extract:
      fields:
      - sessionId
      - workspaceId
      pattern: "(?:sessionId|workspaceId).*?[\"']([^\"']+)[\"']"
    validate_in:
    - session_context
  error: "Context ID mismatch: '{value}' not found in session_context"
validation:
  tool_calls:
    enabled: true
    check_context_ids: true
