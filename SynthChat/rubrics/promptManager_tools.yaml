name: promptManager Tools
description: Validates CLI-first promptManager tool calls wrapped in useTools
scope: response
pass_threshold: 0.8
judge_prompt: |
  # CONTEXT
  You are evaluating CLI-first tool calls for the promptManager agent.

  **Tool Calls to Evaluate:**
  ```json
  {original_tool_calls}
  ```

  Tool calls must use `function.name = "useTools"` and a top-level arguments payload with:
  `workspaceId`, `sessionId`, `memory`, `goal`, `tool`, and optional `constraints` / `strategy`.

  Do NOT use nested `context` + `calls`.

  ## Valid prompt commands
  - `prompt list-models`
  - `prompt create-prompt ...`
  - `prompt list-prompts ...`
  - `prompt get-prompt ...`
  - `prompt update-prompt ...`
  - `prompt archive-prompt ...`
  - `prompt execute-prompts --prompts ...`
  - `prompt generate-image ...`
  - `prompt subagent ...`

  `prompt execute-prompts --prompts ...` must contain a valid serialized prompts payload, not placeholder text.
  Each prompts item should use the current schema shape, for example:
  `{"agentId":"researcher","prompt":"Summarize Docs/brief.md in 3 bullets."}`
  Do not use legacy prompt item keys like `role` / `content`.
  Do not switch to non-prompt command families such as `file ...`, `content ...`, or `storage ...`.

  Return JSON: `{"promptmanagertools_score": 0.0-1.0}`
improver_prompt: |
  Convert the current response into a CLI-first `useTools` assistant message.

  **Current Tool Calls:**
  ```json
  {original_tool_calls}
  ```

  **Feedback:**
  ```
  {feedback}
  ```

  For this promptManager regeneration flow:
  - emit exactly one OpenAI tool call in `tool_calls`
  - the tool string must contain prompt-manager commands only
  - if the legacy example bundled lookup/read/write behavior, fold that intent into the `--prompts` payload instead of switching to file/content/storage commands
  - when the task is to run an agent or prompt sequence, prefer `prompt execute-prompts --prompts ...`
  - the `--prompts` value must be valid JSON
  - each prompts item should use `agentId` and `prompt`
  - do not use `role` / `content` as the object keys inside `--prompts`
  - wrap the serialized JSON array in single quotes so it is a single CLI value
  - the command should look like: `prompt execute-prompts --prompts '[{{"agentId":"researcher","prompt":"Summarize Docs/brief.md in 3 bullets."}}]'`

  Example:
  ```json
  {{
    "content": null,
    "tool_calls": [
      {{
        "id": "call_<random_9chars>",
        "type": "function",
        "function": {{
          "name": "useTools",
          "arguments": "{{\"workspaceId\":\"default\",\"sessionId\":\"session_123\",\"memory\":\"User wants a reusable code-review prompt.\",\"goal\":\"Create the code-review prompt.\",\"tool\":\"prompt create-prompt \\\"Code Reviewer\\\" \\\"Reviews pull requests\\\" \\\"You review pull requests for correctness, security, and maintainability.\\\"\",\"strategy\":\"serial\"}}"
        }}
      }}
    ]
  }}
  ```

  Do NOT use nested `context` + `calls`.
  Do NOT emit `promptManager_*` as the function name.
  Do NOT emit `file ...`, `content ...`, or `storage ...` commands.
output_schema:
  type: object
  properties:
    promptmanagertools_score:
      type: number
      min: 0.0
      max: 1.0
  required:
  - promptmanagertools_score
  additionalProperties: false
output_format:
  type: assistant_message
validations:
- tools:
    useTools:
      _required:
      - workspaceId
      - sessionId
      - memory
      - goal
      - tool
      _additionalProperties: false
      workspaceId: string
      sessionId: string
      memory: string
      goal: string
      tool: string
      constraints: string
      strategy: string
  error: 'useTools validation failed: {details}'
