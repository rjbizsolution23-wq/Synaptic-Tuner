          description: Templates and project docs
          root_folder: ""
      available_prompts:
        - id: agent_file_copier
          name: File Copier
          purpose: Duplicates existing files into new project locations
      assistant_instructions: >-
        You are an AI assistant helping manage a filesystem-style workspace.
        Use the exact existing source path from the generated environment.
    environment_generation:
      prompt: |
        Output ONLY valid JSON.

        Generate a realistic filesystem-backed workspace for a copy task.

        Requirements:
        - Include exactly one source file that should be copied into a new project folder.
        - The source file must exist in fixture.files or fixture.notes.
        - Include the destination parent folder.
        - Use only vault-relative paths.
        - Assertions must verify:
          1. the source file still exists at the original path
          2. the destination file exists after the copy
        - selected_workspace should reference the source file in recent_files or key_files.

        Output shape:
        {
          "environment": {
            "fixture": {
              "directories": [...],
              "files": {...},
              "notes": [...]
            },
            "assertions": [...]
          },
          "system_context": {
            "session_id": "session_...",
            "workspace_id": "default",
            "selected_workspace": {...}
          }
        }

