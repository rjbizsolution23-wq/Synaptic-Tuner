# Tool-based scenarios for SynthChat
# Each scenario is self-contained with embedded prompts

scenarios:
  # VaultManager tools
  storageManager_createFolder:
    type: tool
    agent: storageManager
    tool: storageManager_createFolder
    system: true
    tool_call_format: default

    prompts:
      system: |
        Generate a realistic Obsidian vault system prompt with:
        - <session_context> with workspace_id and path
        - <vault_structure> showing existing folders
        - <available_workspaces> with at least 2-3 workspaces
        - <available_prompts> listing storageManager and others
        - <selected_workspace> with name, path, and workflows
        Make the vault structure realistic with typical project folders.

      user: |
        Generate a natural user request that would require creating a folder.
        Be vague about exact location - use phrases like:
        - "that project"
        - "my notes"
        - "for the Q4 planning"
        Don't specify exact paths - make the AI infer from context.

      assistant: |
        Generate assistant response with:
        1. Optional <thinking> block showing reasoning about folder location
        2. Tool call to storageManager_createFolder with appropriate path
        Use OpenAI-style tool_calls format. The thinking should consider:
        - Where the folder should be created based on context
        - What path makes sense given the user's vague request

  storageManager_archive:
    type: tool
    agent: storageManager
    tool: storageManager_archive
    system: true
    tool_call_format: default
    flags:
      destructive: true
      risk_level: high

    prompts:
      system: |
        Generate workspace with folders that could be deleted.
        Include folders like "Old Projects", "Archive", "Deprecated".
        Make some folder names ambiguous.

      user: |
        Generate vague delete request - model should clarify first.
        Examples:
        - "Delete the old stuff"
        - "Remove those deprecated files"
        - "Clean up the archive"
        Don't be specific about which folder.

      assistant: |
        The assistant should ASK for clarification before deleting.
        Generate a text response that:
        - Lists potential folders that might match
        - Asks which specific folder to delete
        - Warns about irreversibility
        DO NOT generate a tool call - this should be a clarification response.

  storageManager_move:
    type: tool
    agent: storageManager
    tool: storageManager_move
    system: true
    tool_call_format: default

    prompts:
      system: |
        Generate workspace with notes scattered across folders.
        Include folders like "Inbox", "Projects", "Archive".
        Add some notes in Inbox that should be organized.

      user: |
        Generate request to move a note to better location.
        Examples:
        - "Move that meeting note to the project folder"
        - "Organize the inbox note about Q4"
        - "Put the brainstorm doc where it belongs"

      assistant: |
        Generate response with:
        1. <thinking> about source and destination
        2. Tool call to storageManager_move
        Consider workspace context for paths.

  storageManager_list:
    type: tool
    agent: storageManager
    tool: storageManager_list
    system: true
    tool_call_format: default

    prompts:
      system: |
        Generate workspace with nested folder structure.
        Include various project folders and subfolders.

      user: |
        Generate request to see what's in a folder.
        Examples:
        - "What's in the Projects folder?"
        - "Show me what files are in that directory"
        - "List the contents of my workspace"

      assistant: |
        Generate response with:
        1. Optional <thinking> about which folder to list
        2. Tool call to storageManager_list with path

  # ContentManager tools
  contentManager_write:
    type: tool
    agent: contentManager
    tool: contentManager_write
    system: true
    tool_call_format: default

    prompts:
      system: |
        Generate workspace for note creation.
        Include folders like "Daily Notes", "Projects", "Ideas".

      user: |
        Generate request to create new note content.
        Examples:
        - "Start a note about today's meeting"
        - "Create a doc for the new project"
        - "Make a quick note about that idea"

      assistant: |
        Generate response with:
        1. <thinking> about note location and content
        2. Tool call to contentManager_write
        Include realistic markdown content in the tool call.

  contentManager_insert:
    type: tool
    agent: contentManager
    tool: contentManager_insert
    system: true
    tool_call_format: default

    prompts:
      system: |
        Generate workspace with existing notes that need updating.
        Include notes with placeholder content.

      user: |
        Generate request to add content to an existing note.
        Examples:
        - "Add the new action items to that meeting note"
        - "Append the latest status details to the project doc"
        - "Insert the missing context near the top of that note"

      assistant: |
        Generate response with:
        1. <thinking> about where the new content belongs
        2. Tool call to contentManager_insert
        Use startLine=-1 for append style requests or startLine=1 for prepend style requests.

  contentManager_read:
    type: tool
    agent: contentManager
    tool: contentManager_read
    system: true
    tool_call_format: default

    prompts:
      system: |
        Generate workspace with existing notes in folders like "Projects", "Meetings", and "Inbox".
        Include one note that the user is likely to inspect.

      user: |
        Generate request to read or inspect a note.
        Examples:
        - "Open the project brief"
        - "Show me what's in that meeting note"
        - "Read the checklist note"

      assistant: |
        Generate response with:
        1. <thinking> about which note the user means
        2. Tool call to contentManager_read
        Include path and a valid startLine.

  contentManager_replace:
    type: tool
    agent: contentManager
    tool: contentManager_replace
    system: true

    prompts:
      system: |
        Generate workspace with an existing note that contains text needing precise replacement.
        Include surrounding lines and enough explicit detail for the assistant to determine
        the exact startLine and endLine for the replacement.

      user: |
        Generate request to replace existing content in a note.
        Examples:
        - "Replace the old API URL in the config note"
        - "Update the status line in that runbook"
        - "Change the owner name in the project doc"

      assistant: |
        Generate response with:
        1. <thinking> about reading the target note first and replacing only the exact text
        2. One useTools call using the CLI-oriented payload
        The system prompt already contains the exact old text, the exact new text, and enough context to determine the line range.
        Do not ask for clarification or request the replacement values again.
        This scenario should produce a tool-only response with content set to null.
        Put workspaceId, sessionId, memory, goal, constraints, tool, and optional strategy at the top level of function.arguments.
        The tool field must be a CLI command string such as:
        content replace --path "notes/meeting-notes.md" --old-content "> old line" --new-content "new line" --start-line 24 --end-line 24
        Include --old-content, --new-content, --start-line, and --end-line in every content replace command.
        If you need more than one command, join them with commas in the tool field and use strategy="serial".
        Do not use context/calls wrappers or direct function.name="contentManager_replace".

  contentManager_setProperty:
    type: tool
    agent: contentManager
    tool: contentManager_setProperty
    system: true
    tool_call_format: default

    prompts:
      system: |
        Generate workspace with notes that use YAML frontmatter properties like title, status, tags, or owner.

      user: |
        Generate request to update note metadata.
        Examples:
        - "Mark that incident note as triaged"
        - "Add a priority tag to the roadmap note"
        - "Change the owner on the planning doc"

      assistant: |
        Generate response with:
        1. <thinking> about which frontmatter field should change
        2. Tool call to contentManager_setProperty
        Include path, property, value, and optionally mode when merge semantics make sense.

  # PromptManager tools
  promptManager_createPrompt:
    type: tool
    agent: promptManager
    tool: promptManager_createPrompt
    system: true
    tool_call_format: default

    prompts:
      system: |
        Generate workspace with existing agents.
        Show available prompts in available_prompts.

      user: |
        Generate request to create a custom agent.
        Examples:
        - "Make an agent for summarizing my daily notes"
        - "Create a writer agent for blog posts"
        - "Set up an agent to help with research"

      assistant: |
        Generate response with:
        1. <thinking> about agent purpose and configuration
        2. Tool call to promptManager_createPrompt
        Include name, description, model, and prompt.

  promptManager_executePrompts:
    type: tool
    agent: promptManager
    tool: promptManager_executePrompts
    system: true

    prompts:
      system: |
        Generate workspace with custom agents available.
        Include agents like "Summarizer", "Writer", "Researcher".

      user: |
        Generate request to run an agent.
        Examples:
        - "Use the summarizer on my meeting notes"
        - "Have the writer agent draft a blog post"
        - "Run the research agent on this topic"

      assistant: |
        Generate response with:
        1. <thinking> about which prompt or prompt sequence to run
        2. One useTools call using the CLI-oriented payload
        Put workspaceId, sessionId, memory, goal, constraints, tool, and optional strategy at the top level of function.arguments.
        The tool field must be a CLI command string such as:
        prompt execute-prompts --prompts "[{\"agentId\":\"researcher\",\"prompt\":\"Find recent EV adoption statistics in the US and provide APA-style citations.\"}]"
        Do not use context/calls wrappers or direct function.name="promptManager_executePrompts".

  promptManager_archivePrompt:
    type: tool
    agent: promptManager
    tool: promptManager_archivePrompt
    system: true
    tool_call_format: default

    prompts:
      system: |
        Generate workspace with several custom prompts, including one that is outdated or no longer needed.

      user: |
        Generate request to archive a prompt.
        Examples:
        - "Archive the old release checklist prompt"
        - "Retire that deprecated writer prompt"
        - "Remove the legacy summarizer from active use"

      assistant: |
        Generate response with:
        1. <thinking> about which prompt the user means
        2. Tool call to promptManager_archivePrompt
        Include the prompt name.

  promptManager_generateImage:
    type: tool
    agent: promptManager
    tool: promptManager_generateImage
    system: true
    tool_call_format: default

    prompts:
      system: |
        Generate workspace context where the user creates design or visual assets for notes or projects.

      user: |
        Generate request to create an image asset.
        Examples:
        - "Make a hero image for the launch note"
        - "Generate a diagram-style cover image"
        - "Create a concept art image for that project brief"

      assistant: |
        Generate response with:
        1. <thinking> about the requested visual
        2. Tool call to promptManager_generateImage
        Include prompt and savePath, plus optional provider/model settings when useful.

  promptManager_getPrompt:
    type: tool
    agent: promptManager
    tool: promptManager_getPrompt
    system: true
    tool_call_format: default

    prompts:
      system: |
        Generate workspace with several named prompts and descriptions.

      user: |
        Generate request to inspect a prompt.
        Examples:
        - "Show me the research prompt"
        - "Open the writer agent config"
        - "Get the prompt details for the weekly review helper"

      assistant: |
        Generate response with:
        1. <thinking> about whether to use the prompt name or id
        2. Tool call to promptManager_getPrompt
        Include either id or name.

  promptManager_listModels:
    type: tool
    agent: promptManager
    tool: promptManager_listModels
    system: true
    tool_call_format: default

    prompts:
      system: |
        Generate workspace where the user is managing prompts and model choices.

      user: |
        Generate request to see available models.
        Examples:
        - "What models can I use right now?"
        - "List the available image and text models"
        - "Show me the model options before I create a prompt"

      assistant: |
        Generate response with:
        1. Optional <thinking> about why the user needs model options
        2. Tool call to promptManager_listModels

  promptManager_listPrompts:
    type: tool
    agent: promptManager
    tool: promptManager_listPrompts
    system: true
    tool_call_format: default

    prompts:
      system: |
        Generate workspace with multiple prompt definitions, some active and some archived.

      user: |
        Generate request to browse prompts.
        Examples:
        - "List my active prompts"
        - "Show all the custom prompts in this workspace"
        - "What prompts do I already have?"

      assistant: |
        Generate response with:
        1. <thinking> about whether to filter by enabled or archived status
        2. Tool call to promptManager_listPrompts
        Include enabledOnly or includeArchived when appropriate.

  promptManager_subagent:
    type: tool
    agent: promptManager
    tool: promptManager_subagent
    system: true
    tool_call_format: default

    prompts:
      system: |
        Generate workspace where a larger task can be delegated to a subagent with a bounded scope.

      user: |
        Generate request to delegate a focused task.
        Examples:
        - "Spin up a subagent to draft the release notes"
        - "Use a helper agent to review these docs"
        - "Delegate the research pass to a subagent"

      assistant: |
        Generate response with:
        1. <thinking> about the delegated task boundary
        2. Tool call to promptManager_subagent
        Include task and any relevant optional fields like agent, tools, or contextFiles.

  promptManager_updatePrompt:
    type: tool
    agent: promptManager
    tool: promptManager_updatePrompt
    system: true
    tool_call_format: default

    prompts:
      system: |
        Generate workspace with existing prompts that may need renaming, description changes, prompt edits, or enable/disable updates.

      user: |
        Generate request to update a prompt.
        Examples:
        - "Disable the old deployment helper"
        - "Rename the release writer to Launch Writer"
        - "Update the research prompt so it cites sources"

      assistant: |
        Generate response with:
        1. <thinking> about which prompt should change and how
        2. Tool call to promptManager_updatePrompt
        Include id and whichever fields are being updated.

  # MemoryManager tools
  memoryManager_createWorkspace:
    type: tool
    agent: memoryManager
    tool: memoryManager_createWorkspace
    system: true
    tool_call_format: default

    prompts:
      system: |
        Generate workspace listing with existing workspaces.
        Show workspaces like "Personal", "Work", "Archive".

      user: |
        Generate request to create new workspace.
        Examples:
        - "Set up a workspace for the new client project"
        - "Make a workspace for my side project"
        - "Create a workspace for learning materials"

      assistant: |
        Generate response with:
        1. <thinking> about workspace configuration
        2. Tool call to memoryManager_createWorkspace
        Include name, description, and workflows.

  memoryManager_archiveWorkspace:
    type: tool
    agent: memoryManager
    tool: memoryManager_archiveWorkspace
    system: true
    tool_call_format: default

    prompts:
      system: |
        Generate workspace listing with at least one inactive or completed workspace that could be archived.

      user: |
        Generate request to archive a workspace.
        Examples:
        - "Archive the old client workspace"
        - "Retire that finished project workspace"
        - "Move the deprecated workspace out of the active list"

      assistant: |
        Generate response with:
        1. <thinking> about which workspace the user means
        2. Tool call to memoryManager_archiveWorkspace
        Include the workspace name.

  memoryManager_createState:
    type: tool
    agent: memoryManager
    tool: memoryManager_createState
    system: true
    tool_call_format: default

    prompts:
      system: |
        Generate workspace and session context where the user wants to save progress before a risky or important step.

      user: |
        Generate request to save a checkpoint or state.
        Examples:
        - "Save a checkpoint before I refactor this"
        - "Capture the current state of this work"
        - "Create a state snapshot before I continue"

      assistant: |
        Generate response with:
        1. <thinking> about the current work context
        2. Tool call to memoryManager_createState
        Include name, conversationContext, activeTask, activeFiles, and nextSteps.

  memoryManager_listStates:
    type: tool
    agent: memoryManager
    tool: memoryManager_listStates
    system: true
    tool_call_format: default

    prompts:
      system: |
        Generate workspace with multiple saved states, including active and archived examples.

      user: |
        Generate request to browse saved states.
        Examples:
        - "Show me my recent checkpoints"
        - "List the saved states for this project"
        - "What states do I have available?"

      assistant: |
        Generate response with:
        1. Optional <thinking> about filters like archived or tags
        2. Tool call to memoryManager_listStates

  memoryManager_listWorkspaces:
    type: tool
    agent: memoryManager
    tool: memoryManager_listWorkspaces
    system: true
    tool_call_format: default

    prompts:
      system: |
        Generate multiple workspaces with different recency and archival states.

      user: |
        Generate request to list workspaces.
        Examples:
        - "List all my workspaces"
        - "Show active workspaces by most recent use"
        - "What workspaces do I have available?"

      assistant: |
        Generate response with:
        1. Optional <thinking> about sort order and filtering
        2. Tool call to memoryManager_listWorkspaces
        Include includeArchived, sortBy, order, or limit when appropriate.

  memoryManager_loadState:
    type: tool
    agent: memoryManager
    tool: memoryManager_loadState
    system: true
    tool_call_format: default

    prompts:
      system: |
        Generate workspace with multiple named saved states and enough context to infer which one the user wants.

      user: |
        Generate request to restore a prior state.
        Examples:
        - "Load the pre-launch checkpoint"
        - "Restore the research state from yesterday"
        - "Open the draft review state"

      assistant: |
        Generate response with:
        1. <thinking> about which saved state matches the request
        2. Tool call to memoryManager_loadState
        Include the state name.

  memoryManager_loadWorkspace:
    type: tool
    agent: memoryManager
    tool: memoryManager_loadWorkspace
    system: true
    tool_call_format: default

    prompts:
      system: |
        Generate workspace listings with enough metadata to infer which workspace the user wants to open.

      user: |
        Generate request to open a workspace.
        Examples:
        - "Open the training workspace"
        - "Load the client project workspace"
        - "Switch to the research workspace"

      assistant: |
        Generate response with:
        1. <thinking> about which workspace id matches the request
        2. Tool call to memoryManager_loadWorkspace
        Include the workspace id.

  memoryManager_runWorkflow:
    type: tool
    agent: memoryManager
    tool: memoryManager_runWorkflow
    system: true
    tool_call_format: default

    prompts:
      system: |
        Generate workspace with named workflows such as weekly review, sprint planning, or publishing.

      user: |
        Generate request to run a workflow.
        Examples:
        - "Run the weekly review workflow"
        - "Start the publishing workflow"
        - "Kick off the sprint planning workflow"

      assistant: |
        Generate response with:
        1. <thinking> about which workflow matches the request
        2. Tool call to memoryManager_runWorkflow
        Include workflowId or workflowName.

  memoryManager_updateWorkspace:
    type: tool
    agent: memoryManager
    tool: memoryManager_updateWorkspace
    system: true
    tool_call_format: default

    prompts:
      system: |
        Generate workspace listings where one workspace needs metadata updates like description, purpose, preferences, or key files.

      user: |
        Generate request to update workspace metadata.
        Examples:
        - "Update the workspace description for the analytics project"
        - "Change the purpose of that client workspace"
        - "Add new key files to the research workspace"

      assistant: |
        Generate response with:
        1. <thinking> about which workspace metadata should change
        2. Tool call to memoryManager_updateWorkspace
        Include only the fields being updated.

  # SearchManager tools
  searchManager_searchContent:
    type: tool
    agent: searchManager
    tool: searchManager_searchContent
    system: true
    tool_call_format: default

    prompts:
      system: |
        Generate workspace with searchable content.
        Include notes with various topics and keywords.

      user: |
        Generate search request.
        Examples:
        - "Find all notes about the Q4 project"
        - "Search for meeting notes from last month"
        - "Look for anything related to that client"

      assistant: |
        Generate response with:
        1. <thinking> about search terms and scope
        2. Tool call to searchManager_searchContent
        Include search query and optional filters.

  searchManager_searchDirectory:
    type: tool
    agent: searchManager
    tool: searchManager_searchDirectory
    system: true
    tool_call_format: default

    prompts:
      system: |
        Generate workspace with nested folders, filenames, and extensions across multiple areas.

      user: |
        Generate request to search for files or directories.
        Examples:
        - "Find all markdown files about onboarding"
        - "Search the docs folders for deployment notes"
        - "Look for templates with release in the name"

      assistant: |
        Generate response with:
        1. <thinking> about path scope and filename matching
        2. Tool call to searchManager_searchDirectory
        Include query, paths, and optional searchType or fileTypes.

  searchManager_searchMemory:
    type: tool
    agent: searchManager
    tool: searchManager_searchMemory
    system: true
    tool_call_format: default

    prompts:
      system: |
        Generate workspace and session context with prior conversations, tool traces, or saved memories that can be searched.

      user: |
        Generate request to search prior memory.
        Examples:
        - "Search memory for the database migration discussion"
        - "Look up what we decided about the launch checklist"
        - "Find the earlier conversation about that client issue"

      assistant: |
        Generate response with:
        1. <thinking> about what memory sources to search
        2. Tool call to searchManager_searchMemory
        Include query and optional memoryTypes, searchMethod, or limit.

  # StorageManager tools
  storageManager_copy:
    type: tool
    agent: storageManager
    tool: storageManager_copy
    system: true
    tool_call_format: default

    prompts:
      system: |
        Generate workspace with templates, notes, or project folders where copying content makes sense.

      user: |
        Generate request to copy a file or folder.
        Examples:
        - "Copy the article template into the new docs folder"
        - "Duplicate that project brief for the new client"
        - "Make a copy of the launch checklist"

      assistant: |
        Generate response with:
        1. <thinking> about source and destination paths
        2. Tool call to storageManager_copy
        Include path and newPath, plus overwrite only when clearly intended.

  storageManager_open:
    type: tool
    agent: storageManager
    tool: storageManager_open
    system: true
    tool_call_format: default

    prompts:
      system: |
        Generate workspace with notes, docs, and files the user might want to open in the editor.

      user: |
        Generate request to open a file.
        Examples:
        - "Open the roadmap note"
        - "Bring up the weekly goals file"
        - "Open the archive summary in the editor"

      assistant: |
        Generate response with:
        1. Optional <thinking> about which file the user means
        2. Tool call to storageManager_open
        Include path and optional mode or focus when justified.

  # CanvasManager tools
  canvasManager_list:
    type: tool
    agent: canvasManager
    tool: canvasManager_list
    system: true
    tool_call_format: default

    prompts:
      system: |
        Generate workspace with several canvas files across project and diagram folders.

      user: |
        Generate request to browse available canvases.
        Examples:
        - "List the canvases in the diagrams folder"
        - "Show me all the canvas files for this project"
        - "What whiteboard-style canvases do I have?"

      assistant: |
        Generate response with:
        1. Optional <thinking> about canvas scope or folder filtering
        2. Tool call to canvasManager_list
        Include folder and recursive when useful.

  canvasManager_read:
    type: tool
    agent: canvasManager
    tool: canvasManager_read
    system: true
    tool_call_format: default

    prompts:
      system: |
        Generate workspace with existing .canvas files representing planning maps, architecture diagrams, or research boards.

      user: |
        Generate request to inspect a canvas.
        Examples:
        - "Open the architecture canvas"
        - "Read the roadmap diagram"
        - "Show me the structure of that planning board"

      assistant: |
        Generate response with:
        1. <thinking> about which canvas file the user means
        2. Tool call to canvasManager_read
        Include the canvas path.

  canvasManager_update:
    type: tool
    agent: canvasManager
    tool: canvasManager_update
    system: true
    tool_call_format: default

    prompts:
      system: |
        Generate workspace with an existing canvas that may need node or edge changes.
        Include enough structure that the assistant can infer a meaningful update.

      user: |
        Generate request to modify an existing canvas.
        Examples:
        - "Update the architecture canvas with the new service box"
        - "Adjust the roadmap canvas to connect the planning node"
        - "Replace the current board nodes with the new layout"

      assistant: |
        Generate response with:
        1. <thinking> about whether nodes, edges, or both should change
        2. Tool call to canvasManager_update
        Include path and whichever of nodes or edges are being updated.

  canvasManager_write:
    type: tool
    agent: canvasManager
    tool: canvasManager_write
    system: true
    tool_call_format: default

    prompts:
      system: |
        Generate workspace where the user is creating a brand-new canvas for planning, architecture, or brainstorming.

      user: |
        Generate request to create a new canvas.
        Examples:
        - "Create a new project planning canvas"
        - "Start an architecture diagram for the release flow"
        - "Make a brainstorming board for the new feature"

      assistant: |
        Generate response with:
        1. <thinking> about the initial canvas structure
        2. Tool call to canvasManager_write
        Include path and optional initial nodes or edges.

  # TaskManager tools
  taskManager_archiveProject:
    type: tool
    agent: taskManager
    tool: taskManager_archiveProject
    system: true
    tool_call_format: default

    prompts:
      system: |
        Generate workspace with several task projects, including one completed or inactive project suitable for archiving.

      user: |
        Generate request to archive a project.
        Examples:
        - "Archive the completed migration project"
        - "Retire the old launch planning board"
        - "Move that finished task project out of the active list"

      assistant: |
        Generate response with:
        1. <thinking> about which project the user means
        2. Tool call to taskManager_archiveProject
        Include the projectId.

  taskManager_createProject:
    type: tool
    agent: taskManager
    tool: taskManager_createProject
    system: true
    tool_call_format: default

    prompts:
      system: |
        Generate workspace with task boards or project tracking already in use.

      user: |
        Generate request to create a new task project.
        Examples:
        - "Create a project to track the release migration"
        - "Set up a task project for the new client onboarding"
        - "Make a planning project for the design refresh"

      assistant: |
        Generate response with:
        1. <thinking> about project naming and scope
        2. Tool call to taskManager_createProject
        Include name and optional description or metadata.

  taskManager_createTask:
    type: tool
    agent: taskManager
    tool: taskManager_createTask
    system: true
    tool_call_format: default

    prompts:
      system: |
