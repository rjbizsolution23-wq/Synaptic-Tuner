# Tool-based scenarios for SynthChat
# Each scenario is self-contained with embedded prompts

shared_tool_final_review: &shared_tool_final_review
  enforce: true
  gates:
    - type: field_equals
      field: environment_passed
      value: true
  judge:
    enabled: true
    max_retries: 3
    fallback_models:
      - google/gemini-3.1-flash-lite-preview
    temperature: 0.1
    prompt: |
      You are reviewing a completed CLI-first SynthChat tool example.

      Scenario key:
      {scenario_key}

      Final environment result:
      {environment_result_json}

      Final assistant response:
      {assistant_response_json}

      Conversation trace:
      {conversation_trace_json}

      Return passed=true only if:
      - the environment result already passed
      - the assistant response is coherent training data
      - the tool trajectory matches the user's request
      - the emitted tool call follows the CLI-first useTools wrapper shape

      If environment_result.passed is false, then passed must be false.

scenarios:
  # VaultManager tools
  storageManager_createFolder:
    type: tool
    agent: storageManager
    tool: storageManager_createFolder
    system: true
    tool_call_format: default

    prompts:
      system: |
        Generate a realistic Obsidian vault system prompt with:
        - <session_context> with workspace_id and path
        - <vault_structure> showing existing folders
        - <available_workspaces> with at least 2-3 workspaces
        - <available_prompts> listing storageManager and others
        - <selected_workspace> with name, path, and workflows
        Make the vault structure realistic with typical project folders.

      user: |
        Generate a natural user request that would require creating a folder.
        Be vague about exact location - use phrases like:
        - "that project"
        - "my notes"
        - "for the Q4 planning"
        Don't specify exact paths - make the AI infer from context.

      assistant: |
        Generate response with:
        1. Optional <thinking> about folder location
        2. One useTools call using the CLI-oriented payload
        This scenario should produce a tool-only response with content set to null.
        Put workspaceId, sessionId, memory, goal, constraints, tool, and optional strategy at the top level of function.arguments.
        The tool field must be a CLI command string such as:
        storage create-folder "Projects/Q4 Planning"
        The tool field must begin with the exact literal command prefix `storage create-folder`.
        Never use legacy tool names like `storageManager_createFolder` inside the tool string.
        Do not use context/calls wrappers or direct function.name="storageManager_createFolder".

  storageManager_archive:
    type: tool
    agent: storageManager
    tool: storageManager_archive
    system: true
    tool_call_format: default
    flags:
      destructive: true
      risk_level: high

    prompts:
      system: |
        Generate workspace with folders that could be deleted.
        Include folders like "Old Projects", "Archive", "Deprecated".
        Make some folder names ambiguous.

      user: |
        Generate vague delete request - model should clarify first.
        Examples:
        - "Delete the old stuff"
        - "Remove those deprecated files"
        - "Clean up the archive"
        Don't be specific about which folder.

      assistant: |
        Generate response with:
        1. Optional <thinking> about the exact archive target
        2. One useTools call using the CLI-oriented payload
        This scenario should produce a tool-only response with content set to null.
        Put workspaceId, sessionId, memory, goal, constraints, tool, and optional strategy at the top level of function.arguments.
        The tool field must be a CLI command string such as:
        storage archive "Archive/Deprecated Sprint Notes"
        The tool field must begin with the exact literal command prefix `storage archive`.
        Never use legacy tool names like `storageManager_archive` inside the tool string.
        Do not use context/calls wrappers or direct function.name="storageManager_archive".

  storageManager_move:
    type: tool
    agent: storageManager
    tool: storageManager_move
    environment_mode: generated
    system_template: mocked_workspace_vault
    tool_call_format: default
    system_context:
      available_workspaces:
        - id: default
          name: Default Workspace
          description: Project notes and inbox triage
          root_folder: ""
      available_prompts:
        - id: agent_file_organizer
          name: File Organizer
          purpose: Finds the right note and moves it into the correct project folder
      assistant_instructions: >-
        You are an AI assistant helping manage a filesystem-style workspace.
        Use the exact existing source path from the generated environment.
    environment_generation:
      prompt: |
        Output ONLY valid JSON.

        Generate a realistic filesystem-backed workspace for a move task.

        Requirements:
        - Include an Inbox/ folder with exactly one note or file that should be moved.
        - Include a destination project folder that already exists.
        - The source file must exist in fixture.files or fixture.notes.
        - Use only vault-relative paths.
        - Assertions must verify:
          1. the source file no longer exists at the old path
          2. the destination file exists at the new path
        - selected_workspace should reference the source file in recent_files or key_files.

        Output shape:
        {
          "environment": {
            "fixture": {
              "directories": [...],
              "files": {...},
              "notes": [...]
            },
            "assertions": [...]
          },
          "system_context": {
            "session_id": "session_...",
            "workspace_id": "default",
            "selected_workspace": {...}
          }
        }

    prompts:
      system: |
        Generate workspace with notes scattered across folders.
        Include folders like "Inbox", "Projects", "Archive".
        Add some notes in Inbox that should be organized.

      user: |
        Generate request to move a note to better location.
        Examples:
        - "Move that meeting note to the project folder"
        - "Organize the inbox note about Q4"
        - "Put the brainstorm doc where it belongs"

      assistant: |
        Generate response with:
        1. <thinking> about source and destination
        2. One useTools call using the CLI-oriented payload
        This scenario should produce a tool-only response with content set to null.
        Put workspaceId, sessionId, memory, goal, constraints, tool, and optional strategy at the top level of function.arguments.
        The tool field must be a CLI command string such as:
        storage move "Inbox/Q4 Brainstorm.md" "Projects/Q4/Brainstorm.md"
        The tool field must begin with the exact literal command prefix `storage move`.
        Never use legacy tool names like `storageManager_move` inside the tool string.
        Use an existing source path exactly as written in the system prompt.
        Do not use context/calls wrappers or direct function.name="storageManager_move".

  storageManager_list:
    type: tool
    agent: storageManager
    tool: storageManager_list
    system: true
    tool_call_format: default

    prompts:
      system: |
        Generate workspace with nested folder structure.
        Include various project folders and subfolders.

      user: |
        Generate request to see what's in a folder.
        Examples:
        - "What's in the Projects folder?"
        - "Show me what files are in that directory"
        - "List the contents of my workspace"

      assistant: |
        Generate response with:
        1. Optional <thinking> about which folder to list
        2. One useTools call using the CLI-oriented payload
        This scenario should produce a tool-only response with content set to null.
        Put workspaceId, sessionId, memory, goal, constraints, tool, and optional strategy at the top level of function.arguments.
        The tool field must be a CLI command string such as:
        storage list --path "Projects"
        The tool field must begin with the exact literal command prefix `storage list`.
        Never use legacy tool names like `storageManager_list` inside the tool string.
        Do not use context/calls wrappers or direct function.name="storageManager_list".

  # ContentManager tools
  contentManager_write:
    type: tool
    agent: contentManager
    tool: contentManager_write
    system: true
    tool_call_format: default

    prompts:
      system: |
        Generate workspace for note creation.
        Include folders like "Daily Notes", "Projects", "Ideas".

      user: |
        Generate request to create new note content.
        Examples:
        - "Start a note about today's meeting"
        - "Create a doc for the new project"
        - "Make a quick note about that idea"

      assistant: |
        Generate response with:
        1. <thinking> about note location and content
        2. One useTools call using the CLI-oriented payload
        This scenario should produce a tool-only response with content set to null.
        Put workspaceId, sessionId, memory, goal, constraints, tool, and optional strategy at the top level of function.arguments.
        The tool field must be a CLI command string such as:
        content write "Projects/kickoff-notes.md" "# Kickoff Notes\n\n- Agenda item 1"
        Include realistic markdown content in the command.
        Do not use context/calls wrappers or direct function.name="contentManager_write".

  contentManager_insert:
    type: tool
    agent: contentManager
    tool: contentManager_insert
    system: true
    tool_call_format: default

    prompts:
      system: |
        Generate workspace with existing notes that need updating.
        Include notes with placeholder content.

      user: |
        Generate request to add content to an existing note.
        Examples:
        - "Add the new action items to that meeting note"
        - "Append the latest status details to the project doc"
        - "Insert the missing context near the top of that note"

      assistant: |
        Generate response with:
        1. <thinking> about where the new content belongs
        2. One useTools call using the CLI-oriented payload
        This scenario should produce a tool-only response with content set to null.
        Put workspaceId, sessionId, memory, goal, constraints, tool, and optional strategy at the top level of function.arguments.
        The tool field must be a CLI command string such as:
        content insert --path "Meetings/team-sync.md" --content "- New action item" --start-line -1
        Use --start-line -1 for append style requests or --start-line 1 for prepend style requests.
        Do not use context/calls wrappers or direct function.name="contentManager_insert".

  contentManager_read:
    type: tool
    agent: contentManager
    tool: contentManager_read
    environment_mode: generated
    system_template: mocked_workspace_vault
    tool_call_format: default
    system_context:
      available_workspaces:
        - id: default
          name: Default Workspace
          description: General notes and project documents
          root_folder: ""
      available_prompts:
        - id: agent_note_reader
          name: Note Reader
          purpose: Finds and reads the correct note in the workspace
      assistant_instructions: >-
        You are an AI assistant helping manage a workspace of notes and documents.
        Use the available tools to inspect the exact existing note the user requests.
    environment_generation:
      prompt: |
        Output ONLY valid JSON.

        Generate a realistic filesystem-backed workspace for a note-reading task.

        Requirements:
        - Include 2-4 notes/files in the workspace.
        - Exactly one note should be the obvious target the user will want to inspect.
        - Use only vault-relative paths like "Projects/website-redesign.md" or "Meetings/team-sync.md".
        - Do not use absolute filesystem paths or prefixes like "workspace/".
        - The target note must exist in fixture.files or fixture.notes.
        - selected_workspace should include recent_files and key_files that reference the target note.

        Output shape:
        {
          "environment": {
            "fixture": {
              "directories": [...],
              "files": {...},
              "notes": [...]
            },
            "assertions": []
          },
          "system_context": {
            "session_id": "session_...",
            "workspace_id": "default",
            "selected_workspace": {
              "id": "default",
              "name": "Default Workspace",
              "root_folder": "",
              "recent_files": [...],
              "key_files": [...],
              "workflows": [...],
              "preferences": "..."
            }
          }
        }

    prompts:
      user: |
        Generate request to read or inspect a note.
        Examples:
        - "Open the project brief"
        - "Show me what's in that meeting note"
        - "Read the checklist note"

      assistant: |
        Generate response with:
        1. <thinking> about which note the user means
        2. One useTools call using the CLI-oriented payload
        This scenario should produce a tool-only response with content set to null.
        Put workspaceId, sessionId, memory, goal, constraints, tool, and optional strategy at the top level of function.arguments.
        The tool field must be a CLI command string such as:
        content read "Projects/project-brief.md" 1 --end-line 40
        Use an existing file path exactly as written in the system prompt.
        Do not invent filenames, rewrite spaces as underscores, or normalize the path.
        Include path and a valid start line.
        Do not use context/calls wrappers or direct function.name="contentManager_read".

  contentManager_replace:
    type: tool
    agent: contentManager
    tool: contentManager_replace
    system: true
    tool_call_format: default
    rubrics:
      system_prompt: [system_prompt_format]
      response: [tool_alignment, contentManager_tools]
    final_judge: *shared_tool_final_review

    prompts:
      system: |
        Generate workspace with an existing note that contains text needing precise replacement.
        Include surrounding lines and enough explicit detail for the assistant to determine
        the exact startLine and endLine for the replacement.

      user: |
        Generate request to replace existing content in a note.
        Examples:
        - "Replace the old API URL in the config note"
        - "Update the status line in that runbook"
        - "Change the owner name in the project doc"

      assistant: |
        Generate response with:
        1. <thinking> about replacing only the exact text block the system prompt already identifies
        2. One useTools call using the CLI-oriented payload
        The system prompt already contains the exact old text, the exact new text, and enough context to determine the line range.
        Do not add a separate content read command before the replace command.
        Emit exactly one content replace command in the tool string for this scenario.
        Do not ask for clarification or request the replacement values again.
        This scenario should produce a tool-only response with content set to null.
        Put workspaceId, sessionId, memory, goal, constraints, tool, and optional strategy at the top level of function.arguments.
        The tool field must be a CLI command string such as:
        content replace --path "notes/meeting-notes.md" --old-content "> old line" --new-content "new line" --start-line 24 --end-line 24
        Include --old-content, --new-content, --start-line, and --end-line in every content replace command.
        Do not use wildcards like "Status: *" for old content; use the exact text shown in the system prompt.
        Do not use context/calls wrappers or direct function.name="contentManager_replace".

  contentManager_setProperty:
    type: tool
    agent: contentManager
    tool: contentManager_setProperty
    system: true
    tool_call_format: default

    prompts:
      system: |
        Generate workspace with notes that use YAML frontmatter properties like title, status, tags, or owner.

      user: |
        Generate request to update note metadata.
        Examples:
        - "Mark that incident note as triaged"
        - "Add a priority tag to the roadmap note"
        - "Change the owner on the planning doc"

      assistant: |
        Generate response with:
        1. <thinking> about which frontmatter field should change
        2. One useTools call using the CLI-oriented payload
        This scenario should produce a tool-only response with content set to null.
        Put workspaceId, sessionId, memory, goal, constraints, tool, and optional strategy at the top level of function.arguments.
        The tool field must be a CLI command string such as:
        content set-property --path "Projects/roadmap.md" --property "status" --value "triaged"
        Include path, property, value, and optionally mode when merge semantics make sense.
        Do not use context/calls wrappers or direct function.name="contentManager_setProperty".

  # PromptManager tools
  promptManager_createPrompt:
    type: tool
    agent: promptManager
    tool: promptManager_createPrompt
    system: true
    tool_call_format: default

    prompts:
      system: |
        Generate workspace with existing agents.
        Show available prompts in available_prompts.

      user: |
        Generate request to create a custom agent.
        Examples:
        - "Make an agent for summarizing my daily notes"
        - "Create a writer agent for blog posts"
        - "Set up an agent to help with research"

      assistant: |
        Generate response with:
        1. <thinking> about agent purpose and configuration
        2. One useTools call using the CLI-oriented payload
        This scenario should produce a tool-only response with content set to null.
        Put workspaceId, sessionId, memory, goal, constraints, tool, and optional strategy at the top level of function.arguments.
        The tool field must be a CLI command string such as:
        prompt create-prompt "Daily Summarizer" "Summarizes daily notes" "You summarize daily notes into concise bullets."
        The tool field must begin with the exact literal command prefix `prompt create-prompt`.
        Never use legacy tool names like `promptManager_createPrompt` inside the tool string.
        Include name, description, and prompt.
        Do not use context/calls wrappers or direct function.name="promptManager_createPrompt".

  promptManager_executePrompts:
    type: tool
    agent: promptManager
    tool: promptManager_executePrompts
    system: true
    tool_call_format: default
    rubrics:
      system_prompt: [system_prompt_format]
      response: [tool_alignment, promptManager_tools]
    final_judge: *shared_tool_final_review

    prompts:
      system: |
        Generate workspace with custom agents available.
        Include agents like "Summarizer", "Writer", "Researcher".

      user: |
        Generate request to run an agent.
        Examples:
        - "Use the summarizer on my meeting notes"
        - "Have the writer agent draft a blog post"
        - "Run the research agent on this topic"

      assistant: |
        Generate response with:
        1. <thinking> about which prompt or prompt sequence to run
        2. One useTools call using the CLI-oriented payload
        Put workspaceId, sessionId, memory, goal, constraints, tool, and optional strategy at the top level of function.arguments.
        The tool field must be a CLI command string such as:
        prompt execute-prompts --prompts "[{\"agentId\":\"researcher\",\"prompt\":\"Find recent EV adoption statistics in the US and provide APA-style citations.\"}]"
        The tool field must begin with the exact literal command prefix `prompt execute-prompts`.
        Prefer a short single-item JSON array for --prompts, for example:
        prompt execute-prompts --prompts '[{"agentId":"researcher","prompt":"Summarize Docs/brief.md in 3 bullets."}]'
        The value passed to --prompts must be valid JSON, not placeholder text and not comma-separated values.
        Keep the embedded prompt concise and avoid nested quotes, YAML frontmatter, or long multi-clause instructions unless the user explicitly asks for them.
        Do not use context/calls wrappers or direct function.name="promptManager_executePrompts".

  promptManager_archivePrompt:
    type: tool
    agent: promptManager
    tool: promptManager_archivePrompt
    system: true
    tool_call_format: default

    prompts:
      system: |
        Generate workspace with several custom prompts, including one that is outdated or no longer needed.

      user: |
        Generate request to archive a prompt.
        Examples:
        - "Archive the old release checklist prompt"
        - "Retire that deprecated writer prompt"
        - "Remove the legacy summarizer from active use"

      assistant: |
        Generate response with:
        1. <thinking> about which prompt the user means
        2. One useTools call using the CLI-oriented payload
        This scenario should produce a tool-only response with content set to null.
        Put workspaceId, sessionId, memory, goal, constraints, tool, and optional strategy at the top level of function.arguments.
        The tool field must be a CLI command string such as:
        prompt archive-prompt "Legacy Release Writer"
        Include the prompt name.
        Do not use context/calls wrappers or direct function.name="promptManager_archivePrompt".

  promptManager_generateImage:
    type: tool
    agent: promptManager
    tool: promptManager_generateImage
    system: true
    tool_call_format: default

    prompts:
      system: |
        Generate workspace context where the user creates design or visual assets for notes or projects.

      user: |
        Generate request to create an image asset.
        Examples:
        - "Make a hero image for the launch note"
        - "Generate a diagram-style cover image"
        - "Create a concept art image for that project brief"

      assistant: |
        Generate response with:
        1. <thinking> about the requested visual
        2. One useTools call using the CLI-oriented payload
        This scenario should produce a tool-only response with content set to null.
        Put workspaceId, sessionId, memory, goal, constraints, tool, and optional strategy at the top level of function.arguments.
        The tool field must be a CLI command string such as:
        prompt generate-image "A cinematic hero image for a launch note" "assets/launch-hero.png"
        Include prompt and savePath, plus optional provider/model settings when useful.
        Do not use context/calls wrappers or direct function.name="promptManager_generateImage".

  promptManager_getPrompt:
    type: tool
    agent: promptManager
    tool: promptManager_getPrompt
    system: true
    tool_call_format: default

    prompts:
      system: |
        Generate workspace with several named prompts and descriptions.

      user: |
        Generate request to inspect a prompt.
        Examples:
        - "Show me the research prompt"
        - "Open the writer agent config"
        - "Get the prompt details for the weekly review helper"

      assistant: |
        Generate response with:
        1. <thinking> about whether to use the prompt name or id
        2. One useTools call using the CLI-oriented payload
        This scenario should produce a tool-only response with content set to null.
        Put workspaceId, sessionId, memory, goal, constraints, tool, and optional strategy at the top level of function.arguments.
        The tool field must be a CLI command string such as:
        prompt get-prompt --name "Weekly Review Helper"
        The tool field must begin with the exact literal command prefix `prompt get-prompt`.
        Never use legacy tool names like `promptManager_getPrompt` inside the tool string.
        Include either id or name.
        Do not use context/calls wrappers or direct function.name="promptManager_getPrompt".

  promptManager_listModels:
    type: tool
    agent: promptManager
    tool: promptManager_listModels
    system: true
    tool_call_format: default

    prompts:
      system: |
        Generate workspace where the user is managing prompts and model choices.

      user: |
        Generate request to see available models.
        Examples:
        - "What models can I use right now?"
        - "List the available image and text models"
        - "Show me the model options before I create a prompt"

      assistant: |
        Generate response with:
        1. Optional <thinking> about why the user needs model options
        2. One useTools call using the CLI-oriented payload
        This scenario should produce a tool-only response with content set to null.
        Put workspaceId, sessionId, memory, goal, constraints, tool, and optional strategy at the top level of function.arguments.
        The tool field must be a CLI command string such as:
        prompt list-models
        The tool field must begin with the exact literal command prefix `prompt list-models`.
        Never use legacy tool names like `promptManager_listModels` inside the tool string.
        Do not use context/calls wrappers or direct function.name="promptManager_listModels".

  promptManager_listPrompts:
    type: tool
    agent: promptManager
    tool: promptManager_listPrompts
    system: true
    tool_call_format: default

    prompts:
      system: |
        Generate workspace with multiple prompt definitions, some active and some archived.

      user: |
        Generate request to browse prompts.
        Examples:
        - "List my active prompts"
        - "Show all the custom prompts in this workspace"
        - "What prompts do I already have?"

      assistant: |
        Generate response with:
        1. <thinking> about whether to filter by enabled or archived status
        2. One useTools call using the CLI-oriented payload
        This scenario should produce a tool-only response with content set to null.
        Put workspaceId, sessionId, memory, goal, constraints, tool, and optional strategy at the top level of function.arguments.
        The tool field must be a CLI command string such as:
        prompt list-prompts --include-archived
        Include --enabled-only or --include-archived when appropriate.
        Do not use context/calls wrappers or direct function.name="promptManager_listPrompts".

  promptManager_subagent:
    type: tool
    agent: promptManager
    tool: promptManager_subagent
    system: true
    tool_call_format: default

    prompts:
      system: |
        Generate workspace where a larger task can be delegated to a subagent with a bounded scope.

      user: |
        Generate request to delegate a focused task.
        Examples:
        - "Spin up a subagent to draft the release notes"
        - "Use a helper agent to review these docs"
        - "Delegate the research pass to a subagent"

      assistant: |
        Generate response with:
        1. <thinking> about the delegated task boundary
        2. Tool call to promptManager_subagent
        Include task and any relevant optional fields like agent, tools, or contextFiles.

  promptManager_updatePrompt:
    type: tool
    agent: promptManager
    tool: promptManager_updatePrompt
    system: true
    tool_call_format: default

    prompts:
      system: |
        Generate workspace with existing prompts that may need renaming, description changes, prompt edits, or enable/disable updates.

      user: |
        Generate request to update a prompt.
        Examples:
        - "Disable the old deployment helper"
        - "Rename the release writer to Launch Writer"
        - "Update the research prompt so it cites sources"

      assistant: |
        Generate response with:
        1. <thinking> about which prompt should change and how
        2. One useTools call using the CLI-oriented payload
        This scenario should produce a tool-only response with content set to null.
        Put workspaceId, sessionId, memory, goal, constraints, tool, and optional strategy at the top level of function.arguments.
        The tool field must be a CLI command string such as:
        prompt update-prompt "prompt_123" --name "Launch Writer" --prompt "You write launch communications with citations."
        The tool field must begin with the exact literal command prefix `prompt update-prompt`.
        Never use legacy tool names like `promptManager_updatePrompt` inside the tool string.
        Include the prompt id and whichever fields are being updated.
        Do not use context/calls wrappers or direct function.name="promptManager_updatePrompt".

  # MemoryManager tools
  memoryManager_createWorkspace:
    type: tool
    agent: memoryManager
    tool: memoryManager_createWorkspace
    system: true
    tool_call_format: default

    prompts:
      system: |
        Generate workspace listing with existing workspaces.
        Show workspaces like "Personal", "Work", "Archive".

      user: |
        Generate request to create new workspace.
        Examples:
        - "Set up a workspace for the new client project"
        - "Make a workspace for my side project"
        - "Create a workspace for learning materials"

      assistant: |
        Generate response with:
        1. <thinking> about workspace configuration
        2. One useTools call using the CLI-oriented payload
        This scenario should produce a tool-only response with content set to null.
        Put workspaceId, sessionId, memory, goal, constraints, tool, and optional strategy at the top level of function.arguments.
        The tool field must be a CLI command string such as:
        memory create-workspace "Client Alpha" "Workspace for client delivery notes" "Clients/Alpha" "Track delivery work for Client Alpha"
        Include name, description, root folder, and purpose.
        Do not use context/calls wrappers or direct function.name="memoryManager_createWorkspace".

  memoryManager_archiveWorkspace:
    type: tool
    agent: memoryManager
    tool: memoryManager_archiveWorkspace
    system: true
    tool_call_format: default

    prompts:
      system: |
        Generate workspace listing with at least one inactive or completed workspace that could be archived.

      user: |
        Generate request to archive a workspace.
        Examples:
        - "Archive the old client workspace"
        - "Retire that finished project workspace"
        - "Move the deprecated workspace out of the active list"

      assistant: |
        Generate response with:
        1. <thinking> about which workspace the user means
        2. One useTools call using the CLI-oriented payload
        This scenario should produce a tool-only response with content set to null.
        Put workspaceId, sessionId, memory, goal, constraints, tool, and optional strategy at the top level of function.arguments.
        The tool field must be a CLI command string such as:
