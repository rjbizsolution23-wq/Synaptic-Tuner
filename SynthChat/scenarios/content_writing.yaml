        - Imply a target audience
        - Optionally mention tone (casual, professional, technical)

        OUTPUT ONLY THE REQUEST TEXT - nothing else.

      assistant: |
        Generate a tool call to write a blog post/essay. OUTPUT ONLY VALID JSON.

        Required format:
        {
          "content": null,
          "tool_calls": [{
            "id": "call_XXXXXXXXX",
            "type": "function",
            "function": {
              "name": "useTools",
              "arguments": {
                "workspaceId": "<extract from system prompt>",
                "sessionId": "<extract from system prompt>",
                "memory": "<brief session context>",
                "goal": "<write the requested blog post or essay in the right workspace path>",
                "constraints": "Only create the requested note. Do not modify unrelated files.",
                "tool": "content write \"<appropriate path in workspace>\" \"<full markdown content>\""
              }
            }
          }]
        }

        The params.content MUST include:

        1. YAML frontmatter (raw --- delimiters, NO code fence):
           - title, description, tags (array), aliases, category: "blog"

        2. Blog content (800-2000 words):
           - Engaging hook/introduction
           - Use ## headings naturally
           - Clear conclusion with takeaways
           - Practical examples throughout

        3. Writing quality:
           - Clear, engaging prose
           - Reader-focused language
           - Concrete examples

        OUTPUT ONLY THE JSON OBJECT - no markdown wrapper, no explanation.

