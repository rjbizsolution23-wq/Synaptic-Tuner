        Generate UNIQUE content - different topics, workspace names, file paths.

      user: |
        OUTPUT ONLY the user's request - no preamble, no explanation.

        Generate a natural user request to WRITE a blog post or essay.

        Examples:
        - "Write a blog post about the future of AI in creative industries"
        - "Draft an essay on productivity systems for knowledge workers"
        - "Create a post explaining quantum computing for beginners"
        - "Write an opinion piece on remote work culture"
