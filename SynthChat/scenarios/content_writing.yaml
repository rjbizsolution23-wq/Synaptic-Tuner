# Content Writing Scenarios for SynthChat
# Each scenario is SELF-CONTAINED with all definitions inline
# No external dependencies - everything needed is in the scenario

scenarios:
  # ============================================
  # RESEARCH NOTES
  # ============================================
  contentManager_write_research:
    type: tool
    agent: contentManager
    tool: write
    max_tokens: 4096

    # Tool call format definition (self-contained)
    tool_format:
      wrapper: useTools
      arguments:
        required: [sessionId, workspaceId, memory, goal, constraints, tool]

    # Validation rubrics for this scenario
    rubrics:
      system_prompt: [system_prompt_format]
      response: [tool_alignment, content_writing_quality]

    prompts:
      system: |
        Generate a realistic Obsidian vault system prompt for a RESEARCHER or STUDENT.

        REQUIRED STRUCTURE - You MUST include ALL of these sections:

        1. <session_context>
           IMPORTANT: When using tools, include these values:
           - sessionId: "unique-session-id"
           - workspaceId: "workspace-id"
           </session_context>

        2. <vault_structure>
           Folders:
            - Research/
            - Projects/
            - Archive/
           Files:
            - README.md
           </vault_structure>

        3. <available_workspaces>
           - Workspace Name (id: "workspace-id")
             Description: What this workspace is for
             Root folder: Research/
           </available_workspaces>

        4. <available_prompts>
           - name: ResearchAssistant
             description: Helps with research tasks
           - name: Summarizer
             description: Creates summaries
           </available_prompts>

        5. <selected_workspace name="Name" id="workspace-id">
           {
             "context": {
               "id": "workspace-id",
               "name": "Workspace Name",
               "description": "Description",
               "rootFolder": "Research/"
             },
             "workspaceStructure": [
               {"path": "", "type": "folder", "children": ["Papers/", "Notes/"]}
             ],
             "recentFiles": ["Papers/recent.md"],
             "keyFiles": ["index.md"],
             "workflows": [
               {"name": "Weekly Review", "steps": ["Review notes", "Update index"]}
             ],
             "preferences": "Use Markdown with YAML frontmatter.",
             "sessions": []
           }
           </selected_workspace>

        Make it feel like an active research project with realistic context.
        Generate UNIQUE content - different folder names, workspace names, file paths.

      user: |
        OUTPUT ONLY the user's request - no preamble.

        Generate a natural request to CREATE research notes on a specific topic.
        Examples: "Write up my notes on the transformer paper", "Document my literature review"

        The request should mention a specific topic and imply substantive content needed.
        OUTPUT ONLY THE REQUEST TEXT.

      assistant: |
        Generate a tool call to write research notes. OUTPUT ONLY VALID JSON.

        Required format:
        {
          "content": null,
          "tool_calls": [{
            "id": "call_XXXXXXXXX",
            "type": "function",
            "function": {
              "name": "useTools",
              "arguments": {
                "workspaceId": "<extract from system prompt>",
                "sessionId": "<extract from system prompt>",
                "memory": "<brief session context>",
                "goal": "<write the requested research note in the right workspace path>",
                "constraints": "Only create the requested note. Do not modify unrelated files.",
                "tool": "content write \"<appropriate path in workspace>\" \"<full markdown content>\""
              }
            }
          }]
        }

        The params.content MUST include:

        1. YAML frontmatter (raw --- delimiters, NO code fence):
           - title, description, tags (array), aliases, category: "research"

        2. Research content (500-1500 words):
           - Use ## headings naturally
           - Include findings, analysis, implications
           - Obsidian formatting: [[wikilinks]], callouts

        OUTPUT ONLY THE JSON OBJECT - no markdown wrapper, no explanation.

