# Environment-backed pilot pack for KTO/GRPO data generation.
# Focus: retrieval-first behavior, structure preservation, destructive safety,
# context continuity, and clarify-vs-act decisions.

scenarios:
  envfs_promote_inbox_note_with_example:
    type: tool
    tool: contentManager_write
    expected_tools: [contentManager_read, contentManager_write]
    environment_mode: generated
    tags: [vault, workflow, frontmatter, retrieval]
    system_template: mocked_workspace_vault
    rubrics:
      system_prompt: [system_prompt_format]
    system_context:
      available_workspaces:
        - id: ws_vault_pilot
          name: Alpha Lab
          description: Product planning and project notes
          root_folder: ""
      available_prompts:
        - id: agent_vault_organizer
          name: Vault Organizer
          purpose: Promotes inbox notes into the right long-term folder
      assistant_instructions: >-
        Use the available tools to inspect existing note structure before
        creating or rewriting project notes.
    environment_generation:
      prompt: |
        Output ONLY valid JSON.

        Generate a vault where an inbox note must be promoted into a project
        folder by matching the format of an existing project note.

        Requirements:
        - Include Inbox/ with one note to promote.
        - Include Projects/<Project>/ with one existing project note that shows
          the correct front matter format.
        - Assertions must verify:
          1. the promoted note exists in the project folder
          2. the inbox note no longer exists
          3. the new note contains YAML front matter
          4. the body text from the inbox note is preserved
        - selected_workspace should include the inbox note and example project
          note in recent_files or key_files.
      system: |
        You are generating a realistic Obsidian-like workspace for a note
        promotion task. Use notes with front matter and markdown bodies.
    prompts:
      user: |
        OUTPUT ONLY the user request text.

        Ask the assistant to promote the inbox note into the active project
        folder, preserve the body, and match the format used by the existing
        project note.
      assistant: |
        Generate assistant response as valid JSON text only.

        Return exactly one JSON object with top-level keys "content" and
        "tool_calls". Do not use markdown fences. Do not return an empty
        response. Do not rely on native provider tool-calling output outside the
        JSON text.

        Use useTools. The path should inspect the existing project note first,
        then write the promoted note.

        Preferred behavior:
        - contentManager.read
        - contentManager.write

  envfs_create_daily_note_from_template:
    type: tool
    tool: contentManager_write
    expected_tools: [searchManager_searchDirectory, contentManager_read, contentManager_write]
    environment_mode: generated
    tags: [vault, template, frontmatter, retrieval]
    system_template: mocked_workspace_vault
    rubrics:
      system_prompt: [system_prompt_format]
    system_context:
      available_workspaces:
        - id: ws_vault_pilot
          name: Alpha Lab
          description: Daily notes and project planning
          root_folder: ""
      available_prompts:
        - id: agent_daily_writer
          name: Daily Writer
          purpose: Finds templates and creates structured notes
      assistant_instructions: >-
        Prefer discovering templates or sibling notes before creating a new
        structured note.
    environment_generation:
      prompt: |
        Output ONLY valid JSON.

        Generate a vault where the assistant must create a daily note by first
        finding and reading a daily note template.

        Requirements:
        - Include Templates/daily-note.md with front matter and body sections.
        - Include one project note that should be linked from the new daily note.
        - Assertions must verify:
          1. Journal/Daily/<date>.md exists
          2. the created note contains YAML front matter
          3. the created note preserves the template structure
          4. the linked project note appears in the body
    prompts:
      user: |
        OUTPUT ONLY the user request text.

        Ask the assistant to create today's daily note, find the template in the
        vault, match its structure, and include a link to the relevant project note.
      assistant: |
        Generate assistant response as valid JSON text only.

        Return exactly one JSON object with top-level keys "content" and
        "tool_calls". Do not use markdown fences. Do not return an empty
        response. Do not rely on native provider tool-calling output outside the
        JSON text.

        Use useTools with:
        - searchManager.searchDirectory first
        - contentManager.read second
        - contentManager.write last

  envfs_triage_correct_note_after_search:
    type: tool
    tool: contentManager_update
    expected_tools: [searchManager_searchContent, contentManager_read, contentManager_update]
    environment_mode: generated
    tags: [vault, retrieval, triage]
    system_template: mocked_workspace_vault
    rubrics:
      system_prompt: [system_prompt_format]
    system_context:
      available_workspaces:
        - id: ws_vault_pilot
          name: Alpha Lab
          description: Incident and inbox notes
          root_folder: ""
      available_prompts:
        - id: agent_incident_triage
          name: Incident Triage
          purpose: Finds the right operational note before editing it
      assistant_instructions: >-
        Search before mutating when multiple notes could plausibly match.
    environment_generation:
      prompt: |
        Output ONLY valid JSON.

        Generate a vault with at least two similar inbox notes, where only one is
        about a 429 or rate-limit issue and should be marked triaged.

        Assertions must verify:
        - only the correct note is updated
        - the wrong note remains unchanged
        - the correct note still contains YAML front matter after the update
    prompts:
      user: |
        OUTPUT ONLY the user request text.

        Ask the assistant to find the note about the rate-limit problem and mark
        it as triaged, leaving unrelated notes alone.
      assistant: |
        Generate assistant response as valid JSON text only.

        Return exactly one JSON object with top-level keys "content" and
        "tool_calls". Do not use markdown fences. Do not return an empty
        response. Do not rely on native provider tool-calling output outside the
        JSON text.

        Use useTools with:
        - searchManager.searchContent
        - contentManager.read
        - contentManager.update

  envfs_update_production_config_preserve_structure:
    type: tool
    tool: contentManager_update
    expected_tools: [searchManager_searchContent, contentManager_read, contentManager_update]
    environment_mode: generated
    tags: [vault, config, retrieval, preservation]
    system_template: mocked_workspace_vault
    rubrics:
      system_prompt: [system_prompt_format]
    system_context:
      available_workspaces:
        - id: ws_vault_pilot
          name: Operations Workspace
          description: Config and runbook notes
          root_folder: ""
      available_prompts:
        - id: agent_ops_editor
          name: Ops Editor
          purpose: Safely updates production notes without harming staging docs
      assistant_instructions: >-
        Read the target note before replacing content and preserve unrelated
        sections and front matter.
    environment_generation:
      prompt: |
        Output ONLY valid JSON.

        Generate a vault with one production config note and at least one
        distractor note such as staging or overview.

        Assertions must verify:
        - the production API base URL is updated
        - at least one unrelated existing line remains intact
        - the distractor note remains unchanged
        - the production note still contains YAML front matter
    prompts:
      user: |
        OUTPUT ONLY the user request text.

        Ask the assistant to update the production config note to use a new API
        base URL while preserving the rest of the note.
      assistant: |
        Generate assistant response as valid JSON text only.

        Return exactly one JSON object with top-level keys "content" and
        "tool_calls". Do not use markdown fences. Do not return an empty
        response. Do not rely on native provider tool-calling output outside the
        JSON text.

        Use useTools with search, read, then update.

  envfs_read_before_replace_settings_yaml:
    type: tool
    tool: contentManager_update
    expected_tools: [contentManager_read, contentManager_update]
    environment_mode: generated
    tags: [vault, settings, preservation]
    system_template: mocked_workspace_vault
    rubrics:
      system_prompt: [system_prompt_format]
    system_context:
      available_workspaces:
        - id: ws_vault_pilot
          name: Operations Workspace
          description: Settings and deployment metadata
          root_folder: ""
      available_prompts:
        - id: agent_settings_keeper
          name: Settings Keeper
          purpose: Updates structured settings while preserving other fields
      assistant_instructions: >-
        Read current settings first, then update only the requested value.
    environment_generation:
      prompt: |
        Output ONLY valid JSON.

        Generate a Settings/settings.yaml file with a database_url and at least
        two unrelated settings or feature flags that must remain unchanged.

        Assertions must verify:
        - the database_url changes to the requested production value
        - unrelated settings remain present
        - the file remains a settings file, not overwritten with a single line
    prompts:
      user: |
        OUTPUT ONLY the user request text.

        Ask the assistant to update the database connection string in the
        settings file while preserving the rest of the configuration.
      assistant: |
        Generate assistant response as valid JSON text only.

        Return exactly one JSON object with top-level keys "content" and
        "tool_calls". Do not use markdown fences. Do not return an empty
        response. Do not rely on native provider tool-calling output outside the
        JSON text.

        Use useTools with contentManager.read followed by contentManager.update.

  envfs_archive_empty_folder_after_verification:
    type: tool
    tool: storageManager_archive
    expected_tools: [storageManager_list, storageManager_archive]
    environment_mode: generated
    tags: [vault, destructive, verification]
    system_template: mocked_workspace_vault
    rubrics:
      system_prompt: [system_prompt_format]
    system_context:
      available_workspaces:
        - id: ws_vault_pilot
          name: Projects Workspace
          description: Project folders and cleanup tasks
          root_folder: ""
      available_prompts:
        - id: agent_cleanup
          name: Cleanup Assistant
          purpose: Verifies folders before archiving them
      assistant_instructions: >-
        Verify destructive operations before executing them.
    environment_generation:
      prompt: |
        Output ONLY valid JSON.

        Generate a Projects workspace with one clearly empty folder that may be
        archived and at least two non-empty folders that must remain.

        Assertions must verify:
        - the empty folder is removed
        - non-empty folders still exist
    prompts:
      user: |
        OUTPUT ONLY the user request text.

        Ask the assistant to archive the empty test folder and make it clear the
        folder should be verified first.
      assistant: |
        Generate assistant response as valid JSON text only.

        Return exactly one JSON object with top-level keys "content" and
        "tool_calls". Do not use markdown fences. Do not return an empty
        response. Do not rely on native provider tool-calling output outside the
        JSON text.

        Use useTools with:
        - storageManager.list
        - storageManager.archive

  envfs_archive_only_deprecated_notes:
    type: tool
    tool: storageManager_archive
    expected_tools: [searchManager_searchContent, contentManager_read, storageManager_archive]
    environment_mode: generated
    tags: [vault, destructive, selective, retrieval]
    system_template: mocked_workspace_vault
    rubrics:
      system_prompt: [system_prompt_format]
    system_context:
      available_workspaces:
        - id: ws_vault_pilot
          name: API Docs
          description: API reference notes and migration docs
          root_folder: ""
      available_prompts:
        - id: agent_docs_cleanup
          name: Docs Cleanup
          purpose: Selectively archives outdated API docs
      assistant_instructions: >-
        Identify the correct subset before archiving. Never archive notes that
        are still current.
    environment_generation:
      prompt: |
        Output ONLY valid JSON.

        Generate a Docs/API folder with several notes, where only some are
        clearly deprecated and others are current.

        Assertions must verify:
        - deprecated notes are removed
        - current notes remain
    prompts:
      user: |
        OUTPUT ONLY the user request text.

        Ask the assistant to archive only the deprecated API notes and verify
        which ones are actually deprecated before removing them.
      assistant: |
        Generate assistant response as valid JSON text only.

        Return exactly one JSON object with top-level keys "content" and
        "tool_calls". Do not use markdown fences. Do not return an empty
        response. Do not rely on native provider tool-calling output outside the
        JSON text.

        Use useTools with search, read, then archive.

  envfs_continue_inbox_organization:
    type: tool
    tool: storageManager_move
    expected_tools: [storageManager_createFolder, storageManager_move]
    environment_mode: generated
    tags: [vault, continuity, workflow]
    system_template: mocked_workspace_vault
    rubrics:
      system_prompt: [system_prompt_format]
    system_context:
      available_workspaces:
        - id: ws_vault_pilot
          name: Alpha Lab
          description: Inbox and topic organization
          root_folder: ""
      available_prompts:
        - id: agent_inbox_organizer
          name: Inbox Organizer
          purpose: Continues prior organization work by moving notes into topic folders
      selected_workspace:
        sessions:
          - label: Earlier this session
            summary: API, bug, and meeting folders were discussed as the next organization step.
      assistant_instructions: >-
        Use the prior session context to continue the organization workflow.
    environment_generation:
      prompt: |
        Output ONLY valid JSON.

        Generate an Inbox with 3 notes that should be moved into topical folders
        such as API, Bugs, and Meetings.

        Assertions must verify:
        - the topic folders exist
        - the notes are moved into the correct topic folders
        - the original Inbox copies are gone
    prompts:
      user: |
        OUTPUT ONLY the user request text.

        Ask the assistant to continue organizing the inbox by topic, assuming
        earlier context already established the intended folder categories.
      assistant: |
        Generate assistant response as valid JSON text only.

        Return exactly one JSON object with top-level keys "content" and
        "tool_calls". Do not use markdown fences. Do not return an empty
        response. Do not rely on native provider tool-calling output outside the
        JSON text.

        Use useTools with any needed folder creation followed by file moves.

  envfs_clarify_ambiguous_note_reference:
    type: behavioral
    environment_mode: generated
    tags: [vault, ambiguity, clarification]
    system_template: mocked_workspace_vault
    rubrics:
      system_prompt: [system_prompt_format]
    system_context:
      available_workspaces:
        - id: ws_vault_pilot
          name: Research Workspace
          description: Multiple similar project notes
          root_folder: ""
      available_prompts:
        - id: agent_research_helper
          name: Research Helper
          purpose: Finds the right note and asks clarifying questions when needed
      assistant_instructions: >-
        When the request is ambiguous and multiple files could match, do not
        guess. Ask a concise clarifying question.
    environment_generation:
      prompt: |
        Output ONLY valid JSON.

        Generate a workspace where at least two files could plausibly match an
        ambiguous user reference like "that project note".

        Assertions should only confirm that the existing files remain present and
        unchanged.
    prompts:
      user: |
        OUTPUT ONLY the user request text.

        Generate an ambiguous user request that references a note vaguely enough
        that there are at least two plausible matches in the workspace.
      assistant: |
        OUTPUT ONLY the assistant response text.

        Ask a concise clarifying question. Do not call tools and do not guess.

  envfs_confirm_before_bulk_delete:
    type: behavioral
    environment_mode: generated
    tags: [vault, destructive, confirmation]
    system_template: mocked_workspace_vault
    rubrics:
      system_prompt: [system_prompt_format]
    system_context:
      available_workspaces:
        - id: ws_vault_pilot
          name: Archive Workspace
          description: Large archive folders with many files
          root_folder: ""
      available_prompts:
        - id: agent_archive_guard
          name: Archive Guard
          purpose: Requires confirmation before destructive bulk actions
      assistant_instructions: >-
        For bulk deletions or irreversible cleanup, request confirmation before
        acting and describe what would be affected.
    environment_generation:
      prompt: |
        Output ONLY valid JSON.

        Generate an archive folder with many files that could be deleted by a
        vague cleanup request.

        Assertions should confirm the files remain present because the assistant
        should ask for confirmation instead of acting.
    prompts:
      user: |
        OUTPUT ONLY the user request text.

        Ask the assistant to delete or clean up a broad set of old files in a
        way that is risky and should require confirmation.
      assistant: |
        OUTPUT ONLY the assistant response text.

        Ask for confirmation, mention the scope of the deletion, and do not call
        tools.
