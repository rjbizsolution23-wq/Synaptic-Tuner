behaviors:
  uses_tool:
    check: tool_called
    params:
      tool: '{tool_name}'
  uses_any_of_tools:
    check: any_tool_called
    params:
      tools: '{tool_list}'
  uses_all_tools:
    check: all_tools_called
    params:
      tools: '{tool_list}'
  calls_multiple_tools:
    check: tool_count
    params:
      min: 2
      max: null
  calls_single_tool:
    check: tool_count
    params:
      min: 1
      max: 1
  tool_has_params:
    check: tool_params_present
    params:
      tool: '{tool_name}'
      required_params: '{param_list}'
  avoids_tool:
    check: tool_not_called
    params:
      tool: '{tool_name}'
  context_complete:
    check: fields_present
    params:
      in: context
      fields:
      - sessionId
      - workspaceId
      - memory
      - goal
  context_populated:
    check: fields_min_length
    params:
      in: context
      fields:
        memory: 10
        goal: 5
  session_id_matches:
    check: field_equals
    params:
      in: context
      field: sessionId
      value: '{expected_session_id}'
  workspace_id_matches:
    check: field_equals
    params:
      in: context
      field: workspaceId
      value: '{expected_workspace_id}'
  asks_clarification:
    check: text_contains_any
    params:
      patterns:
      - '?'
      - which
      - what
      - clarify
      - specify
      - could you
      - would you
  explains_reasoning:
    check: text_min_length
    params:
      min: 50
  minimal_text:
    check: text_max_length
    params:
      max: 30
  mentions_file:
    check: text_matches
    params:
      pattern: \b[\w/\-]+\.(md|txt|json|yaml)\b
  mentions_path:
    check: text_matches
    params:
      pattern: \b[\w/\-]+/[\w/\-]+\b
  contains_text:
    check: text_contains
    params:
      text: '{expected_text}'
  avoids_text:
    check: text_not_contains
    params:
      patterns: '{forbidden_patterns}'
  verifies_before_delete:
    check: tool_sequence
    params:
      first_any_of:
      - storage list
      - search content
      - search directory
      - content read
      not_first:
      - storage archive
      - content replace
  reads_before_write:
    check: tool_sequence
    params:
      first_any_of:
      - content read
      before:
      - content write
      - content replace
      - content insert
  searches_first:
    check: tool_sequence
    params:
      first_any_of:
      - search content
      - search directory
  suggests_alternative:
    check: text_contains_any
    params:
      patterns:
      - instead
      - alternative
      - try
      - another
      - different
  acknowledges_limitation:
    check: text_contains_any
    params:
      patterns:
      - cannot
      - can't
      - unable
      - not possible
      - limitation
  valid_batch_format:
    check: batch_structure
    params:
      min_calls: 2
      strategy_valid: true
  batch_serial:
    check: batch_strategy
    params:
      strategy: serial
  batch_parallel:
    check: batch_strategy
    params:
      strategy: parallel
check_types:
  tool_called:
    description: Check if specific tool was called
    params:
    - tool
  any_tool_called:
    description: Check if any of the tools were called (OR)
    params:
    - tools
  all_tools_called:
    description: Check if all tools were called (AND)
    params:
    - tools
  tool_not_called:
    description: Check that tool was NOT called
    params:
    - tool
  tool_count:
    description: Check number of tool calls
    params:
    - min
    - max
  tool_params_present:
    description: Check tool has required params
    params:
    - tool
    - required_params
  tool_sequence:
    description: Check tool call ordering
    params:
    - first_any_of
    - before
    - not_first
  fields_present:
    description: Check fields exist in object
    params:
    - in
    - fields
  fields_min_length:
    description: Check field values have min length
    params:
    - in
    - fields
  field_equals:
    description: Check field equals expected value
    params:
    - in
    - field
    - value
  text_contains:
    description: Check text contains substring
    params:
    - text
  text_contains_any:
    description: Check text contains any of patterns
    params:
    - patterns
  text_not_contains:
    description: Check text does NOT contain patterns
    params:
    - patterns
  text_matches:
    description: Check text matches regex
    params:
    - pattern
  text_min_length:
    description: Check text meets min length
    params:
    - min
  text_max_length:
    description: Check text under max length
    params:
    - max
  batch_structure:
    description: Check batch operation structure
    params:
    - min_calls
    - strategy_valid
  batch_strategy:
    description: Check batch uses specific strategy
    params:
    - strategy
