response_types:
  tool_only:
    description: Response contains only tool call(s), minimal or no explanation
    requirements:
      has_tool_calls: true
      text_content:
        max_length: 50
  tool_with_explanation:
    description: Tool call accompanied by explanation before/after
    requirements:
      has_tool_calls: true
      text_content:
        min_length: 30
  text_only:
    description: Pure text response, no tool calls
    requirements:
      has_tool_calls: false
      text_content:
        min_length: 10
  clarification:
    description: Asking user for more information before acting
    requirements:
      has_tool_calls: false
      text_content:
        contains_any:
        - '?'
        - which
        - what
        - could you
        - can you clarify
        - please specify
        - would you like
        - do you mean
        - did you mean
  confirmation_request:
    description: Asking for confirmation before proceeding with destructive action
    requirements:
      has_tool_calls: false
      text_content:
        contains_any:
        - confirm
        - are you sure
        - proceed
        - this will delete
        - this action
        - cannot be undone
        - irreversible
  batch_operation:
    description: Response with multiple tool calls (batch)
    requirements:
      has_tool_calls: true
      min_tool_calls: 2
      text_content:
        optional: true
  information_gathering:
    description: Using search/read tools to gather information first
    requirements:
      has_tool_calls: true
      tool_categories:
        any_of:
        - search
        - read
        - list
  error_recovery:
    description: Response after encountering an error
    requirements:
      text_content:
        contains_any:
        - error
        - failed
        - couldn't
        - unable
        - try
        - instead
        - alternative
aliases:
  direct_action: tool_only
  thoughtful_action: tool_with_explanation
  ask_first: clarification
  verify_first: confirmation_request
  batch: batch_operation
  research: information_gathering
pseudo_tools:
  TEXT_ONLY: Indicates text-only response is acceptable (no tool call)
defaults:
  default_type: tool_with_explanation
  text_length_tolerance: 0.2
  strict_type_matching: false
  text_only_marker: TEXT_ONLY
