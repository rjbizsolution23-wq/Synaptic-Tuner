name: Tool Coverage Tests
description: Tests for each tool to verify correct tool selection and parameter usage
tests:
- id: prompt_create
  question: Create a new prompt named "Vault Curator" with the description "Culls outdated workspace docs for the Atlas program". Use the instruction
    text "You are a documentation curator that identifies and removes outdated workspace material."
  tags:
  - prompt
  - single-tool
  system: "<session_context>\nUse `useTools` when a tool call is needed. Include these top-level fields in the tool arguments:\n\n- sessionId:\
    \ \"session_1732300800000_eval01234\"\n- workspaceId: \"ws_1732300800000_atlasroll\" (current workspace)\n- memory: brief relevant context\n\
    - goal: current objective\n- tool: CLI command string\n</session_context>\n\n<vault_structure>\nFolders:\n - Projects/\n - Projects/Atlas/\n\
    \ - Projects/Atlas/Documentation/\n - Projects/Atlas/Archive/\n - Projects/Phoenix/\n - Templates/\n\nFiles:\n - README.md\n - Projects/Atlas/overview.md\n\
    \ - Projects/Atlas/Documentation/changelog.md\n - Projects/Atlas/Documentation/outdated-notes.md\n - Projects/Atlas/Archive/legacy-files.md\n\
    \ - Templates/agent-template.md\n</vault_structure>\n\n<available_workspaces>\n- Atlas Rollout (id: \"ws_1732300800000_atlasroll\")\n  Description:\
    \ Project tracking for Atlas customer rollout\n  Root folder: Projects/Atlas/\n</available_workspaces>\n\n<available_prompts>\n- name: Workspace\
    \ Auditor\n  description: Audits workspace contents and reports issues\n\n- name: Release Briefing\n  description: Generates release briefing\
    \ summaries\n\n- name: Incident Scribe\n  description: Documents incidents and post-mortems\n\n- name: Legacy Intake\n  description: Processes\
    \ legacy system data intake\n\n- name: QA Prototype\n  description: Prototype agent for QA testing\n</available_prompts>\n\n<selected_workspace\
    \ name=\"Atlas Rollout\" id=\"ws_1732300800000_atlasroll\">\nThis workspace is currently selected.\n\n{\n  \"context\": {\n    \"id\": \"\
    ws_1732300800000_atlasroll\",\n    \"name\": \"Atlas Rollout\",\n    \"description\": \"Project tracking for Atlas customer rollout\",\n \
    \   \"rootFolder\": \"Projects/Atlas/\"\n  },\n  \"workspaceStructure\": [\n    {\"path\": \"\", \"type\": \"folder\", \"children\": [\"Projects/\"\
    , \"Templates/\", \"README.md\"]},\n    {\"path\": \"Projects/\", \"type\": \"folder\", \"children\": [\"Atlas/\", \"Phoenix/\"]},\n    {\"\
    path\": \"Projects/Atlas/\", \"type\": \"folder\", \"children\": [\"Documentation/\", \"Archive/\", \"overview.md\"]},\n    {\"path\": \"\
    Projects/Atlas/Documentation/\", \"type\": \"folder\", \"children\": [\"changelog.md\", \"outdated-notes.md\"]},\n    {\"path\": \"Projects/Atlas/Archive/\"\
    , \"type\": \"folder\", \"children\": [\"legacy-files.md\"]}\n  ],\n  \"recentFiles\": [\"Projects/Atlas/Documentation/outdated-notes.md\"\
    , \"Projects/Atlas/overview.md\"],\n  \"keyFiles\": [\"Projects/Atlas/overview.md\", \"Projects/Atlas/Documentation/changelog.md\"],\n  \"\
    workflows\": [\n    {\"name\": \"Agent Creation\", \"steps\": [\"Define agent purpose and scope\", \"Select appropriate model\", \"Configure\
    \ temperature and tools\", \"Test agent on sample tasks\", \"Deploy to workspace\"]}\n  ],\n  \"preferences\": \"Use descriptive names for\
    \ agents. Document agent configurations in Templates/.\",\n  \"sessions\": []\n}\n</selected_workspace>"
  correct:
    any:
    - name: openai_prompt_create_prompt
      assertions:
      - type: jsonpath_equals
        path: $.tool_calls[0].function.name
        value: useTools
      - type: jsonpath_equals
        path: $.tool_calls[0].function.arguments.sessionId
        value: session_1732300800000_eval01234
      - type: jsonpath_equals
        path: $.tool_calls[0].function.arguments.workspaceId
        value: ws_1732300800000_atlasroll
      - type: jsonpath_exists
        path: $.tool_calls[0].function.arguments.memory
      - type: jsonpath_exists
        path: $.tool_calls[0].function.arguments.goal
      - type: jsonpath_regex
        path: $.tool_calls[0].function.arguments.tool
        pattern: ^\s*prompt\s+create\b(?=.*Vault\ Curator)(?=.*Culls\ outdated\ workspace\ docs\ for\ the\ Atlas\ program)(?=.*You\ are\
          a\ documentation\ curator\ that\ identifies\ and\ removes\ outdated\ workspace\ material\.)
    - name: flat_prompt_create_prompt
      assertions:
      - type: jsonpath_equals
        path: $.tool_calls[0].name
        value: useTools
      - type: jsonpath_equals
        path: $.tool_calls[0].arguments.sessionId
        value: session_1732300800000_eval01234
      - type: jsonpath_equals
        path: $.tool_calls[0].arguments.workspaceId
        value: ws_1732300800000_atlasroll
      - type: jsonpath_exists
        path: $.tool_calls[0].arguments.memory
      - type: jsonpath_exists
        path: $.tool_calls[0].arguments.goal
      - type: jsonpath_regex
        path: $.tool_calls[0].arguments.tool
        pattern: ^\s*prompt\s+create\b(?=.*Vault\ Curator)(?=.*Culls\ outdated\ workspace\ docs\ for\ the\ Atlas\ program)(?=.*You\ are\
          a\ documentation\ curator\ that\ identifies\ and\ removes\ outdated\ workspace\ material\.)
