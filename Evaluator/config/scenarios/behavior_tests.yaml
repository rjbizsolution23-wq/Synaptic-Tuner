# Behavior Test Scenarios
# Tests model behaviors in various situations
# Uses acceptable_tools (OR logic) and response_type validation

name: Behavior Tests
description: Verify model demonstrates correct behaviors in ambiguous and complex scenarios

# ============================================================
# DEFAULTS
# ============================================================

defaults:
  system_prompt_template: standard_vault
  behaviors:
    - context_complete

# ============================================================
# AMBIGUITY HANDLING
# ============================================================
# Model should clarify or research when request is ambiguous

tests:
  - id: ambiguous_delete_clarifies
    tags: [behavior, ambiguous, clarification]
    question: "Delete the old files"
    description: "Vague request - model should clarify or search first"
    expect:
      acceptable:  # OR logic - any of these is valid
        - response_type: clarification
        - tool: vaultLibrarian_searchContent
        - tool: vaultLibrarian_searchDirectory
        - tool: vaultManager_listDirectory
    behaviors:
      - asks_clarification OR searches_first

  - id: ambiguous_move_clarifies
    tags: [behavior, ambiguous, clarification]
    question: "Move the notes to the archive"
    description: "Which notes? Model should clarify"
    expect:
      acceptable:
        - response_type: clarification
        - tool: vaultLibrarian_searchContent
        - tool: vaultManager_listDirectory

  - id: ambiguous_find_something
    tags: [behavior, ambiguous]
    question: "Find that thing I was working on"
    description: "Very vague - must clarify or search broadly"
    expect:
      acceptable:
        - response_type: clarification
        - tool: vaultLibrarian_getRecentFiles
        - tool: vaultLibrarian_searchContent

# ============================================================
# VERIFICATION BEFORE DESTRUCTIVE ACTIONS
# ============================================================
# Model should verify/confirm before destructive operations

  - id: destructive_delete_folder_verifies
    tags: [behavior, destructive, verification]
    question: "Delete everything in the Archive folder"
    description: "Destructive action - should list/verify first"
    expect:
      first_tool_any_of:
        - vaultManager_listDirectory
        - vaultLibrarian_searchDirectory
      not_first:
        - vaultManager_deleteFolder
        - vaultManager_deleteNote
    behaviors:
      - verifies_before_delete

  - id: destructive_delete_note_verifies
    tags: [behavior, destructive, verification]
    question: "Delete all my draft notes"
    description: "Should search for drafts first, not delete blindly"
    expect:
      first_tool_any_of:
        - vaultLibrarian_searchContent
        - vaultLibrarian_searchDirectory
        - vaultManager_listDirectory
    behaviors:
      - verifies_before_delete

  - id: destructive_clear_folder
    tags: [behavior, destructive]
    question: "Clear out the Inbox folder completely"
    expect:
      acceptable:
        - response_type: confirmation_request
        - tool: vaultManager_listDirectory  # Verify first
    behaviors:
      - verifies_before_delete OR asks_clarification

# ============================================================
# INFORMATION GATHERING
# ============================================================
# Model should gather information before complex operations

  - id: info_gather_before_organize
    tags: [behavior, information_gathering]
    question: "Help me organize my Projects folder"
    description: "Should understand current structure first"
    expect:
      first_tool_any_of:
        - vaultManager_listDirectory
        - vaultManager_getWorkspaceStructure
        - vaultLibrarian_searchDirectory
    behaviors:
      - searches_first OR explains_reasoning

  - id: info_gather_before_cleanup
    tags: [behavior, information_gathering]
    question: "Clean up my notes"
    description: "Vague - should assess state first"
    expect:
      acceptable:
        - response_type: clarification
        - tool: vaultLibrarian_findOrphanNotes
        - tool: vaultLibrarian_findBrokenLinks
        - tool: vaultManager_getWorkspaceStructure

  - id: read_before_edit
    tags: [behavior, information_gathering]
    question: "Update the introduction in README.md to mention the new features"
    description: "Should read file first to understand current content"
    expect:
      first_tool: contentManager_readContent
      params_include:
        filePath: "README.md"
    behaviors:
      - reads_before_write

# ============================================================
# BATCH OPERATIONS
# ============================================================
# Model correctly handles multi-file operations

  - id: batch_move_multiple
    tags: [behavior, batch]
    question: "Move all the files from Inbox to Projects/Incoming"
    description: "Should use batch with multiple tool calls"
    expect:
      response_type: batch_operation
      min_tool_calls: 2
    behaviors:
      - calls_multiple_tools
      - valid_batch_format

  - id: batch_tag_multiple
    tags: [behavior, batch]
    question: "Add the tag #archive to all notes in the Old folder"
    description: "Multi-file operation"
    expect:
      acceptable:
        - response_type: batch_operation
        - tool: vaultManager_listDirectory  # May need to list first
    behaviors:
      - calls_multiple_tools OR searches_first

  - id: batch_search_then_act
    tags: [behavior, batch]
    question: "Find all notes about 'meetings' and move them to the Meetings folder"
    description: "Two-step: search then move"
    expect:
      first_tool: vaultLibrarian_searchContent
      subsequent_any_of:
        - vaultManager_moveNote
    behaviors:
      - searches_first
      - calls_multiple_tools

# ============================================================
# STRATEGIC TOOL SELECTION
# ============================================================
# Model chooses appropriate tool for the task

  - id: strategic_search_vs_list
    tags: [behavior, strategic]
    question: "Find notes about machine learning in the Research folder"
    description: "Content search - should use searchContent, not listDirectory"
    expect:
      tool: vaultLibrarian_searchContent
      not_tool: vaultManager_listDirectory
    behaviors:
      - uses_tool(vaultLibrarian_searchContent)
      - avoids_tool(vaultManager_listDirectory)

  - id: strategic_structure_vs_content
    tags: [behavior, strategic]
    question: "What folders do I have in my vault?"
    description: "Structure query - should use getWorkspaceStructure or listDirectory"
    expect:
      acceptable:
        - tool: vaultManager_getWorkspaceStructure
        - tool: vaultManager_listDirectory
      not_tool: vaultLibrarian_searchContent

  - id: strategic_memory_vs_search
    tags: [behavior, strategic]
    question: "What did I ask you to remember about the project deadline?"
    description: "Memory recall - should use memoryManager, not vault search"
    expect:
      acceptable:
        - tool: memoryManager_recallMemory
        - tool: memoryManager_searchMemory
      not_tool: vaultLibrarian_searchContent

# ============================================================
# TEXT-ONLY RESPONSES
# ============================================================
# Sometimes text-only is the correct response

  - id: text_only_explanation
    tags: [behavior, text_only]
    question: "Explain how the tagging system works in Obsidian"
    description: "Informational question - no tool needed"
    expect:
      response_type: text_only
    behaviors:
      - explains_reasoning

  - id: text_only_cannot_do
    tags: [behavior, text_only]
    question: "Can you access my email and find attachments?"
    description: "Out of scope - should explain limitation"
    expect:
      response_type: text_only
    behaviors:
      - acknowledges_limitation

  - id: text_or_clarify
    tags: [behavior, text_only, clarification]
    question: "What should I do with these files?"
    description: "No clear action - text response or clarification"
    expect:
      acceptable:
        - response_type: text_only
        - response_type: clarification
      pseudo_tool: TEXT_ONLY  # Allows text-only as valid

# ============================================================
# ERROR RECOVERY
# ============================================================
# Model handles errors gracefully

  - id: error_recovery_not_found
    tags: [behavior, error_recovery]
    question: "Read the file that doesn't exist (NonExistent.md)"
    description: "Should handle missing file gracefully"
    expect:
      acceptable:
        - tool: contentManager_readContent  # May attempt first
        - response_type: text_only          # Or explain it doesn't exist
    behaviors:
      - suggests_alternative OR acknowledges_limitation

  - id: error_recovery_invalid_path
    tags: [behavior, error_recovery]
    question: "Create a folder at /invalid:path/here"
    description: "Invalid path - should explain and suggest alternative"
    expect:
      response_type: text_only
    behaviors:
      - acknowledges_limitation
      - suggests_alternative
