    \ are available in this vault:\n\n- ML Research (id: \"ws_1732300800000_mlresearch\")\n  Description: Machine learning\
    \ research papers and notes\n  Root folder: Research/ML/\n\nUse memoryManager with loadWorkspace mode to get full workspace\
    \ context.\n</available_workspaces>\n<vault_files>\nThe following files exist in Research/ML/:\n\n- Research/ML/attention-is-all-you-need.md\
    \ (Transformer architecture paper notes)\n- Research/ML/bert-pretraining.md (BERT pre-training methodology)\n- Research/ML/gpt-scaling-laws.md\
